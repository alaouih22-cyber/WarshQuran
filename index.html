<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mushaf Tajweed Warsh Marocchino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --emerald: #064e3b; 
            --gold: #c5a059; 
            --paper: #fdf6e3; 
            --mushaf-bg: #fffcf5;
            --taj-madd: #eb0000; 
            --taj-ghunnah: #00a651; 
            --taj-qalqalah: #0072bc;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; width: 100%; background-color: var(--emerald); overflow: hidden; font-family: 'Amiri', serif; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; position: fixed; width: 100%; }

        /* Header */
        .header { background: var(--emerald); padding: 10px; border-bottom: 2px solid var(--gold); }
        .controls-row { display: flex; gap: 8px; justify-content: center; align-items: center; }
        select { padding: 10px; border-radius: 8px; border: none; font-weight: bold; background: #fff; flex: 1; }

        /* Area Lettura */
        .reader-container {
            flex: 1; overflow-y: auto; margin: 10px; border-radius: 10px;
            padding: 20px; background-color: var(--mushaf-bg);
            border: 12px solid; border-image: linear-gradient(45deg, #c5a059, #8d6e35, #c5a059) 1;
            direction: rtl; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Titolo Sura Marocchino */
        .surah-frame {
            border: 2px solid var(--emerald); background: #fff;
            padding: 10px; margin: -10px auto 20px; width: 85%; border-radius: 50px;
            font-size: 1.8rem; color: var(--emerald); font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .bismillah { font-size: 2.2rem; margin: 20px 0; color: #000; font-family: 'Scheherazade New', serif; }

        /* Testo Quran */
        .mushaf-text { 
            font-size: 2.1rem; line-height: 2.6; color: #1a1a1a; 
            font-family: 'Scheherazade New', serif; text-align: justify;
        }

        /* Colori Tajweed */
        .taj-madd { color: var(--taj-madd) !important; font-weight: bold; }
        .taj-ghun { color: var(--taj-ghunnah) !important; font-weight: bold; }
        .taj-qal  { color: var(--taj-qalqalah) !important; font-weight: bold; }

        .ayah-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 38px; height: 38px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 L90 30 L90 70 L50 95 L10 70 L10 30 Z" fill="none" stroke="%23c5a059" stroke-width="6"/></svg>');
            background-size: contain; font-size: 0.9rem; font-weight: bold; margin: 0 8px; color: #8d6e35; vertical-align: middle;
        }

        .active-ayah { background: rgba(197, 160, 89, 0.2); border-radius: 8px; }

        /* Footer */
        .footer { background: var(--emerald); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--gold); }
        .btn-nav { background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; }

        /* Legenda Tajweed */
        .legend { background: #fff; border-top: 1px solid var(--gold); padding: 5px; display: flex; justify-content: space-around; font-size: 0.7rem; font-weight: bold; }
        .leg-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <div class="controls-row">
            <select id="surahSelect" onchange="loadSurah(this.value)"></select>
            <button onclick="toggleMode()" id="modeBtn" style="background:var(--gold); color:white; border:none; padding:10px; border-radius:8px; font-weight:bold;">ITA</button>
        </div>
    </div>

    <div id="reader" class="reader-container">
        <!-- Contenuto caricato qui -->
    </div>

    <div class="legend">
        <div class="leg-item"><div class="dot" style="background:var(--taj-madd)"></div> Madd</div>
        <div class="leg-item"><div class="dot" style="background:var(--taj-ghunnah)"></div> Ghunnah</div>
        <div class="leg-item"><div class="dot" style="background:var(--taj-qalqalah)"></div> Qalqalah</div>
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="nav(-1)"><i class="fas fa-arrow-right"></i></button>
        <span id="surahLabel" style="color:var(--gold); font-weight:bold;">Al-Fatihah</span>
        <button class="btn-nav" onclick="nav(1)"><i class="fas fa-arrow-left"></i></button>
    </div>
</div>

<audio id="quranPlayer"></audio>

<script>
    let currentSurah = 1;
    let mode = 'ar'; 
    const player = document.getElementById('quranPlayer');

    async function populateSurahs() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const d = await res.json();
        const select = document.getElementById('surahSelect');
        d.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.textContent = `${s.number}. ${s.englishName}`;
            select.appendChild(opt);
        });
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        document.getElementById('surahSelect').value = s;
        const reader = document.getElementById('reader');
        reader.innerHTML = "Caricamento...";

        // Usiamo l'edizione Tajweed per i colori e poi patchiamo per Warsh
        const edition = (mode === 'ar') ? 'ar.tajweed' : 'it.piccardo';
        
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/${edition}`);
            const d = await res.json();
            const surah = d.data;
            
            document.getElementById('surahLabel').innerText = surah.englishName;

            let html = `<div class="surah-frame">${surah.name}</div>`;
            if(currentSurah !== 1 && currentSurah !== 9) {
                html += `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
            }

            html += `<div class="mushaf-text">`;
            surah.ayahs.forEach(v => {
                let text = v.text;
                
                // --- PATCH WARSH (Esempio: Maliki invece di Maaliki in Al-Fatiha) ---
                if(currentSurah === 1 && v.numberInSurah === 4) {
                    text = text.replace("مَـٰلِكِ", "مَلِكِ"); 
                }

                // Parser Tajweed
                if(mode === 'ar') {
                    text = text.replace(/\[m/g, '<span class="taj-madd">')
                               .replace(/\[g/g, '<span class="taj-ghun">')
                               .replace(/\[q/g, '<span class="taj-qal">')
                               .replace(/\]/g, '</span>');
                    html += `<span class="ayah-item" onclick="playAudio(${v.numberInSurah}, this)">${text} <span class="ayah-num">${v.numberInSurah}</span></span> `;
                } else {
                    html += `<div style="text-align:left; direction:ltr; font-family:sans-serif; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:5px;" onclick="playAudio(${v.numberInSurah}, this)">
                                <b>${v.numberInSurah}.</b> ${text}
                             </div>`;
                }
            });
            html += `</div>`;
            reader.innerHTML = html;
        } catch(e) { reader.innerHTML = "Errore connessione."; }
    }

    function playAudio(ayah, el) {
        // Rimuovi evidenziazione
        document.querySelectorAll('.ayah-item, div').forEach(x => x.classList.remove('active-ayah'));
        el.classList.add('active-ayah');

        const s = String(currentSurah).padStart(3, '0');
        const a = String(ayah).padStart(3, '0');
        
        // FONTE AUDIO: Al-Hussary (WARSH Narration)
        player.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${a}.mp3`;
        
        // Questo comando ora funzionerà perché è attivato da un click dell'utente
        player.play().catch(e => {
            alert("Tocca di nuovo per riprodurre (il browser aveva bloccato l'audio)");
        });
    }

    function toggleMode() {
        mode = (mode === 'ar') ? 'it' : 'ar';
        document.getElementById('modeBtn').innerText = (mode === 'ar') ? 'ITA' : 'WARSH';
        loadSurah(currentSurah);
    }

    function nav(d) {
        let n = currentSurah + d;
        if(n >= 1 && n <= 114) loadSurah(n);
    }

    window.onload = () => {
        populateSurahs();
        loadSurah(1);
    };
</script>
</body>
</html>
