<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mushaf Tajweed Warsh 604</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #064e3b; --gold: #c5a059; --paper: #f4ecd8; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: #1a1a1a; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; position: fixed; width: 100%; }

        /* Header ultra-compatta */
        .header { 
            background: var(--emerald); 
            padding: 8px; 
            display: flex; 
            gap: 8px; 
            justify-content: center; 
            align-items: center;
            border-bottom: 2px solid var(--gold); 
        }
        
        #surahSelect { 
            background: #fff; border: 1px solid var(--gold); 
            padding: 8px; border-radius: 6px; font-weight: bold; width: 180px; 
        }

        /* Area Mushaf */
        .mushaf-container {
            flex: 1;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        #mushafImage {
            max-width: 100%;
            max-height: 100%;
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }

        /* Bottoni invisibili per cambiare pagina (stile Kindle/eReader) */
        .page-nav-overlay {
            position: absolute; top: 0; height: 100%; width: 40%; z-index: 10;
        }
        .nav-left { right: 0; } /* Per l'arabo, clicca a destra per andare avanti */
        .nav-right { left: 0; }

        /* Footer */
        .footer { 
            background: var(--emerald); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 2px solid var(--gold); 
        }

        .page-indicator { color: var(--gold); font-weight: bold; font-size: 1.1rem; }
        .btn-nav { background: var(--gold); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <select id="surahSelect" onchange="goToSurah(this.value)"></select>
        <div id="loading" style="color: white; font-size: 12px; display:none;">Caricamento...</div>
    </div>

    <div class="mushaf-container">
        <!-- Overlay per cambio pagina al tocco -->
        <div class="page-nav-overlay nav-right" onclick="changePage(1)"></div>
        <div class="page-nav-overlay nav-left" onclick="changePage(-1)"></div>
        
        <img id="mushafImage" src="" alt="Mushaf Page">
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="changePage(1)"><i class="fas fa-chevron-left"></i> Prec.</button>
        <div class="page-indicator">Pagina <span id="pageNumber">1</span></div>
        <button class="btn-nav" onclick="changePage(-1)">Succ. <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<script>
    let currentPage = 1;
    
    // Mappatura precisa delle pagine d'inizio delle 114 Sure (Mushaf 604 pagine standard)
    const surahStartPages = [
        1, 2, 50, 77, 106, 128, 151, 177, 187, 208, 221, 235, 249, 255, 262, 267, 282, 293, 305, 312, 
        322, 332, 342, 350, 359, 367, 377, 385, 396, 404, 411, 415, 418, 428, 434, 440, 446, 453, 458, 
        467, 477, 483, 489, 496, 499, 502, 507, 511, 515, 518, 520, 523, 526, 528, 531, 534, 537, 542, 
        545, 549, 551, 553, 554, 556, 558, 560, 562, 564, 566, 568, 570, 572, 574, 575, 577, 578, 580, 
        582, 583, 585, 586, 587, 587, 589, 590, 591, 591, 592, 593, 594, 595, 595, 596, 596, 597, 597, 
        598, 598, 599, 599, 600, 600, 601, 601, 601, 602, 602, 602, 603, 603, 603, 604, 604, 604
    ];

    const surahNames = [
        "Al-Fatihah", "Al-Baqarah", "Al-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus",
        "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha",
        "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum",
        "Luqman", "As-Sajdah", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir",
        "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiyah", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf",
        "Adh-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqi'ah", "Al-Hadid", "Al-Mujadilah", "Al-Hashr", "Al-Mumtahanah",
        "As-Saff", "Al-Jumu'ah", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij",
        "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa",
        "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiyah", "Al-Fajr", "Al-Balad",
        "Ash-Shams", "Al-Layl", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyinah", "Az-Zalzalah", "Al-Adiyat",
        "Al-Qari'ah", "At-Takathur", "Al-Asr", "Al-Humazah", "Al-Fil", "Quraysh", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr",
        "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"
    ];

    function init() {
        const select = document.getElementById('surahSelect');
        surahNames.forEach((name, index) => {
            let opt = document.createElement('option');
            opt.value = surahStartPages[index];
            opt.textContent = `${index + 1}. ${name}`;
            select.appendChild(opt);
        });
        updatePage();
    }

    function updatePage() {
        const img = document.getElementById('mushafImage');
        const loader = document.getElementById('loading');
        loader.style.display = "block";
        img.style.opacity = "0.5";

        // URL del database Mushaf Tajweed Dar Al-Ma'rifah (standard 604 pagine)
        // Utilizziamo un server CDN che ospita le scansioni ufficiali Warsh
        const paddedPage = String(currentPage).padStart(3, '0');
        const imgUrl = `https://raw.githubusercontent.com/QuranHub/quran-pages-images/master/warsh/604/${currentPage}.png`;
        
        img.src = imgUrl;
        img.onload = () => {
            img.style.opacity = "1";
            loader.style.display = "none";
        };
        img.onerror = () => {
            // Fallback se GitHub ha problemi
            img.src = `https://www.easyquran.com/quran-jpg-w/${currentPage}.jpg`;
        };

        document.getElementById('pageNumber').innerText = currentPage;
        
        // Aggiorna il selettore se cambiamo pagina sfogliando
        updateSurahSelect();
    }

    function changePage(delta) {
        let next = currentPage + delta;
        if (next >= 1 && next <= 604) {
            currentPage = next;
            updatePage();
        }
    }

    function goToSurah(page) {
        currentPage = parseInt(page);
        updatePage();
    }

    function updateSurahSelect() {
        // Trova la sura corrispondente alla pagina attuale
        let currentSurahIdx = 0;
        for (let i = 0; i < surahStartPages.length; i++) {
            if (currentPage >= surahStartPages[i]) {
                currentSurahIdx = i;
            } else {
                break;
            }
        }
        document.getElementById('surahSelect').value = surahStartPages[currentSurahIdx];
    }

    // Gestione swipe su mobile
    let touchstartX = 0;
    let touchendX = 0;
    
    document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
    document.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        if (touchendX < touchstartX - 50) changePage(-1); // Swipe Sinistra -> Avanti (Arabo)
        if (touchendX > touchstartX + 50) changePage(1);  // Swipe Destra -> Indietro (Arabo)
    });

    window.onload = init;
</script>
</body>
</html>
