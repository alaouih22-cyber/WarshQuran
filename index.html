<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Corano Pro Italiano</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --emerald: #064e3b; 
            --gold: #fbbf24; 
            --dark: #022c22;
            --paper: #fdf6e3;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background-color: var(--dark); 
            color: var(--dark); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Cornice Ornamentale Mushaf */
        .app-shell {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 8px solid var(--emerald);
            outline: 2px solid var(--gold);
            outline-offset: -5px;
            background-color: var(--paper);
            margin: env(safe-area-inset-top) 5px env(safe-area-inset-bottom) 5px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        /* Header Professionale */
        .header { 
            background: var(--emerald); 
            padding: 15px 10px; 
            color: var(--gold);
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }
        
        .search-bar {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.1);
        }

        .search-bar input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--gold);
            background: var(--paper);
            font-size: 14px;
        }

        /* Area Lettura */
        .reader-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        .surah-intro {
            text-align: center;
            border-bottom: 2px double var(--gold);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .surah-intro h2 { 
            font-family: 'Amiri', serif; 
            font-size: 2.5rem; 
            margin: 0; 
            color: var(--emerald);
        }

        .ayah-block {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(255,255,255,0.5);
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
            line-height: 1.8;
            font-size: 1.15rem;
        }

        .ayah-block:hover { border-color: var(--gold); background: #fff; }
        .ayah-block.active { border-color: var(--gold); background: #fef3c7; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .ayah-num {
            font-weight: bold;
            color: var(--emerald);
            border: 1.5px solid var(--emerald);
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 10px;
            font-size: 0.8rem;
        }

        /* Navigazione Bottom */
        .footer-nav {
            background: var(--emerald);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: var(--gold);
        }

        .btn-action {
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #b48904;
        }

        .btn-action:active { transform: translateY(2px); box-shadow: none; }

        #audio-player { display: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div style="font-weight: bold; letter-spacing: 1px;">
            <i class="fas fa-star-and-crescent"></i> AL-QUR'AN PRO
        </div>
        <div class="search-bar">
            <input type="number" id="suraNum" placeholder="Sura (1-114)">
            <input type="number" id="ayahNum" placeholder="Vers.">
            <button onclick="search()" class="btn-action" style="padding: 10px;"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="reader-area" id="reader">
        </div>

    <audio id="audio-player"></audio>

    <div class="footer-nav">
        <button class="btn-action" onclick="nav(-1)"><i class="fas fa-chevron-left"></i></button>
        <div id="info" style="text-align: center; font-weight: bold;">Sura 1</div>
        <button class="btn-action" onclick="nav(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<script>
    let currentS = 1;
    const reader = document.getElementById('reader');
    const player = document.getElementById('audio-player');

    async function load(s, a = null) {
        reader.innerHTML = "<div style='text-align:center; padding:50px;'>Caricamento Sacro Testo...</div>";
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`);
            const d = await res.json();
            const surah = d.data;
            currentS = s;
            
            document.getElementById('info').innerHTML = `SURA ${s}<br><small>${surah.englishName}</small>`;

            let html = `
                <div class="surah-intro">
                    <h2>${surah.name}</h2>
                    <p>${surah.englishNameTranslation}</p>
                </div>
            `;

            surah.ayahs.forEach(v => {
                html += `
                    <div class="ayah-block" id="v-${v.numberInSurah}" onclick="play(${s}, ${v.numberInSurah}, this)">
                        <span class="ayah-num">${v.numberInSurah}</span>
                        <span>${v.text}</span>
                    </div>
                `;
            });

            reader.innerHTML = html;

            if(a) {
                setTimeout(() => {
                    const el = document.getElementById(`v-${a}`);
                    if(el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.classList.add('active'); }
                }, 400);
            }
        } catch(e) { reader.innerHTML = "Errore. Verifica connessione."; }
    }

    function play(s, a, el) {
        document.querySelectorAll('.ayah-block').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        
        // Audio Al-Afasy
        const sStr = String(s).padStart(3, '0');
        const aStr = String(a).padStart(3, '0');
        player.src = `https://www.everyayah.com/data/Alafasy_128kbps/${sStr}${aStr}.mp3`;
        player.play();
    }

    function nav(d) {
        let n = currentS + d;
        if(n >= 1 && n <= 114) load(n);
    }

    function search() {
        const s = document.getElementById('suraNum').value;
        const a = document.getElementById('ayahNum').value;
        if(s >= 1 && s <= 114) load(s, a);
    }

    window.onload = () => load(1);
</script>

</body>
</html>
