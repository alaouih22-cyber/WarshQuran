<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran App Tajweed</title>
    <style>
        /* TUTTO LO STILE QUI DENTRO */
        body { 
            margin: 0; 
            background-color: #020617; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: sans-serif;
            overflow: hidden;
            color: white;
        }
        .mushaf-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: radial-gradient(circle, #1e293b 0%, #020617 100%);
            cursor: pointer;
        }
        #quran-page {
            max-width: 100%;
            max-height: 100%;
            border-radius: 5px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            background: white;
        }
        .bottom-bar {
            background-color: #0f172a;
            border-top: 2px solid #eab308;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
        }
        .nav-btn {
            background: #eab308;
            color: #020617;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .nav-btn:active { transform: scale(0.95); }
        .page-info { font-weight: bold; line-height: 1.2; }
        #loading {
            position: fixed;
            top: 20px;
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 30px;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading">... جاري التحميل</div>

    <div class="mushaf-container" onclick="handleTap(event)">
        <img id="quran-page" src="1.png" alt="Quran Page">
    </div>

    <div class="bottom-bar">
        <button class="nav-btn" onclick="prevPage()">السابق</button>
        <div class="page-info">
            <span id="surah-name">الفاتحة</span><br>
            <small>صفحة <span id="page-num">1</span></small>
        </div>
        <button class="nav-btn" onclick="nextPage()">التالي</button>
    </div>

    <script>
        /* TUTTA LA LOGICA QUI DENTRO */
        let currentPage = 1;
        const img = document.getElementById('quran-page');
        const pageDisplay = document.getElementById('page-num');
        const loader = document.getElementById('loading');

        function loadPage(n) {
            if (n < 1 || n > 604) return;
            currentPage = n;
            
            if(loader) loader.style.display = "block";

            // Se è pagina 1 usa il tuo file, altrimenti server esterno
            if (n === 1) {
                img.src = "1.png";
            } else {
                img.src = `https://pwanew.mohib.me/tajweed_png/${n}.png`;
            }

            img.onload = () => {
                if(loader) loader.style.display = "none";
                pageDisplay.textContent = n;
                // Aggiorna nome Sura (semplificato)
                document.getElementById('surah-name').textContent = n === 1 ? "الفاتحة" : "القرآن الكريم";
            };

            img.onerror = () => {
                if(loader) loader.style.display = "none";
                // Fallback se il primo server fallisce
                img.src = `https://www.searchtruth.org/quran/images2/${n}.png`;
            };
        }

        function nextPage() { loadPage(currentPage + 1); }
        function prevPage() { loadPage(currentPage - 1); }

        // Tocco schermo: sinistra avanti, destra indietro
        function handleTap(e) {
            const x = e.clientX;
            const w = window.innerWidth;
            if (x < w / 2) { nextPage(); } else { prevPage(); }
        }

        // Avvio istantaneo
        window.onload = () => loadPage(1);
    </script>
</body>
</html>
