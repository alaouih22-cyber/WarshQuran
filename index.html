<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>القرآن ورش ملون</title>

<style>

body{
font-family: "Amiri", serif;
margin:0;
background:#f2f2f2;
}

header{
background:#0b6b50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.controls{
padding:10px;
background:white;
text-align:center;
}

select,input{
padding:8px;
margin:5px;
font-size:16px;
}

.ayah{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.ar{
font-size:30px;
line-height:2.2;
}

.it{
direction:ltr;
font-size:16px;
color:#444;
margin-top:10px;
}

audio{
width:100%;
margin-top:10px;
}

#tafsirBox{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
max-height:60%;
overflow:auto;
display:none;
padding:20px;
border-top:4px solid #0b6b50;
}

.dark{
background:#121212;
color:white;
}

.dark .ayah{
background:#1e1e1e;
}

button{
padding:8px 14px;
border:none;
background:#0b6b50;
color:white;
margin:5px;
}

</style>

</head>

<body>

<header>
📖 القرآن الكريم – رواية ورش
</header>

<div class="controls">

<select id="surah"></select>

<select id="reciter">

<option value="ar.alafasy">العفاسي</option>
<option value="ar.minshawi">المنشاوي</option>
<option value="ar.husary">الحصري</option>

</select>

<input id="search" placeholder="🔍 Cerca parola">

<button onclick="toggleDark()">🌙</button>

</div>

<div id="quran"></div>

<div id="tafsirBox">

<button onclick="closeTafsir()">Chiudi</button>

<div id="tafsirText"></div>

</div>

<script>

const surahSelect=document.getElementById("surah")
const quran=document.getElementById("quran")

async function loadSurahList(){

let res=await fetch("https://api.alquran.cloud/v1/surah")
let data=await res.json()

data.data.forEach(s=>{

let o=document.createElement("option")
o.value=s.number
o.text=s.number+" - "+s.englishName

surahSelect.appendChild(o)

})

loadSurah(1)

}

surahSelect.onchange=()=>{

loadSurah(surahSelect.value)

}

async function loadSurah(num){

quran.innerHTML="Loading..."

let rec=document.getElementById("reciter").value

let res=await fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,it.piccardo,${rec}`)

let data=await res.json()

let arabic=data.data[0].ayahs
let trans=data.data[1].ayahs
let audio=data.data[2].ayahs

quran.innerHTML=""

arabic.forEach((a,i)=>{

let div=document.createElement("div")
div.className="ayah"

div.innerHTML=`

<div class="ar">${a.text} ﴿${a.numberInSurah}﴾</div>

<div class="it">${trans[i].text}</div>

<audio controls src="${audio[i].audio}"></audio>

<button onclick="bookmark(${num},${a.numberInSurah})">⭐</button>

`

div.onclick=()=>loadTafsir(num,a.numberInSurah)

quran.appendChild(div)

})

}

async function loadTafsir(s,a){

document.getElementById("tafsirBox").style.display="block"

document.getElementById("tafsirText").innerHTML="Loading..."

let res=await fetch(`https://api.quran.com/api/v4/tafsirs/169/by_ayah/${s}:${a}`)

let data=await res.json()

if(data.tafsir)

document.getElementById("tafsirText").innerHTML=data.tafsir.text

else

document.getElementById("tafsirText").innerHTML="Tafsir non disponibile"

}

function closeTafsir(){

document.getElementById("tafsirBox").style.display="none"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function bookmark(s,a){

localStorage.setItem("bookmark",s+":"+a)

alert("Segnalibro salvato")

}

loadSurahList()

</script>

</body>

</html>
