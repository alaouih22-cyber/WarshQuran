<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran Ultimate Offline</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--bg:#042f2e;
--card:#111;
--gold:#d4af37;
--text:#fff;
}

body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif}

header{padding:15px;background:#000;color:var(--gold);text-align:center}

select,button{
margin:5px;
padding:10px;
background:#111;
color:#fff;
border:1px solid var(--gold);
border-radius:10px;
}

.tabs{display:flex;background:#000}
.tab{flex:1;padding:12px;text-align:center;color:var(--gold)}
.tab.active{background:var(--gold);color:#000}

#content{height:75vh;overflow:hidden}

.ayah{padding:10px;border-radius:10px;margin-bottom:10px}

</style>
</head>

<body>

<header>QURAN OFFLINE PRO</header>

<select id="surahSelect"></select>
<select id="reciterSelect">
<option value="Husary_Warsh_64kbps">Warsh</option>
</select>

<button onclick="downloadSurah()">⬇️ Download Surah</button>

<div class="tabs">
<div class="tab active" onclick="switchTab('mushaf')" id="tab-mushaf">المصحف</div>
<div class="tab" onclick="switchTab('reader')" id="tab-reader">قراءة</div>
</div>

<div id="content"></div>

<audio id="audio"></audio>

<script>

// ====== STATE ======
let currentSurah=1;
let ayahs=[];
let currentAyah=0;
let currentPage=0;
let isPlaying=false;
let tab="mushaf";

const content=document.getElementById("content");
const audio=document.getElementById("audio");

// ====== INIT ======
window.onload=()=>{
for(let i=1;i<=114;i++){
let o=document.createElement("option");
o.value=i;
o.textContent="Surah "+i;
surahSelect.appendChild(o);
}

// restore progress
currentSurah=localStorage.getItem("s")||1;
currentAyah=localStorage.getItem("a")||0;
currentPage=localStorage.getItem("p")||0;

loadSurah(currentSurah);
};

// ====== LOAD ======
async function loadSurah(s){

currentSurah=s;

let cached=localStorage.getItem("surah_"+s);

if(cached){
ayahs=JSON.parse(cached);
render();
return;
}

const [ar,it,ex]=await Promise.all([
fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`),
fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.muyassar`)
]);

const dAr=await ar.json();
const dIt=await it.json();
const dEx=await ex.json();

ayahs=dAr.data.ayahs.map((a,i)=>({
n:a.numberInSurah,
ar:a.text,
it:dIt.data.ayahs[i].text,
ex:dEx.data.ayahs[i].text
}));

render();
}

// ====== RENDER ======
function render(){

if(tab==="mushaf"){
renderMushaf();
}else{
content.innerHTML="reader";
}

}

// ====== MUSHAF ======
function renderMushaf(){

content.innerHTML=`<div id="slider" style="display:flex;height:100%;transition:.4s"></div>`;
const slider=document.getElementById("slider");

let page="",count=0;

ayahs.forEach((a,i)=>{

page+=`
<div class="ayah" onclick="play(${i})" id="ay${i}">
<div style="direction:rtl;font-size:2rem">${a.ar} (${a.n})</div>
<div>${a.it}</div>
<div style="font-size:.8rem;color:#aaa">${a.ex}</div>
</div>`;

count++;

if(count===8||i===ayahs.length-1){
let p=document.createElement("div");
p.style.minWidth="100%";
p.style.overflowY="auto";
p.innerHTML=`<div style="padding:10px;background:#111">${page}</div>`;
slider.appendChild(p);
page="";count=0;
}

});

initSwipe();
goToPage(currentPage);

}

// ====== AUDIO ======
function play(i){

currentAyah=i;

let s=String(currentSurah).padStart(3,"0");
let a=String(ayahs[i].n).padStart(3,"0");

audio.src=`https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${a}.mp3`;

audio.play();
isPlaying=true;

saveProgress();
highlight();

}

audio.onended=()=>{
if(currentAyah<ayahs.length-1){
play(currentAyah+1);
}
};

// ====== HIGHLIGHT ======
function highlight(){

document.querySelectorAll(".ayah").forEach((el,i)=>{
el.style.background=i===currentAyah?"rgba(212,175,55,0.2)":"transparent";
});

}

// ====== SWIPE ======
let startX=0;

function initSwipe(){
const slider=document.getElementById("slider");

slider.addEventListener("touchstart",e=>startX=e.touches[0].clientX);

slider.addEventListener("touchend",e=>{
let diff=startX-e.changedTouches[0].clientX;
if(diff>50) next();
if(diff<-50) prev();
});
}

function next(){currentPage++;updateSlide()}
function prev(){if(currentPage>0)currentPage--;updateSlide()}

function updateSlide(){
document.getElementById("slider").style.transform=`translateX(-${currentPage*100}%)`;
saveProgress();
}

function goToPage(p){
setTimeout(()=>updateSlide(),100);
}

// ====== DOWNLOAD ======
async function downloadSurah(){

localStorage.setItem("surah_"+currentSurah,JSON.stringify(ayahs));

for(let i=0;i<ayahs.length;i++){
let s=String(currentSurah).padStart(3,"0");
let a=String(ayahs[i].n).padStart(3,"0");
let url=`https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${a}.mp3`;

fetch(url).then(r=>r.blob()).then(b=>{
let reader=new FileReader();
reader.onload=()=>localStorage.setItem(`audio_${s}${a}`,reader.result);
reader.readAsDataURL(b);
});
}

alert("Surah salvata offline!");
}

// ====== PROGRESS ======
function saveProgress(){
localStorage.setItem("s",currentSurah);
localStorage.setItem("a",currentAyah);
localStorage.setItem("p",currentPage);
}

// ====== TAB ======
function switchTab(t){
tab=t;
document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
document.getElementById("tab-"+t).classList.add("active");
render();
}

</script>

</body>
</html>
