<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Qur'an Warsh Tajweed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #064e3b; --gold: #fbbf24; --paper: #fdf6e3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background-color: var(--emerald); overflow: hidden; font-family: serif; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: fixed; }

        /* Header compatto */
        .header { background: var(--emerald); color: var(--gold); padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); }
        .controls { display: flex; gap: 8px; padding: 8px; background: rgba(0,0,0,0.2); }
        
        select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--gold); background: var(--paper); font-weight: bold; }
        .btn-toggle { background: var(--gold); color: var(--emerald); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Area Mushaf Reality */
        .mushaf-container {
            flex: 1;
            margin: 5px;
            background-color: var(--paper);
            border: 4px double var(--gold);
            border-radius: 12px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        #mushaf-img {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: auto;
        }

        /* Footer Navigazione */
        .footer { background: var(--emerald); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--gold); }
        .btn-nav { background: var(--gold); color: var(--emerald); border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; }
        .info { text-align: center; color: var(--gold); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <b><i class="fas fa-quran"></i> WARSH TAJWEED MAROCCHINO</b>
        <div class="controls">
            <select id="surahSelect" onchange="goToSurah(this.value)"></select>
            <button class="btn-toggle" onclick="alert('Modalità Tajweed Attiva')"><i class="fas fa-check-circle"></i> Tajweed</button>
        </div>
    </div>

    <div class="mushaf-container">
        <img id="mushaf-img" src="https://www.maroc.ma/sites/default/files/corano_page_1.jpg" alt="Mushaf Tajweed">
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="changePage(-1)"><i class="fas fa-arrow-left"></i></button>
        <div class="info">
            <b id="surahLabel">Sura 1</b><br>
            <small id="pageLabel">Pagina 1</small>
        </div>
        <button class="btn-nav" onclick="changePage(1)"><i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<script>
    let currentPage = 1;
    const img = document.getElementById('mushaf-img');
    const surahSelect = document.getElementById('surahSelect');

    // Mappa delle pagine iniziali delle Sure (approssimativa per Warsh)
    const surahToPage = { 1: 1, 2: 2, 3: 50, 4: 77 }; // Aggiungi le altre pagine qui

    async function init() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        data.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.textContent = `${s.number}. ${s.englishName}`;
            surahSelect.appendChild(opt);
        });
        loadPage(1);
    }

    function loadPage(p) {
        if(p < 1) p = 1;
        if(p > 604) p = 604;
        currentPage = p;
        
        // Link alle immagini del Mushaf Warsh Marocchino (Tajweed colori)
        // Utilizziamo un server affidabile per le immagini Warsh
        img.src = `https://mushaf.ma/images/warsh/page${String(p).padStart(3, '0')}.png`;
        
        document.getElementById('pageLabel').innerText = `Pagina ${p}`;
        img.onerror = function() {
            // Backup se il server principale è giù
            this.src = `https://read.thequran.cloud/images/mushaf/warsh/page${p}.png`;
        };
    }

    function changePage(d) {
        loadPage(currentPage + d);
    }

    function goToSurah(s) {
        // Qui dovresti avere la logica per trovare la pagina esatta della sura
        // Per ora usiamo una logica di esempio:
        fetch(`https://api.alquran.cloud/v1/surah/${s}`)
        .then(res => res.json())
        .then(d => {
            loadPage(d.data.ayahs[0].page);
            document.getElementById('surahLabel').innerText = `Sura ${s}`;
        });
    }

    window.onload = init;
</script>
</body>
</html>
