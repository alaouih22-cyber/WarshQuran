<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Tajweed Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark-blue: #0f172a; --black: #020617; }
        body { margin: 0; background-color: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Area Mushaf */
        .mushaf-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; cursor: pointer; }
        #quran-img { max-width: 100%; max-height: 85vh; border: 2px solid var(--gold); border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: white; }

        /* Menu Centrale (L'Anima) */
        .overlay-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); border: 2px solid var(--gold); border-radius: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 25px; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay-menu.show { opacity: 1; pointer-events: auto; }
        .menu-item { text-align: center; color: var(--gold); cursor: pointer; }
        .menu-item i { display: block; font-size: 30px; margin-bottom: 8px; }

        /* Pannello Testi (Traduzione/Tafsir) */
        .info-panel { height: 35vh; background: var(--dark-blue); border-top: 3px solid var(--gold); padding: 20px; overflow-y: auto; display: none; }
        .info-panel.active { display: block; }
        .text-it { text-align: left; color: #f1f5f9; font-size: 1.1rem; line-height: 1.7; border-bottom: 1px solid #334155; padding: 15px 0; }

        /* Footer */
        .footer { background: var(--dark-blue); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gold); }
        .btn-nav { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #loading { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 5px 15px; border-radius: 20px; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading">Caricamento Tajweed Online...</div>

    <div class="mushaf-container" onclick="toggleMenu()">
        <img id="quran-img" src="https://www.searchtruth.org/quran/images2/1.png" alt="Quran Page">
        
        <div id="main-menu" class="overlay-menu">
            <div class="menu-item" onclick="showContent('audio')"><i class="fas fa-play"></i>Ascolta</div>
            <div class="menu-item" onclick="showContent('trans')"><i class="fas fa-language"></i>Traduzione</div>
            <div class="menu-item" onclick="showContent('tafsir')"><i class="fas fa-book-open"></i>Tafsir</div>
            <div class="menu-item" onclick="window.open('https://sufi.it/wp-content/uploads/il-corano-in-italiano.pdf')"><i class="fas fa-file-pdf"></i>PDF Italiano</div>
        </div>
    </div>

    <div id="info-panel" class="info-panel">
        <div id="panel-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="changePage(-1)">← Prec</button>
        <div style="text-align:center">
            <b id="page-label">Pagina</b><br>
            <b id="page-num" style="color:var(--gold)">1</b>
        </div>
        <button class="btn-nav" onclick="changePage(1)">Succ →</button>
    </div>

    <script>
        let currentPage = 1;
        const img = document.getElementById('quran-img');
        const loader = document.getElementById('loading');
        const panel = document.getElementById('info-panel');
        const content = document.getElementById('panel-content');

        // Funzione per prendere la traduzione italiana dal PDF/API online
        async function fetchTranslation(page) {
            content.innerHTML = "Caricamento traduzione italiana...";
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/page/${page}/it.piccardo`);
                const data = await res.json();
                let html = "";
                data.data.ayahs.forEach(ayah => {
                    html += `<div class="text-it"><b>${ayah.numberInSurah}.</b> ${ayah.text}</div>`;
                });
                content.innerHTML = html;
            } catch (e) { content.innerHTML = "Connessione internet necessaria per la traduzione."; }
        }

        function toggleMenu() { document.getElementById('main-menu').classList.toggle('show'); }

        function showContent(type) {
            panel.classList.add('active');
            if(type === 'trans') fetchTranslation(currentPage);
            if(type === 'audio') {
                content.innerHTML = `<h3>Audio Pagina ${currentPage}</h3><audio controls autoplay style="width:100%"><source src="https://www.searchtruth.org/quran/audio/page/${currentPage}.mp3"></audio>`;
            }
            if(type === 'tafsir') content.innerHTML = `<h3>Tafsir</h3><p>Spiegazione della pagina ${currentPage} in arrivo...</p>`;
            document.getElementById('main-menu').classList.remove('show');
        }

        function changePage(delta) {
            let next = currentPage + delta;
            if(next < 1 || next > 604) return;
            currentPage = next;
            
            loader.style.display = 'block';
            // Link diretto alle immagini Tajweed professionali
            img.src = `https://www.searchtruth.org/quran/images2/${currentPage}.png`;
            
            img.onload = () => {
                loader.style.display = 'none';
                document.getElementById('page-num').innerText = currentPage;
                if(panel.classList.contains('active')) fetchTranslation(currentPage);
            };

            img.onerror = () => {
                // Server di riserva se il primo è lento
                img.src = `https://pwanew.mohib.me/tajweed_png/${currentPage}.png`;
            };
        }
    </script>
</body>
</html>
