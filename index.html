<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mushaf Tajweed Warsh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --mushaf-bg: #fffbf0; 
            --taj-madd: #eb0000; 
            --taj-ghunnah: #00a651; 
            --taj-qalqalah: #0072bc;
            --emerald: #064e3b;
            --gold-dark: #8d6e35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: #1a1a1a; 
            overflow: hidden; 
            font-family: 'Amiri', serif; 
        }

        /* App Wrapper */
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100%; }

        /* Toolbar superiore ultra-compatta per non disturbare la vista */
        .header { background: #064e3b; padding: 5px; display: flex; gap: 5px; justify-content: center; border-bottom: 2px solid #c5a059; }
        select, input, .btn-mode { 
            background: #fff; border: 1px solid #c5a059; padding: 5px; border-radius: 4px; font-size: 12px; font-weight: bold; 
        }

        /* AREA MUSHAF: La parte artistica */
        .mushaf-page {
            flex: 1;
            margin: 10px;
            background-color: var(--mushaf-bg);
            position: relative;
            overflow-y: auto;
            /* Cornice decorativa marocchina */
            border: 18px solid transparent;
            border-image: url('https://img.freepik.com/free-vector/arabic-pattern-border-design_23-2148906366.jpg?size=626&ext=jpg') 30 stretch;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Targa Titolo Sura stile Marocchino */
        .surah-header {
            width: 90%;
            margin-top: 20px;
            background: #fff;
            border: 2px solid #064e3b;
            padding: 10px;
            text-align: center;
            position: relative;
            background-image: linear-gradient(to bottom, #fff, #f0f0f0);
            border-radius: 5px;
        }
        .surah-header::before, .surah-header::after {
            content: "✦"; color: #c5a059; position: absolute; top: 50%; transform: translateY(-50%); font-size: 20px;
        }
        .surah-header::before { left: 10px; } .surah-header::after { right: 10px; }
        
        .surah-name { font-size: 1.8rem; font-weight: bold; color: #064e3b; }

        .bismillah { font-size: 2.2rem; margin: 30px 0; color: #000; text-align: center; }

        /* Testo Coranico Continuo */
        .quran-content {
            padding: 0 15px 40px 15px;
            direction: rtl;
            text-align: justify;
            font-size: 2.2rem;
            line-height: 2.5;
            color: #1a1a1a;
            font-family: 'Noto Naskh Arabic', serif;
        }

        /* Simbolo Fine Versetto (Ayah) */
        .ayah-end {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            margin: 0 8px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 L90 30 L90 70 L50 95 L10 70 L10 30 Z" fill="none" stroke="%238d6e35" stroke-width="6"/><circle cx="50" cy="50" r="22" fill="%238d6e35" opacity="0.1"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            font-size: 1rem;
            font-family: sans-serif;
            font-weight: bold;
            color: #8d6e35;
            vertical-align: middle;
        }

        /* Colori Tajweed definiti */
        .taj-madd { color: var(--taj-madd); }
        .taj-ghun { color: var(--taj-ghunnah); }
        .taj-qal { color: var(--taj-qalqalah); }

        /* Legenda in basso (come nella tua foto) */
        .legenda {
            background: #fff; border-top: 2px solid #c5a059;
            padding: 10px; display: grid; grid-template-columns: 1fr 1fr;
            font-size: 10px; direction: rtl; text-align: right; gap: 5px;
        }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        .active-ayah { background: rgba(197, 160, 89, 0.2); border-radius: 5px; }

        /* Footer Navigazione */
        .footer { background: #064e3b; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #c5a059; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <select id="surahSelect" onchange="load(this.value)"></select>
        <input type="number" id="ayahIn" placeholder="V.">
        <button onclick="goToAyah()" class="btn-mode"><i class="fas fa-search"></i></button>
        <button onclick="toggleMode()" id="modeBtn" class="btn-mode">ITALIANO</button>
    </div>

    <div class="mushaf-page" id="reader">
        <!-- Il contenuto viene generato qui -->
    </div>

    <!-- Legenda Tajweed stile Mushaf -->
    <div class="legenda" id="legendaBox">
        <div class="leg-item"><span class="dot" style="background:var(--taj-madd)"></span> Madd (Prolungamento)</div>
        <div class="leg-item"><span class="dot" style="background:var(--taj-ghunnah)"></span> Ghunnah (Nasalizzazione)</div>
        <div class="leg-item"><span class="dot" style="background:var(--taj-qalqalah)"></span> Qalqalah (Rimbombo)</div>
        <div class="leg-item"><span class="dot" style="background:#999"></span> Ikhfa/Idgham</div>
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="nav(-1)"><i class="fas fa-arrow-right"></i></button>
        <span id="label" style="color:#c5a059; font-weight:bold;">Al-Fatiha</span>
        <button class="btn-nav" onclick="nav(1)"><i class="fas fa-arrow-left"></i></button>
    </div>
</div>

<audio id="player"></audio>

<script>
    let curS = 1;
    let mode = 'warsh';
    const reader = document.getElementById('reader');
    const player = document.getElementById('player');

    async function init() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const d = await res.json();
        d.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.textContent = `${s.number}. ${s.englishName}`;
            document.getElementById('surahSelect').appendChild(opt);
        });
        load(1);
    }

    async function load(s, a = null) {
        curS = s;
        document.getElementById('surahSelect').value = s;
        reader.innerHTML = "<p>Caricamento...</p>";
        
        const edition = (mode === 'warsh') ? 'ar.tajweed' : 'it.piccardo';
        
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/${edition}`);
            const d = await res.json();
            const surah = d.data;

            document.getElementById('label').innerText = surah.englishName;

            if (mode === 'warsh') {
                renderWarsh(surah);
            } else {
                renderItalian(surah);
            }

            if(a) {
                setTimeout(() => {
                    const el = document.getElementById(`v-${a}`);
                    if(el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.classList.add('active-ayah'); }
                }, 500);
            }
        } catch (e) { reader.innerHTML = "Errore."; }
    }

    function renderWarsh(surah) {
        document.getElementById('legendaBox').style.display = 'grid';
        let html = `<div class="surah-header"><div class="surah-name">${surah.name}</div></div>`;
        
        if(curS != 1 && curS != 9) html += `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;

        html += `<div class="quran-content">`;
        surah.ayahs.forEach(v => {
            let t = v.text;
            if(v.numberInSurah === 1 && curS != 1 && curS != 9) t = t.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");

            // Trasforma i tag Tajweed dell'API in classi CSS
            t = t.replace(/\[m/g, '<span class="taj-madd">').replace(/\[g/g, '<span class="taj-ghun">').replace(/\[q/g, '<span class="taj-qal">').replace(/\]/g, '</span>');

            html += `<span id="v-${v.numberInSurah}" onclick="play(${curS}, ${v.numberInSurah}, this)">${t} <span class="ayah-end">${v.numberInSurah}</span></span>`;
        });
        html += `</div>`;
        reader.innerHTML = html;
        reader.style.borderImage = "url('https://img.freepik.com/free-vector/arabic-pattern-border-design_23-2148906366.jpg?size=626&ext=jpg') 30 stretch";
    }

    function renderItalian(surah) {
        document.getElementById('legendaBox').style.display = 'none';
        reader.style.borderImage = "none";
        reader.style.border = "none";
        let html = `<h2 style="padding:20px">${surah.englishName}</h2>`;
        surah.ayahs.forEach(v => {
            html += `<div style="text-align:left; direction:ltr; padding:15px; border-bottom:1px solid #ddd; font-family:sans-serif;" id="v-${v.numberInSurah}" onclick="play(${curS}, ${v.numberInSurah}, this)">
                <b>${v.numberInSurah}.</b> ${v.text}
            </div>`;
        });
        reader.innerHTML = html;
    }

    function play(s, a, el) {
        document.querySelectorAll('span, div').forEach(x => x.classList.remove('active-ayah'));
        el.classList.add('active-ayah');
        player.src = `https://www.everyayah.com/data/Alafasy_128kbps/${String(s).padStart(3, '0')}${String(a).padStart(3, '0')}.mp3`;
        player.play();
    }

    function toggleMode() {
        mode = (mode === 'warsh') ? 'it' : 'warsh';
        document.getElementById('modeBtn').innerText = (mode === 'warsh') ? 'ITALIANO' : 'WARSH';
        load(curS);
    }

    function nav(d) { let n = curS + d; if(n >= 1 && n <= 114) load(n); }
    function goToAyah() { const a = document.getElementById('ayahIn').value; if(a) load(curS, a); }

    window.onload = init;
</script>
</body>
</html>
