<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>القرآن الكريم ورش ملون</title>

<style>

body{
margin:0;
font-family: "Amiri", serif;
background:#f3f3f3;
}

header{
background:#0b6b50;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

.controls{
background:white;
padding:10px;
text-align:center;
}

input,select{
padding:8px;
margin:5px;
font-size:16px;
}

button{
padding:8px 15px;
border:none;
background:#0b6b50;
color:white;
margin:5px;
}

#pageContainer{
text-align:center;
padding:10px;
}

#pageImg{
width:100%;
max-width:900px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.25);
}

audio{
width:100%;
margin-top:10px;
}

.dark{
background:#121212;
color:white;
}

#tafsir{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
max-height:60%;
overflow:auto;
display:none;
padding:20px;
border-top:4px solid #0b6b50;
}

</style>

</head>

<body>

<header>
📖 القرآن الكريم – رواية ورش
</header>

<div class="controls">

Pagina

<input type="number" id="pageInput" value="1" min="1" max="604">

<button onclick="loadPage()">Apri</button>

<button onclick="prevPage()">◀</button>
<button onclick="nextPage()">▶</button>

<br>

<select id="reciter">

<option value="omar-al-qazabri">القزابري</option>
<option value="abdellah-kamel">عبد الله كامل</option>
<option value="yassin-jazaery">ياسين الجزائري</option>

</select>

<input id="search" placeholder="🔎 Cerca parola">

<button onclick="toggleDark()">🌙</button>

</div>

<div id="pageContainer">

<img id="pageImg">

<audio id="audio" controls></audio>

</div>

<div id="tafsir">

<button onclick="closeTafsir()">Chiudi</button>

<div id="tafsirText"></div>

</div>

<script>

let page=1

function loadPage(){

page=document.getElementById("pageInput").value

document.getElementById("pageImg").src=
"https://raw.githubusercontent.com/quran-data/warsh-mushaf/main/pages/"+page+".jpg"

loadAudio()

}

function prevPage(){

if(page>1){

page--

document.getElementById("pageInput").value=page

loadPage()

}

}

function nextPage(){

if(page<604){

page++

document.getElementById("pageInput").value=page

loadPage()

}

}

function loadAudio(){

let reciter=document.getElementById("reciter").value

document.getElementById("audio").src=
"https://server8.mp3quran.net/"+reciter+"/001.mp3"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function closeTafsir(){

document.getElementById("tafsir").style.display="none"

}

loadPage()

</script>

</body>

</html>
