<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Al-Qur'an Warsh Premium</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-bg: #050505;
            --p-green: #042f2e;
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --card-bg: #111111;
            --text-dim: #a0aec0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: #0f0f0f; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 2px solid var(--gold); overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .side-header { padding: 30px 20px; background: var(--p-green); border-bottom: 2px solid var(--gold); color: var(--gold-bright); font-weight: bold; font-size: 1.2rem; }
        .surah-item { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .surah-item:active { background: #1a1a1a; }
        .surah-num { color: var(--gold); font-weight: bold; font-size: 0.8rem; }

        /* --- APP SHELL --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* Navbar */
        .navbar {
            padding: 15px 20px; background: var(--p-green); 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1.5px solid var(--gold); z-index: 500;
        }
        .nav-icon { font-size: 1.4rem; color: var(--gold-bright); cursor: pointer; }
        .nav-title { font-weight: 800; color: var(--gold-bright); font-size: 0.9rem; letter-spacing: 1px; }

        /* Tabs */
        .tabs { display: flex; background: #000; padding: 5px; gap: 5px; border-bottom: 1px solid #111; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 0.75rem; font-weight: 800; color: var(--text-dim); cursor: pointer; border-radius: 8px; }
        .tab.active { background: var(--gold); color: black; }

        /* Area Lettura */
        .main-content { flex: 1; overflow-y: auto; background: #080808; position: relative; scroll-behavior: smooth; padding: 15px; }
        
        .ayah-card {
            background: var(--card-bg); border-radius: 20px; padding: 25px; margin-bottom: 20px;
            border-right: 5px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer; transition: 0.3s;
        }
        .ayah-card.active { background: #1a1a1a; border-right-color: var(--gold-bright); transform: scale(1.01); }
        
        .arabic-text {
            direction: rtl; font-family: 'Scheherazade New', serif;
            font-size: 2.3rem; line-height: 2.5; text-align: right; color: #fff;
        }
        .it-text { font-size: 1rem; color: var(--text-dim); margin-top: 15px; font-style: italic; border-top: 1px solid #222; padding-top: 10px; display: block; }
        .extra-box { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px dashed var(--gold); font-size: 0.9rem; color: #ccc; }

        /* Footer Player */
        .player-bar { background: #0f0f0f; padding: 15px 25px; border-top: 2px solid var(--gold); display: flex; align-items: center; gap: 15px; }
        .play-main { width: 55px; height: 55px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: black; cursor: pointer; }
        
        /* Loading */
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2100; display: none; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #111; border-top: 5px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1500; display: none; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div class="overlay-bg" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR CON ELENCO SURE -->
<div class="sidebar" id="sidebar">
    <div class="side-header">فهرس السور (Indice)</div>
    <div id="surahList">
        <!-- Popolato via JS -->
    </div>
</div>

<div class="app-shell">
    <header class="navbar">
        <i class="fas fa-bars-staggered nav-icon" onclick="toggleSidebar()"></i>
        <div class="nav-title">القرآن الكريم - ورش</div>
        <select id="reciterSelect" style="background:#1a1a1a; color:white; border:1px solid var(--gold); border-radius:8px; padding:5px; font-size:0.7rem; outline:none;">
            <option value="Husary_Warsh_64kbps">الحصري (ورش)</option>
            <option value="Kushayli_64kbps">القزابري (ورش)</option>
            <option value="Minshawi_Murattal_128kbps">المنشاوي (حفص)</option>
            <option value="Alafasy_128kbps">العفاسي (حفص)</option>
        </select>
    </header>

    <div class="tabs">
        <div class="tab active" id="tab-reader" onclick="switchTab('reader')">القرآن</div>
        <div class="tab" id="tab-tafsir" onclick="switchTab('tafsir')">التفسير</div>
        <div class="tab" onclick="window.location.reload()"><i class="fas fa-sync"></i></div>
    </div>

    <main class="main-content" id="mainContent">
        <div id="loader"><div class="spinner"></div></div>
        <div id="renderArea"></div>
    </main>

    <footer class="player-bar">
        <div class="play-main" onclick="togglePlayback()"><i class="fas fa-play" id="playIcon"></i></div>
        <div style="flex:1; overflow:hidden;">
            <div id="curAyahName" style="font-size:0.85rem; font-weight:800; color:var(--gold-bright); white-space:nowrap;">اختر آية للاستماع</div>
            <div id="curStatus" style="font-size:0.6rem; color:var(--text-dim);">برواية ورش عن نافع</div>
        </div>
        <i class="fas fa-step-forward" style="color:var(--gold); font-size:1.3rem; cursor:pointer;" onclick="nextAyah()"></i>
    </footer>
</div>

<audio id="audioEngine"></audio>

<script>
    let currentSurah = 1, currentAyahIdx = 0, ayahsData = [], isPlaying = false, activeTab = 'reader';
    const audio = document.getElementById('audioEngine'), renderArea = document.getElementById('renderArea'), loader = document.getElementById('loader');

    const surahNamesAr = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    window.onload = () => {
        const listCont = document.getElementById('surahList');
        surahNamesAr.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = 'surah-item';
            div.innerHTML = `<span>${name}</span> <span class="surah-num">${i+1}</span>`;
            div.onclick = () => { loadSurah(i+1); toggleSidebar(); };
            listCont.appendChild(div);
        });
        loadSurah(1);
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
    }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${t}`).classList.add('active');
        renderContent();
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        loader.style.display = 'block';
        try {
            // Carichiamo Arabo Warsh, Italiano Piccardo e Tafsir Jalalayn
            const [resAr, resIt, resTaf, resAsbab] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.jalalayn`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.asbab`)
            ]);

            const dAr = await resAr.json(), dIt = await resIt.json(), dTaf = await resTaf.json(), dAs = await resAsbab.json();
            
            ayahsData = dAr.data.ayahs.map((a, i) => ({
                num: a.numberInSurah,
                ar: a.text,
                it: dIt.data.ayahs[i].text,
                taf: dTaf.data.ayahs[i].text,
                asb: dAs.data.ayahs[i] ? dAs.data.ayahs[i].text : "لا يوجد سبب نزول لهذه الآية"
            }));
            renderContent();
        } catch (e) { renderArea.innerHTML = "خطأ في الاتصال بالإنترنت"; }
        loader.style.display = 'none';
        renderArea.scrollTop = 0;
    }

    function renderContent() {
        renderArea.innerHTML = "";
        ayahsData.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = `ayah-card ${currentAyahIdx === i && isPlaying ? 'active' : ''}`;
            card.id = `ayah-${i}`;
            
            // Fix Warsh Fatiha (Maliki)
            let textAr = a.ar;
            if(currentSurah === 1 && a.num === 4) textAr = "مَلِكِ يَوْمِ الدِّينِ";

            let subContent = (activeTab === 'tafsir') 
                ? `<div class="extra-box"><b style="color:var(--gold)">التفسير:</b> ${a.taf}<br><br><b style="color:var(--gold)">سبب النزول:</b> ${a.asb}</div>` 
                : `<span class="it-text">${a.it}</span>`;

            card.innerHTML = `<div class="arabic-text">${textAr} <span style="color:var(--gold); font-size:1.2rem;">(${a.num})</span></div>${subContent}`;
            card.onclick = () => playAyah(i);
            renderArea.appendChild(card);
        });
    }

    function playAyah(idx) {
        currentAyahIdx = idx;
        const s = String(currentSurah).padStart(3, '0'), v = String(ayahsData[idx].num).padStart(3, '0');
        const rec = document.getElementById('reciterSelect').value;
        
        // Nuova Fonte Audio Sicura
        audio.src = `https://www.everyayah.com/data/${rec}/${s}${v}.mp3`;
        audio.play();
        isPlaying = true;
        updateUI();
    }

    function togglePlayback() {
        if (isPlaying) { audio.pause(); isPlaying = false; }
        else { if(!audio.src) playAyah(0); else audio.play(); isPlaying = true; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('curAyahName').innerText = `${surahNamesAr[currentSurah-1]} - آية ${ayahsData[currentAyahIdx].num}`;
        document.querySelectorAll('.ayah-card').forEach((c, i) => c.classList.toggle('active', i === currentAyahIdx && isPlaying));
    }

    audio.onended = () => {
        if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1);
        else { isPlaying = false; updateUI(); }
    };

    function nextAyah() { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); }
</script>
</body>
</html>
