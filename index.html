<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Qur'an Reality Warsh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #064e3b; --gold: #fbbf24; --paper: #fdf6e3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background-color: var(--emerald); overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: fixed; }

        /* Header */
        .header { background: var(--emerald); color: var(--gold); padding: 10px 5px; text-align: center; border-bottom: 2px solid var(--gold); }
        .controls-row { display: flex; gap: 8px; padding: 8px; background: rgba(0,0,0,0.2); align-items: center; justify-content: center; }
        
        select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--gold); background: var(--paper); font-size: 14px; font-weight: bold; color: var(--emerald); }
        .btn-mode { padding: 10px 15px; border-radius: 8px; border: none; background: var(--gold); color: var(--emerald); font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* Area Principale */
        .main-view { flex: 1; overflow-y: auto; background-color: var(--paper); margin: 8px; border-radius: 12px; border: 4px double var(--gold); position: relative; display: flex; justify-content: center; }

        /* Vista Testo Italiano */
        #text-view { width: 100%; padding: 15px; display: block; }
        .ayah-card { margin-bottom: 12px; padding: 15px; border-radius: 10px; background: #fff; border-left: 5px solid var(--emerald); line-height: 1.6; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Vista Reality (Mushaf Marocchino) */
        #reality-view { display: none; width: 100%; height: 100%; overflow-y: auto; }
        #quran-page { width: 100%; height: auto; display: block; }

        /* Footer */
        .footer { background: var(--emerald); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--gold); }
        .btn-nav { background: var(--gold); color: var(--emerald); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        .info-label { color: var(--gold); text-align: center; line-height: 1.2; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <b style="font-size: 1rem;"><i class="fas fa-quran"></i> AL-QUR'AN WARSH PRO</b>
        <div class="controls-row">
            <select id="surahSelect" onchange="loadSurah(this.value)"></select>
            <button class="btn-mode" onclick="toggleMode()">
                <i class="fas fa-eye"></i> <span id="mode-text">Reality</span>
            </button>
        </div>
    </div>

    <div class="main-view">
        <div id="text-view"></div>
        
        <div id="reality-view">
            <img id="quran-page" src="" alt="Mushaf Warsh">
        </div>
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="nav(-1)"><i class="fas fa-chevron-left"></i></button>
        <div class="info-label">
            <b id="surahLabel">Sura 1</b><br>
            <small id="pageLabel">Pagina 1</small>
        </div>
        <button class="btn-nav" onclick="nav(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<script>
    let curS = 1;
    let curP = 1;
    let isReality = false;

    const textView = document.getElementById('text-view');
    const realityView = document.getElementById('reality-view');
    const qImg = document.getElementById('quran-page');
    const surahSelect = document.getElementById('surahSelect');

    async function init() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const d = await res.json();
        d.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.textContent = `${s.number}. ${s.englishName}`;
            surahSelect.appendChild(opt);
        });
        loadSurah(1);
    }

    async function loadSurah(s) {
        curS = parseInt(s);
        surahSelect.value = s;
        document.getElementById('surahLabel').innerText = `Sura ${s}`;

        // Carica testo italiano
        textView.innerHTML = "<p style='text-align:center'>Caricamento testo...</p>";
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`);
        const d = await res.json();
        
        let html = "";
        d.data.ayahs.forEach(v => {
            html += `<div class="ayah-card"><b>${v.numberInSurah}.</b> ${v.text}</div>`;
        });
        textView.innerHTML = html;

        // Imposta pagina per Reality Mode
        curP = d.data.ayahs[0].page;
        updateImage();
    }

    function updateImage() {
        // Fonte Mushaf Warsh
        qImg.src = `https://www.searchtruth.org/quran/images2/warsh/page${String(curP).padStart(3, '0')}.png`;
        document.getElementById('pageLabel').innerText = `Pagina ${curP}`;
    }

    function toggleMode() {
        isReality = !isReality;
        textView.style.display = isReality ? 'none' : 'block';
        realityView.style.display = isReality ? 'block' : 'none';
        document.getElementById('mode-text').innerText = isReality ? 'Testo' : 'Reality';
    }

    function nav(d) {
        if (isReality) {
            curP += d;
            if(curP < 1) curP = 1;
            if(curP > 604) curP = 604;
            updateImage();
        } else {
            let next = curS + d;
            if(next >= 1 && next <= 114) loadSurah(next);
        }
    }

    window.onload = init;
</script>
</body>
</html>
