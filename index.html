<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Warsh Professional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mushafContainer">
        <img id="pageImg" src="https://www.searchtruth.org/quran/images2/tajweed/1.jpg" alt="Pagina Corano">
        <div id="loadingOverlay" class="hidden">جاري التحميل...</div>
    </div>

    <div id="mainMenu">
        <div class="header-menu">
            <h2>إعدادات المصحف</h2>
        </div>
        
        <div class="control-grid">
            <section>
                <label>السورة (Sura)</label>
                <select id="surahSelect">
                    <option>جاري تحميل السور...</option>
                </select>
            </section>
            
            <section>
                <label>رقم الصفحة (Pagina)</label>
                <input type="number" id="pageInput" min="1" max="604" value="1">
            </section>
        </div>

        <div id="tajweedLegend">
            <h3>دليل ألوان التجويد</h3>
            <div class="legend-grid" style="display: flex; gap: 10px; font-size: 0.8em; justify-content: center; margin-top: 10px;">
                <span style="color: #FF0000;">● مد</span>
                <span style="color: #008000;">● غنة</span>
                <span style="color: #0000FF;">● قلقلة</span>
            </div>
        </div>
    </div>

    <footer id="playerBar">
        <audio id="mainAudio" controls style="width: 100%;"></audio>
    </footer>

    <script src="app.js"></script>
</body>
</html>
