<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <link rel="manifest" href="manifest.json">
    <title>Qur'an Premium Pro Warsh+</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-bg: #050505;
            --panel: #0f0f0f;
            --emerald-ui: #042f2e;
            --gold-ui: #d4af37;
            --gold-bright: #f1c40f;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
            --card-bg: #111111;
        }

        body.light-mode {
            --dark-bg: #f4ece1;
            --panel: #eaddca;
            --emerald-ui: #064e3b;
            --gold-ui: #b45309;
            --gold-bright: #d97706;
            --text-main: #1a202c;
            --text-dim: #4a5568;
            --card-bg: #ffffff;
        }

        /* RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--dark-bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; transition: 0.3s; }

        /* MODALITÀ IMMERSIVA */
        body.immersive .navbar, body.immersive .top-selectors, body.immersive .tabs, body.immersive .player-bar { display: none !important; }
        body.immersive .main-content { height: 100vh !important; padding: 0 !important; }

        /* SIDEBAR */
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; backdrop-filter: blur(5px); }
        .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--panel); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 2px solid var(--gold-ui); overflow-y: auto; }
        .sidebar.open { left: 0; }
        .side-header { padding: 40px 20px; background: linear-gradient(to bottom, var(--emerald-ui), #000); border-bottom: 2px solid var(--gold-ui); text-align: center; color: var(--gold-bright); font-weight: bold; }
        .side-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: var(--text-main); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-item i { color: var(--gold-ui); font-size: 1.2rem; width: 25px; text-align: center; }

        /* UI STRUTTURA */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        .navbar { padding: 15px 20px; background: var(--emerald-ui); display: flex; align-items: center; justify-content: space-between; border-bottom: 1.5px solid var(--gold-ui); z-index: 500; }
        .nav-title { font-weight: 800; color: var(--gold-bright); font-size: .9rem; letter-spacing: 1px; }

        .top-selectors { display: flex; flex-direction: column; background: var(--panel); padding: 10px; gap: 8px; border-bottom: 1px solid rgba(212,175,55,0.1); }
        select { background: var(--dark-bg); color: var(--text-main); border: 1.5px solid var(--gold-ui); padding: 10px; border-radius: 12px; flex: 1; font-weight: bold; outline: none; }

        .tabs { display: flex; background: #000; padding: 5px; gap: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: .75rem; font-weight: 800; color: var(--text-dim); cursor: pointer; border-radius: 8px; }
        .tab.active { background: var(--gold-ui); color: #000; }

        /* CONTENT Area */
        .main-content { flex: 1; overflow-y: auto; background: var(--dark-bg); position: relative; scroll-behavior: smooth; }
        .ayah-card { padding: 25px; border-bottom: 1px solid rgba(212,175,55,0.1); cursor: pointer; background: var(--card-bg); margin: 10px; border-radius: 18px; }
        .ayah-card.active { border-right: 6px solid var(--gold-ui); background: rgba(212,175,55,0.08); }
        .arabic-text { direction: rtl; font-family: 'Scheherazade New', serif; font-size: 2.2rem; line-height: 2.4; text-align: right; color: var(--text-main); }
        .extra-box { margin-top: 15px; padding: 15px; background: rgba(128,128,128,0.05); border-radius: 12px; border: 1px dashed var(--gold-ui); }

        /* MUSHAF (Visualizzatore PDF Integrato) */
        .mushaf-iframe-container { width: 100%; height: 100%; background: #000; display: none; }
        iframe { width: 100%; height: 100%; border: none; }

        /* PLAYER BAR */
        .player-bar { background: var(--panel); padding: 15px 18px; border-top: 2px solid var(--gold-ui); display: flex; align-items: center; gap: 16px; }
        .play-main { width: 55px; height: 55px; background: var(--gold-ui); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #000; cursor: pointer; }
        
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2100; display: none; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--gold-bright); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="overlay-bg" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR REALE -->
<div class="sidebar" id="sidebar">
    <div class="side-header">MENU PREMIUM PRO</div>
    <div class="side-group">
        <div class="side-item" onclick="setTheme('light')"><i class="fas fa-sun"></i> <span>Tema Giorno</span></div>
        <div class="side-item" onclick="setTheme('dark')"><i class="fas fa-moon"></i> <span>Tema Notte</span></div>
    </div>
    <div class="side-group">
        <div class="side-item" onclick="setExtra('tafsir')"><i class="fas fa-book"></i> <span>التفسير (Esegesi)</span></div>
        <div class="side-item" onclick="setExtra('asbab')"><i class="fas fa-history"></i> <span>أسباب النزول (Storia)</span></div>
    </div>
    <div class="side-group">
        <div class="side-item" onclick="toggleImmersive()"><i class="fas fa-eye"></i> <span>Modalità Immersiva</span></div>
        <div class="side-item" onclick="window.location.reload()"><i class="fas fa-sync"></i> <span>Ricarica</span></div>
    </div>
</div>

<div class="app-shell">
    <header class="navbar">
        <i class="fas fa-bars-staggered nav-icon" onclick="toggleSidebar()"></i>
        <div class="nav-title">AL-QUR'AN PREMIUM PRO</div>
        <i class="fas fa-expand nav-icon" onclick="toggleImmersive()"></i>
    </header>

    <div class="top-selectors">
        <div style="display:flex; gap:8px;">
            <select id="surahSelect" onchange="loadSurah(this.value)"></select>
            <select id="reciterSelect">
                <option value="Husary_Warsh_64kbps">Al-Hussary (Warsh)</option>
                <option value="Kushayli_64kbps">Al-Qazabri (Warsh)</option>
                <option value="Minshawi_Murattal_128kbps">Al-Minshawi</option>
                <option value="Alafasy_128kbps">Mishary Alafasy</option>
            </select>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-reader" onclick="switchTab('reader')">LETTURA</div>
        <div class="tab" id="tab-tafsir" onclick="switchTab('tafsir')">TAFSIR</div>
        <div class="tab" id="tab-mushaf" onclick="switchTab('mushaf')">MUSHAF (PDF)</div>
    </div>

    <main class="content-area" id="mainContent" onclick="handleImmersiveClick()">
        <div id="loader"><div class="spinner"></div></div>
        
        <div id="renderArea"></div>

        <!-- CONTAINER PDF PDF -->
        <div id="mushafIframeContainer" class="mushaf-iframe-container">
            <iframe id="pdfFrame" src=""></iframe>
        </div>
    </main>

    <footer class="player-bar">
        <div class="play-main" onclick="togglePlayback()"><i class="fas fa-play" id="playIcon"></i></div>
        <div style="flex:1; overflow:hidden; margin-left:15px;">
            <div id="curAyahName" style="font-size:.85rem; font-weight:800; color:var(--gold-bright); white-space:nowrap;">Seleziona versetto</div>
            <div id="curStatus" style="font-size:.65rem; color:var(--text-dim);">Audio Warsh</div>
        </div>
        <i class="fas fa-step-forward" style="color:var(--gold-ui); font-size:1.3rem; cursor:pointer;" onclick="nextAyah()"></i>
    </footer>
</div>

<audio id="audioEngine"></audio>

<script>
    let currentSurah = 1, currentAyahIdx = 0, ayahsData = [], isPlaying = false, activeTab = 'reader', extraMode = 'tafsir';
    const audio = document.getElementById('audioEngine'), renderArea = document.getElementById('renderArea'), loader = document.getElementById('loader');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];

    window.onload = () => {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
    function toggleImmersive() { document.body.classList.toggle('immersive'); if(document.body.classList.contains('open')) toggleSidebar(); }
    function handleImmersiveClick() { if(document.body.classList.contains('immersive')) toggleImmersive(); }
    function setTheme(m) { if(m === 'light') document.body.classList.add('light-mode'); else document.body.classList.remove('light-mode'); toggleSidebar(); }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${t}`).classList.add('active');
        renderContent();
    }

    function setExtra(m) { extraMode = m; switchTab('tafsir'); }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        loader.style.display = 'block';
        try {
            let edEx = extraMode === 'asbab' ? 'ar.asbab' : 'ar.jalalayn';
            const [resAr, resIt, resEx] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/${edEx}`)
            ]);
            const dAr = await resAr.json(), dIt = await resIt.json(), dEx = await resEx.json();
            ayahsData = dAr.data.ayahs.map((a, i) => ({
                num: a.numberInSurah, ar: a.text, it: dIt.data.ayahs[i].text, extra: dEx.data.ayahs[i].text
            }));
            renderContent();
        } catch (e) { renderArea.innerHTML = "Errore connessione."; }
        loader.style.display = 'none';
    }

    function renderContent() {
        const readerArea = document.getElementById('renderArea');
        const mushafArea = document.getElementById('mushafIframeContainer');
        const pdfFrame = document.getElementById('pdfFrame');

        if (activeTab === 'mushaf') {
            readerArea.style.display = 'none';
            mushafArea.style.display = 'block';
            // Utilizzo del tuo link PDF specifico
            const pdfUrl = "https://www.noor-book.com/book/internal_download/4b371c25e3757406da56dc1476bc5014247d92bd/3/156a9a8f465fb758556190806e506daa";
            // Usiamo il visualizzatore di Google per incorporare il PDF esterno bypassando i blocchi
            pdfFrame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;
            return;
        }

        readerArea.style.display = 'block';
        mushafArea.style.display = 'none';
        readerArea.innerHTML = "";

        ayahsData.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = `ayah-card ${currentAyahIdx === i && isPlaying ? 'active' : ''}`;
            let textAr = (currentSurah === 1 && a.num === 4) ? "مَلِكِ يَوْمِ الدِّينِ" : a.ar;
            let sub = activeTab === 'tafsir' ? `<div class="extra-box"><b style="color:var(--gold-ui)">${extraMode.toUpperCase()}:</b> ${a.extra}</div>` : `<div class="it-text">${a.it}</div>`;
            card.innerHTML = `<div class="arabic-text">${textAr} (${a.num})</div>${sub}`;
            card.onclick = () => playAyah(i);
            readerArea.appendChild(card);
        });
    }

    function playAyah(idx) {
        currentAyahIdx = idx;
        const s = String(currentSurah).padStart(3, '0'), v = String(ayahsData[idx].num).padStart(3, '0');
        const rec = document.getElementById('reciterSelect').value;
        const url = (rec === "Kushayli_64kbps") ? `https://www.everyayah.com/data/Kushayli_64kbps/${s}${v}.mp3` : `https://www.everyayah.com/data/${rec}/${s}${v}.mp3`;
        audio.src = url;
        audio.play().then(() => { isPlaying = true; updateUI(); }).catch(e => {
            audio.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${v}.mp3`;
            audio.play();
        });
    }

    function togglePlayback() { if (isPlaying) { audio.pause(); isPlaying = false; } else { if(!audio.src) playAyah(0); else audio.play(); isPlaying = true; } updateUI(); }

    function updateUI() {
        document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('curAyahName').innerText = `${surahNames[currentSurah-1]} - Versetto ${ayahsData[currentAyahIdx]?.num || 1}`;
        document.querySelectorAll('.ayah-card').forEach((c, i) => c.classList.toggle('active', i === currentAyahIdx && isPlaying));
    }

    audio.onended = () => { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); else { isPlaying = false; updateUI(); } };
    function nextAyah() { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); }
</script>
</body>
</html>
