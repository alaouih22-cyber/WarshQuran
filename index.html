<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Reader</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="top-bar">
        <div class="selector-group">
            <label>Recitatore</label>
            <select id="reciter-select">
                <option value="ar.alafasy">Mishary Alafasy</option>
                <option value="ar.abdulsamad">AbdulBaset</option>
                <option value="ar.as-sudais">As-Sudais</option>
            </select>
        </div>
        <div class="selector-group">
            <label>Tafsir</label>
            <select id="tafsir-select">
                <option value="it-asmari">Italiano (Asmari)</option>
                <option value="ar-tafsir-ibn-kathir">Ibn Kathir</option>
                <option value="ar-jalalayn">Al-Jalalayn</option>
            </select>
        </div>
        <button id="bookmarks-btn" class="icon-btn"><i class="fas fa-bookmark"></i></button>
    </header>

    <main class="reader-container">
        <div id="quran-container">
            <img id="quran-image" src="https://pro.quran.com/images/quran/muhammad_v2/1.png" alt="Pagina Corano">
            <div id="verse-overlays"></div>
        </div>
    </main>

    <footer class="bottom-bar">
        <div class="audio-controls">
            <button id="prev-btn" class="icon-btn"><i class="fas fa-step-backward"></i></button>
            <button id="play-pause-btn" class="icon-btn play-btn"><i class="fas fa-play"></i></button>
            <button id="next-btn" class="icon-btn"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="page-nav">
            <button id="prev-page">Indietro</button>
            <span id="page-num">Pagina 1</span>
            <button id="next-page">Avanti</button>
        </div>
    </footer>

    <div id="tafsir-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Tafsir</h3>
                <button id="close-modal" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modal-body">Caricamento...</div>
            <div class="modal-footer">
                <button id="add-bm-btn" class="action-btn"><i class="fas fa-plus"></i> Segnalibro</button>
                <button id="play-v-btn" class="action-btn"><i class="fas fa-volume-up"></i> Audio</button>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>
    <script src="app.js"></script>
</body>
</html>
