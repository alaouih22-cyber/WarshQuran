<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Qur'an Pro Warsh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #c5a059; --paper: #fdf6e3; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: #111; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* HEADER E UI */
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--emerald); padding: 10px;
            display: flex; gap: 8px; align-items: center;
            border-bottom: 2px solid var(--gold); z-index: 100;
        }

        #surahSelect { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 16px; border: none; }
        
        .btn-mode {
            background: var(--gold); color: white; border: none; 
            padding: 10px 12px; border-radius: 8px; font-weight: bold; 
            cursor: pointer; font-size: 12px; white-space: nowrap;
        }

        /* AREA CONTENUTO */
        .main-container {
            width: 100vw; height: 100vh;
            padding-top: 60px; padding-bottom: 70px;
            overflow-y: auto; background: var(--paper);
            display: flex; flex-direction: column; align-items: center;
        }

        /* STILE TESTO ARABO WARSH */
        .quran-text {
            width: 100%; max-width: 800px; padding: 20px;
            direction: rtl; text-align: justify;
            font-family: 'Amiri', serif; font-size: 2.2rem;
            line-height: 2.5; color: #111;
        }
        .ayah-num {
            display: inline-flex; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 L95 50 L50 95 L5 50 Z" fill="none" stroke="%23c5a059" stroke-width="5"/></svg>');
            background-size: contain; justify-content: center; align-items: center;
            font-size: 1rem; color: var(--gold); font-family: sans-serif; margin-left: 10px;
        }

        /* STILE IMMAGINE MUSHAF */
        #mushafImg { max-width: 100%; height: auto; display: none; background: #000; }

        /* FOOTER */
        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--emerald); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 2px solid var(--gold); z-index: 100;
        }
        .btn-nav { background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-size: 18px; }

        .active-ayah { background: #fef3c7; border-radius: 8px; }

        #loader { display: none; color: var(--gold); padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <select id="surahSelect" onchange="loadSurah(this.value)"></select>
    <button class="btn-mode" onclick="cycleMode()" id="modeBtn">TESTO WARSH</button>
</div>

<div class="main-container" id="content">
    <div id="loader">Caricamento...</div>
    <div id="textDisplay" class="quran-text"></div>
    <img id="mushafImg" src="" alt="Mushaf Image">
</div>

<div class="footer">
    <button class="btn-nav" onclick="nav(-1)"><i class="fas fa-chevron-right"></i></button>
    <span id="pageInfo" style="color:var(--gold); font-weight:bold; font-size: 20px;">Sura 1</span>
    <button class="btn-nav" onclick="nav(1)"><i class="fas fa-chevron-left"></i></button>
</div>

<audio id="player"></audio>

<script>
    let currentSurah = 1;
    let currentMode = 'warsh'; // warsh, ita, mushaf
    const textDisplay = document.getElementById('textDisplay');
    const mushafImg = document.getElementById('mushafImg');
    const player = document.getElementById('player');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];

    function init() {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    }

    function cycleMode() {
        if (currentMode === 'warsh') currentMode = 'ita';
        else if (currentMode === 'ita') currentMode = 'mushaf';
        else currentMode = 'warsh';
        
        document.getElementById('modeBtn').innerText = currentMode.toUpperCase();
        loadSurah(currentSurah);
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        document.getElementById('surahSelect').value = s;
        document.getElementById('pageInfo').innerText = `Sura ${s}`;
        document.getElementById('loader').style.display = "block";
        textDisplay.innerHTML = "";
        mushafImg.style.display = "none";
        textDisplay.style.display = "none";

        if (currentMode === 'mushaf') {
            loadMushafImage();
        } else {
            loadTextData();
        }
    }

    async function loadTextData() {
        const edition = (currentMode === 'warsh') ? 'ar.warsh' : 'it.piccardo';
        try {
            const r = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/${edition}`);
            const d = await r.json();
            let html = "";
            d.data.ayahs.forEach(v => {
                html += `<span onclick="playAudio(${v.numberInSurah}, this)">${v.text} <span class="ayah-num">${v.numberInSurah}</span> </span>`;
            });
            textDisplay.innerHTML = html;
            textDisplay.style.display = "block";
            document.getElementById('loader').style.display = "none";
        } catch (e) { textDisplay.innerHTML = "Errore connessione."; }
    }

    function loadMushafImage() {
        // Usiamo GitHub come sorgente stabile per le immagini
        const mapping = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];
        const page = mapping[currentSurah - 1];
        mushafImg.src = `https://raw.githubusercontent.com/MohamedBassem/quran-images/master/images-warsh/${page}.png`;
        mushafImg.style.display = "block";
        document.getElementById('loader').style.display = "none";
    }

    function playAudio(v, el) {
        // Evidenzia versetto
        document.querySelectorAll('span').forEach(s => s.classList.remove('active-ayah'));
        el.classList.add('active-ayah');

        const s = String(currentSurah).padStart(3, '0');
        const a = String(v).padStart(3, '0');
        player.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${a}.mp3`;
        player.play();
    }

    function nav(d) {
        let n = currentSurah + d;
        if(n >= 1 && n <= 114) loadSurah(n);
    }

    window.onload = init;
</script>
</body>
</html>
