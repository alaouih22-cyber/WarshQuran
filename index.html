<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corano Italiano Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --emerald: #064e3b; 
            --gold: #fbbf24; 
            --dark: #022c22;
            --ivory: #f8fafc;
        }
        
        body { 
            margin: 0; background-color: var(--dark); color: var(--ivory); 
            font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; 
        }

        /* Border Mushaf Style */
        .mushaf-border {
            border: 15px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/gold-albedo.png') 30 round;
            outline: 2px solid var(--gold);
            outline-offset: -10px;
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Navbar & Search */
        .header { background: var(--emerald); padding: 10px; border-bottom: 2px solid var(--gold); }
        .search-container { display: flex; gap: 5px; margin-top: 5px; }
        .search-container input { 
            flex: 1; padding: 8px; border-radius: 5px; border: none; outline: none; 
            font-size: 0.9rem; background: var(--ivory);
        }

        /* Area Testo */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        
        .surah-header {
            text-align: center; margin-bottom: 25px; padding: 15px;
            background: rgba(251, 191, 36, 0.1); border-radius: 10px; border: 1px solid var(--gold);
        }

        .ayah-card {
            background: rgba(6, 78, 59, 0.3); border-radius: 10px; padding: 15px;
            margin-bottom: 15px; border: 1px solid transparent; transition: 0.3s; cursor: pointer;
        }
        .ayah-card:hover { border-color: var(--gold); background: rgba(6, 78, 59, 0.6); }
        .ayah-card.playing { border-color: var(--gold); background: rgba(251, 191, 36, 0.2); transform: scale(1.02); }

        .ayah-num { 
            color: var(--gold); font-weight: bold; border: 1px solid var(--gold);
            padding: 2px 8px; border-radius: 50%; font-size: 0.8rem; margin-right: 10px;
        }

        /* Controls */
        .footer { background: var(--emerald); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--gold); }
        .nav-btn { background: var(--gold); color: var(--dark); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #audio-player { display: none; }
    </style>
</head>
<body>

<div class="mushaf-border">
    <div class="header">
        <div style="text-align: center; color: var(--gold); font-weight: bold; margin-bottom: 5px;">
            <i class="fas fa-quran"></i> CORANO ITALIANO PRO
        </div>
        <div class="search-container">
            <input type="number" id="searchSurah" placeholder="Sura (1-114)" min="1" max="114">
            <input type="number" id="searchAyah" placeholder="Vers." min="1">
            <button onclick="performSearch()" class="nav-btn"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="main-content" id="content">
        </div>

    <audio id="audio-player"></audio>

    <div class="footer">
        <button class="nav-btn" onclick="move(-1)"><i class="fas fa-chevron-left"></i></button>
        <span id="surah-info" style="font-weight: bold; color: var(--gold);">Sura 1</span>
        <button class="nav-btn" onclick="move(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<script>
    let currentSurah = 1;
    const content = document.getElementById('content');
    const player = document.getElementById('audio-player');

    async function loadSurah(num, scrollToAyah = null) {
        content.innerHTML = "<p style='text-align:center'>Caricamento...</p>";
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/it.piccardo`);
            const data = await res.json();
            const s = data.data;
            
            currentSurah = num;
            document.getElementById('surah-info').innerText = `${s.number}. ${s.englishName}`;

            let html = `
                <div class="surah-header">
                    <h2 style="color:var(--gold); margin:0;">${s.name}</h2>
                    <p style="margin:5px 0;">${s.englishNameTranslation}</p>
                </div>
            `;

            s.ayahs.forEach(a => {
                html += `
                    <div class="ayah-card" id="ayah-${a.numberInSurah}" onclick="playAyah(${s.number}, ${a.numberInSurah}, this)">
                        <span class="ayah-num">${a.numberInSurah}</span>
                        <span class="ayah-text">${a.text}</span>
                    </div>
                `;
            });

            content.innerHTML = html;

            if (scrollToAyah) {
                setTimeout(() => {
                    const el = document.getElementById(`ayah-${scrollToAyah}`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('playing');
                    }
                }, 500);
            }
        } catch (e) { content.innerHTML = "Errore di connessione."; }
    }

    function playAyah(s, a, element) {
        // Rimuovi classe playing dagli altri
        document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('playing'));
        element.classList.add('playing');

        // Audio API (Recitatore Al-Afasy)
        const ayahId = s + ":" + a;
        player.src = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${(s * 1000 + a - 1000) || a}.mp3`; // Link semplificato per test
        // Nota: Il link audio sopra è indicativo, usiamo una sorgente diretta affidabile:
        player.src = `https://api.quran.com/api/v4/recordings/reciters/7/audio_files?ayah_key=${s}:${a}`; // Questo richiede parsing, per semplicità usiamo:
        player.src = `https://www.everyayah.com/data/Alafasy_128kbps/${String(s).padStart(3, '0')}${String(a).padStart(3, '0')}.mp3`;
        
        player.play();
    }

    function move(d) {
        let n = currentSurah + d;
        if (n >= 1 && n <= 114) loadSurah(n);
    }

    function performSearch() {
        const s = document.getElementById('searchSurah').value;
        const a = document.getElementById('searchAyah').value;
        if (s >= 1 && s <= 114) {
            loadSurah(s, a || null);
        }
    }

    window.onload = () => loadSurah(1);
</script>
</body>
</html>
