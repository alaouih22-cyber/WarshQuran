<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easy Quran Warsh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-overlay">... جاري التحميل</div>

    <div class="mushaf-container" onclick="handleTap(event)">
        <img id="quran-page" src="1.png" alt="Quran Page">
    </div>

    <div class="bottom-bar">
        <button class="nav-btn" onclick="prevPage()">السابق</button>
        <div class="page-info">
            <span id="surah-title">الفاتحة</span>
            <br>
            <small>صفحة <span id="page-num">1</span></small>
        </div>
        <button class="nav-btn" onclick="nextPage()">التالي</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
