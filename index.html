<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Al-Qur'an Warsh Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #c5a059; --paper: #fdf6e3; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; width: 100%; background-color: var(--emerald); overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* HEADER */
        .header { background: var(--emerald); padding: 12px; border-bottom: 2px solid var(--gold); z-index: 100; position: relative; }
        .controls { display: flex; gap: 8px; align-items: center; justify-content: center; }
        
        select { padding: 10px; border-radius: 8px; border: none; font-weight: bold; flex: 1; font-size: 16px; background: #fff; }
        .btn-mode { background: var(--gold); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* AREA CONTENUTO */
        .content-area { flex: 1; height: calc(100vh - 140px); overflow-y: auto; transition: background 0.3s; }

        /* STILE ITALIANO (Cards) */
        .mode-it { background-color: var(--paper); padding: 15px; }
        .ayah-card {
            background: white; padding: 15px; border-radius: 10px;
            border-left: 5px solid var(--emerald);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 12px; cursor: pointer;
        }
        .ayah-card b { color: var(--emerald); display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .ayah-card p { font-size: 1.15rem; line-height: 1.5; color: #333; }

        /* STILE ARABO WARSH (Sfondo Bianco) */
        .mode-ar { background-color: var(--white); padding: 25px; direction: rtl; text-align: right; }
        .quran-ar { 
            font-family: 'Scheherazade New', serif; font-size: 2.3rem; 
            line-height: 2.8; color: #111; text-align: justify;
        }
        .ayah-ar-wrap { cursor: pointer; display: inline; border-radius: 4px; padding: 0 5px; transition: 0.2s; }
        .ayah-ar-wrap:hover { background: #f0f0f0; }
        
        /* Simbolo Fine Versetto */
        .ayah-num {
            font-family: sans-serif; font-size: 1.2rem; color: var(--gold);
            border: 2px solid var(--gold); border-radius: 50%;
            display: inline-flex; width: 38px; height: 38px;
            align-items: center; justify-content: center;
            margin: 0 10px; direction: ltr; vertical-align: middle;
        }

        /* FOOTER */
        .footer { background: var(--emerald); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--gold); }
        .btn-nav { background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-size: 1.3rem; cursor: pointer; }

        .active-playing { background: #fff9e6 !important; border-color: var(--gold) !important; color: var(--gold) !important; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader">Caricamento Warsh...</div>

<div class="header">
    <div class="controls">
        <select id="surahSelect" onchange="loadSurah(this.value)"></select>
        <button class="btn-mode" onclick="toggleMode()" id="modeBtn">WARSH</button>
    </div>
</div>

<div class="content-area" id="mainContent"></div>

<div class="footer">
    <button class="btn-nav" onclick="nav(-1)"><i class="fas fa-chevron-right"></i></button>
    <span id="label" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;">Sura</span>
    <button class="btn-nav" onclick="nav(1)"><i class="fas fa-chevron-left"></i></button>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
    let currentSurah = 1;
    let mode = 'it'; // Parte in Italiano
    const container = document.getElementById('mainContent');
    const player = document.getElementById('audioPlayer');
    const modeBtn = document.getElementById('modeBtn');

    // Popola lista Sure
    async function populateSurahs() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const d = await res.json();
        const select = document.getElementById('surahSelect');
        d.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.textContent = `${s.number}. ${s.englishName}`;
            select.appendChild(opt);
        });
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        document.getElementById('surahSelect').value = s;
        document.getElementById('loader').style.display = 'block';
        container.innerHTML = "";

        // EDIZIONE WARSH REALE: 'quran-warsh' è la più accurata per il Resm
        const edition = (mode === 'it') ? 'it.piccardo' : 'quran-warsh';
        
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/${edition}`);
            const d = await res.json();
            const surah = d.data;
            document.getElementById('label').innerText = surah.englishName;

            if (mode === 'it') {
                container.className = "content-area mode-it";
                surah.ayahs.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'ayah-card';
                    card.onclick = () => playAudio(v.numberInSurah, card);
                    card.innerHTML = `<b>VERSETTO ${v.numberInSurah}</b><p>${v.text}</p>`;
                    container.appendChild(card);
                });
            } else {
                container.className = "content-area mode-ar";
                const div = document.createElement('div');
                div.className = "quran-ar";
                surah.ayahs.forEach(v => {
                    const span = document.createElement('span');
                    span.className = "ayah-ar-wrap";
                    span.onclick = () => playAudio(v.numberInSurah, span);
                    // Testo Warsh + Numero
                    span.innerHTML = `${v.text} <span class="ayah-num">${v.numberInSurah}</span> `;
                    div.appendChild(span);
                });
                container.appendChild(div);
            }
        } catch (e) {
            container.innerHTML = "<p style='text-align:center; padding:20px;'>Connessione fallita. Riprova.</p>";
        }
        document.getElementById('loader').style.display = 'none';
        container.scrollTop = 0;
    }

    function toggleMode() {
        mode = (mode === 'it') ? 'ar' : 'it';
        modeBtn.innerText = (mode === 'it') ? 'WARSH' : 'ITALIANO';
        loadSurah(currentSurah);
    }

    function playAudio(ayahNum, element) {
        // Evidenziazione visiva
        document.querySelectorAll('.ayah-card, .ayah-ar-wrap').forEach(el => el.classList.remove('active-playing'));
        element.classList.add('active-playing');

        const s = String(currentSurah).padStart(3, '0');
        const a = String(ayahNum).padStart(3, '0');
        
        // SORGENTE AUDIO: Al-Hussary (Warsh Narration)
        // Utilizziamo un link diretto più affidabile
        const audioUrl = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${a}.mp3`;
        
        player.src = audioUrl;
        player.load();
        
        // Gestione errore audio
        const playPromise = player.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("Riproduzione bloccata o file mancante: " + audioUrl);
                alert("Tocca di nuovo per riprodurre l'audio (il browser ha bloccato l'avvio automatico)");
            });
        }
    }

    function nav(dir) {
        let n = currentSurah + dir;
        if (n >= 1 && n <= 114) loadSurah(n);
    }

    window.onload = () => {
        populateSurahs();
        loadSurah(1);
    };
</script>
</body>
</html>
