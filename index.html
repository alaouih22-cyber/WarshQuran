<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Qur'an Premium Pro Warsh+</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-bg: #050505;
            --emerald: #042f2e;
            --gold: #d4af37;
            --gold-light: #fbbf24;
            --text-dim: #a0aec0;
            --card-bg: #111111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #0f0f0f; z-index: 2000; transition: 0.4s; border-right: 2px solid var(--gold); padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .side-item { padding: 15px; color: white; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid #222; }
        .side-item i { color: var(--gold); }

        /* --- UI PRINCIPALE --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        .navbar { padding: 15px 20px; background: var(--emerald); display: flex; align-items: center; justify-content: space-between; border-bottom: 1.5px solid var(--gold); }
        
        .top-selectors { background: #111; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        select { background: #1a1a1a; color: white; border: 1px solid var(--gold); padding: 10px; border-radius: 10px; font-weight: bold; width: 100%; }

        .tabs { display: flex; background: #000; padding: 5px; gap: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 0.75rem; font-weight: 800; color: var(--text-dim); cursor: pointer; border-radius: 8px; }
        .tab.active { background: var(--gold); color: black; }

        /* --- CONTENT --- */
        .main-content { flex: 1; overflow-y: auto; background: #080808; position: relative; scroll-behavior: smooth; padding: 15px; }
        
        .ayah-card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-right: 4px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; }
        .ayah-card.active { background: #1a1a1a; border-right-color: var(--gold-light); }
        
        .arabic-text { direction: rtl; font-family: 'Scheherazade New', serif; font-size: 2.1rem; line-height: 2.3; text-align: right; color: #fff; }
        .it-text { font-size: 0.95rem; color: var(--text-dim); margin-top: 10px; font-style: italic; }
        .extra-box { margin-top: 10px; padding: 10px; background: rgba(212,175,55,0.05); border-radius: 10px; border: 1px dashed var(--gold); font-size: 0.9rem; color: #ccc; }

        /* --- MUSHAF --- */
        .mushaf-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .mushaf-img { width: 100%; max-width: 800px; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); background: white; display: none; }

        /* --- PLAYER --- */
        .player-bar { background: #0f0f0f; padding: 15px 20px; border-top: 2px solid var(--gold); display: flex; align-items: center; gap: 15px; }
        .play-main { width: 50px; height: 50px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: black; cursor: pointer; }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; display: none; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; display: none; }
    </style>
</head>
<body>

<div class="overlay-bg" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div style="color:var(--gold); font-weight:bold; text-align:center; margin-bottom:20px;">MENU PREMIUM</div>
    <div class="side-item" onclick="setExtra('tafsir')"><i class="fas fa-book"></i> Tafsir Jalalayn</div>
    <div class="side-item" onclick="setExtra('asbab')"><i class="fas fa-history"></i> Asbab al-Nuzul</div>
    <div class="side-item" onclick="switchTab('mushaf')"><i class="fas fa-file-alt"></i> Mushaf Warsh</div>
    <div class="side-item" onclick="window.location.reload()"><i class="fas fa-sync"></i> Ricarica App</div>
</div>

<div class="app-shell">
    <header class="navbar">
        <i class="fas fa-bars-staggered" style="color:var(--gold); cursor:pointer;" onclick="toggleSidebar()"></i>
        <div style="font-weight:900; color:var(--gold-bright); font-size: 0.9rem;">QUR'AN PREMIUM PRO</div>
        <i class="fas fa-info-circle" style="color:var(--gold)"></i>
    </header>

    <div class="top-selectors">
        <select id="surahSelect" onchange="loadSurah(this.value)"></select>
        <select id="reciterSelect">
            <option value="Husary_Warsh_64kbps">Al-Hussary (Warsh)</option>
            <option value="Kushayli_64kbps">Al-Qazabri (Warsh)</option>
            <option value="Minshawi_Murattal_128kbps">Al-Minshawi</option>
            <option value="Alafasy_128kbps">Mishary Alafasy</option>
        </select>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-reader" onclick="switchTab('reader')">LETTURA</div>
        <div class="tab" id="tab-tafsir" onclick="switchTab('tafsir')">TAFSIR</div>
        <div class="tab" id="tab-mushaf" onclick="switchTab('mushaf')">MUSHAF</div>
    </div>

    <main class="main-content" id="mainContent">
        <div id="loader"><div class="spinner"></div></div>
        <div id="renderArea"></div>
    </main>

    <footer class="player-bar">
        <div class="play-main" onclick="togglePlayback()"><i class="fas fa-play" id="playIcon"></i></div>
        <div style="flex:1; overflow:hidden;">
            <div id="curAyahName" style="font-size:0.8rem; font-weight:800; color:var(--gold-bright); white-space:nowrap;">Seleziona versetto</div>
            <div id="curStatus" style="font-size:0.6rem; color:var(--text-dim);">Audio Warsh</div>
        </div>
        <i class="fas fa-step-forward" style="color:var(--gold); font-size:1.2rem; cursor:pointer;" onclick="nextAyah()"></i>
    </footer>
</div>

<audio id="audioEngine"></audio>

<script>
    let currentSurah = 1, currentAyahIdx = 0, ayahsData = [], isPlaying = false, activeTab = 'reader', extraMode = 'tafsir';
    const audio = document.getElementById('audioEngine'), renderArea = document.getElementById('renderArea'), loader = document.getElementById('loader');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
    const pageMapping = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];

    window.onload = () => {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${t}`).classList.add('active');
        if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        renderContent();
    }

    function setExtra(m) { extraMode = m; switchTab('tafsir'); }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        loader.style.display = 'block';
        try {
            let edEx = extraMode === 'asbab' ? 'ar.asbab' : 'ar.jalalayn';
            const [resAr, resIt, resEx] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/${edEx}`)
            ]);
            const dAr = await resAr.json(), dIt = await resIt.json(), dEx = await resEx.json();
            ayahsData = dAr.data.ayahs.map((a, i) => ({
                num: a.numberInSurah, ar: a.text, it: dIt.data.ayahs[i].text, extra: dEx.data.ayahs[i].text
            }));
            renderContent();
        } catch (e) { renderArea.innerHTML = "Errore connessione."; }
        loader.style.display = 'none';
    }

    function renderContent() {
        renderArea.innerHTML = "";
        if (activeTab === 'mushaf') {
            const p = pageMapping[currentSurah - 1];
            const p3 = String(p).padStart(3, '0');
            // INGANNO GOOGLE PROXY: Il metodo più potente per caricare immagini bloccate
            const rawUrl = `https://raw.githubusercontent.com/muslimDevCommunity/quran-warsh/485fd1b62b0d6e1814eed7a7747d4a230a543e58/src/res/pages/page${p3}.png`;
            const googleProxiedUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(rawUrl)}`;
            
            renderArea.innerHTML = `<div class="mushaf-container"><img class="mushaf-img" src="${googleProxiedUrl}" onload="this.style.display='block'" onerror="this.src='https://wsrv.nl/?url=https://easyquran.com/quran-jpg-w/${p}.jpg'"></div>`;
            return;
        }

        ayahsData.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = `ayah-card ${currentAyahIdx === i && isPlaying ? 'active' : ''}`;
            let textAr = (currentSurah === 1 && a.num === 4) ? "مَلِكِ يَوْمِ الدِّينِ" : a.ar;
            let sub = activeTab === 'tafsir' ? `<div class="extra-box"><b style="color:var(--gold)">${extraMode.toUpperCase()}:</b> ${a.extra}</div>` : `<div class="it-text">${a.it}</div>`;
            card.innerHTML = `<div class="arabic-text">${textAr} (${a.num})</div>${sub}`;
            card.onclick = () => playAyah(i);
            renderArea.appendChild(card);
        });
    }

    function playAyah(idx) {
        currentAyahIdx = idx;
        const s = String(currentSurah).padStart(3, '0'), v = String(ayahsData[idx].num).padStart(3, '0');
        const rec = document.getElementById('reciterSelect').value;
        
        // Audio Link corretti (EveryAyah + Fallback Mirror)
        const audioUrl = (rec === "Kushayli_64kbps") 
            ? `https://www.everyayah.com/data/Kushayli_64kbps/${s}${v}.mp3` 
            : `https://www.everyayah.com/data/${rec}/${s}${v}.mp3`;

        audio.src = audioUrl;
        audio.play().then(() => {
            isPlaying = true;
            updateUI();
        }).catch(e => {
            // Fallback se il primario fallisce
            audio.src = `https://mirrors.quranicaudio.com/everyayah/${rec}/${s}${v}.mp3`;
            audio.play();
        });
    }

    function togglePlayback() { 
        if (isPlaying) { audio.pause(); isPlaying = false; } 
        else { if(!audio.src) playAyah(currentAyahIdx); else audio.play(); isPlaying = true; } 
        updateUI(); 
    }

    function updateUI() {
        document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('curAyahName').innerText = `${surahNames[currentSurah-1]} - Verso ${ayahsData[currentAyahIdx]?.num || 1}`;
        document.querySelectorAll('.ayah-card').forEach((c, i) => c.classList.toggle('active', i === currentAyahIdx && isPlaying));
    }

    audio.onended = () => { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); else { isPlaying = false; updateUI(); } };
    function nextAyah() { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); }
</script>
</body>
</html>
