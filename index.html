<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corano in Italiano</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #eab308; --dark: #0f172a; --bg: #020617; }
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* Header con Titolo */
        .header { 
            background: var(--dark); 
            padding: 20px; 
            text-align: center; 
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header h1 { margin: 0; color: var(--gold); font-size: 1.5rem; }

        /* Area Testo Corano */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            line-height: 1.8;
            scroll-behavior: smooth;
        }
        .surah-title { 
            color: var(--gold); 
            text-align: center; 
            font-size: 1.8rem; 
            margin-bottom: 30px; 
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        .verse { 
            margin-bottom: 20px; 
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            transition: 0.3s;
        }
        .verse:hover { background: rgba(255,255,255,0.1); }
        .v-num { color: var(--gold); font-weight: bold; margin-right: 10px; font-size: 0.9rem; }

        /* Footer Navigazione */
        .footer { 
            background: var(--dark); 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-top: 2px solid var(--gold);
        }
        .nav-btn { 
            background: var(--gold); 
            color: black; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:disabled { background: #475569; cursor: not-allowed; }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            display: none;
            z-index: 1000;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div id="loading"><i class="fas fa-spinner fa-spin"></i> Caricamento...</div>

    <div class="header">
        <h1>Il Sacro Corano</h1>
        <small id="surah-info">Sura 1: Al-Fatiha</small>
    </div>

    <div class="content" id="quran-text">
        </div>

    <div class="footer">
        <button class="nav-btn" id="prev-btn" onclick="changeSurah(-1)">
            <i class="fas fa-chevron-left"></i> Prec
        </button>
        <div style="text-align: center;">
            <span id="current-number">1</span> / 114
        </div>
        <button class="nav-btn" id="next-btn" onclick="changeSurah(1)">
            Succ <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <script>
        let currentSurah = 1;
        const quranText = document.getElementById('quran-text');
        const loader = document.getElementById('loading');

        async function loadSurah(num) {
            loader.style.display = 'block';
            quranText.innerHTML = "";
            
            try {
                // Usiamo l'API ufficiale per la traduzione Piccardo (Italiano)
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${num}/it.piccardo`);
                const data = await response.json();
                
                const surah = data.data;
                document.getElementById('surah-info').innerText = `Sura ${surah.number}: ${surah.englishName}`;
                document.getElementById('current-number').innerText = surah.number;

                let html = `<div class="surah-title">${surah.name} <br> <small>${surah.englishNameTranslation}</small></div>`;
                
                surah.ayahs.forEach(ayah => {
                    html += `
                        <div class="verse">
                            <span class="v-num">${ayah.numberInSurah}.</span>
                            <span class="v-text">${ayah.text}</span>
                        </div>
                    `;
                });

                quranText.innerHTML = html;
                quranText.scrollTop = 0;

            } catch (error) {
                quranText.innerHTML = "<p style='text-align:center'>Errore nel caricamento. Controlla la connessione.</p>";
            } finally {
                loader.style.display = 'none';
                updateButtons();
            }
        }

        function changeSurah(delta) {
            let next = currentSurah + delta;
            if (next >= 1 && next <= 114) {
                currentSurah = next;
                loadSurah(currentSurah);
            }
        }

        function updateButtons() {
            document.getElementById('prev-btn').disabled = (currentSurah === 1);
            document.getElementById('next-btn').disabled = (currentSurah === 114);
        }

        // Avvio dell'app
        window.onload = () => loadSurah(1);
    </script>
</body>
</html>
