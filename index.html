<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Pro App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header class="floating-header">
        <button class="icon-btn" id="menu-main"><i class="fas fa-bars"></i></button>
        <div class="header-right">
            <button class="icon-btn"><i class="fas fa-search"></i></button>
            <button class="icon-btn" id="btn-bookmarks"><i class="fas fa-bookmark"></i></button>
            <button class="icon-btn"><i class="fas fa-headphones"></i></button>
            <span class="hd-badge">HD</span>
        </div>
    </header>

    <main class="mushaf-container">
        <button class="nav-arrow left" id="p-prev"><i class="fas fa-chevron-left"></i></button>
        
        <div id="page-wrapper">
            <img id="quran-page" src="" alt="Mushaf">
            <div id="click-layer"></div>
        </div>

        <button class="nav-arrow right" id="p-next"><i class="fas fa-chevron-right"></i></button>
    </main>

    <footer class="floating-footer">
        <div class="surah-info">
            <span id="surah-name">القصص</span>
            <span id="page-label">صفحة ١</span>
        </div>
        <button class="menu-trigger" id="open-sub-menu">القائمة الثانوية ≡</button>
    </footer>

    <div id="side-menu" class="side-panel hidden">
        <div class="panel-content">
            <div class="menu-item"><i class="fas fa-book-open"></i> التفسير</div>
            <div class="menu-item"><i class="fas fa-list"></i> السور</div>
            <div class="menu-item"><i class="fas fa-th-large"></i> الأجزاء</div>
            <div class="menu-item"><i class="fas fa-cog"></i> إعدادات الشاشة</div>
        </div>
    </div>

    <audio id="audio-engine"></audio>
    <script src="app.js"></script>
</body>
</html>
