<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Mushaf Tajweed Warsh Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #064e3b; --gold: #c5a059; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        /* Menu UI - Appaiono solo al click al centro */
        .ui-panel {
            position: fixed;
            left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: all 0.3s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        .header { top: 0; transform: translateY(-100%); border-bottom: 2px solid var(--gold); padding: 10px; display: flex; gap: 8px; align-items: center; }
        .footer { bottom: 0; transform: translateY(100%); border-top: 2px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; }

        body.show-ui .ui-panel { opacity: 1; transform: translateY(0); pointer-events: auto; }

        #surahSelect { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; border: none; font-size: 15px; background: #fff; }
        
        .btn-action { 
            background: var(--gold); color: white; border: none; 
            padding: 10px 14px; border-radius: 8px; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        /* Area Mushaf */
        .mushaf-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000; position: relative;
        }

        #mushafImg {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            display: block;
            transition: opacity 0.3s;
        }

        /* Zone di Tocco */
        .touch-zone { position: absolute; top: 0; height: 100%; z-index: 20; }
        .touch-next { left: 0; width: 35%; } 
        .touch-prev { right: 0; width: 35%; } 
        .touch-menu { left: 35%; width: 30%; z-index: 25; }

        /* Vista Italiano */
        #itView {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fdf6e3; overflow-y: auto; padding: 60px 20px;
            display: none; z-index: 80;
        }
        .ayah-it { padding: 15px; border-bottom: 1px solid #e0d8c0; font-size: 1.15rem; line-height: 1.6; color: #2d2d2d; }

        .btn-nav { background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-size: 18px; }

        /* Loader */
        #loader {
            position: absolute; width: 45px; height: 45px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite; z-index: 10;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="show-ui">

<div class="header ui-panel">
    <select id="surahSelect" onchange="jumpToSurah(this.value)"></select>
    <button class="btn-action" onclick="toggleItalian()" id="modeBtn"><i class="fas fa-language"></i> ITA</button>
    <button class="btn-action" onclick="downloadPage()" style="background:#0066cc;"><i class="fas fa-download"></i></button>
</div>

<div class="mushaf-container">
    <div id="loader"></div>
    <!-- Clicca al centro per menu, lato sinistro per avanti, lato destro per indietro -->
    <div class="touch-zone touch-next" onclick="navPage(1)"></div>
    <div class="touch-zone touch-menu" onclick="toggleUI()"></div>
    <div class="touch-zone touch-prev" onclick="navPage(-1)"></div>
    
    <img id="mushafImg" src="" alt="Mushaf">
    <div id="itView"></div>
</div>

<div class="footer ui-panel">
    <button class="btn-nav" onclick="navPage(-1)"><i class="fas fa-chevron-right"></i></button>
    <div id="pageInfo" style="font-weight:bold; color:var(--gold); font-size: 20px;">1</div>
    <button class="btn-nav" onclick="navPage(1)"><i class="fas fa-chevron-left"></i></button>
</div>

<script>
    let currentPage = 1;
    let currentSurah = 1;
    let isItalian = false;
    let retryCount = 0;

    const surahStartPages = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];
    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];

    const imgEl = document.getElementById('mushafImg');
    const itView = document.getElementById('itView');
    const loader = document.getElementById('loader');

    function init() {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        updatePage();
    }

    function toggleUI() { document.body.classList.toggle('show-ui'); }

    function toggleItalian() {
        isItalian = !isItalian;
        itView.style.display = isItalian ? 'block' : 'none';
        document.getElementById('modeBtn').innerHTML = isItalian ? '<i class="fas fa-book"></i> MUSHAF' : '<i class="fas fa-language"></i> ITA';
        if(isItalian) loadItalianText();
    }

    // SISTEMA MULTI-SORGENTE PER NON AVERE MAI IMMAGINI ROTTE
    function updatePage() {
        loader.style.display = "block";
        imgEl.style.opacity = "0.2";
        retryCount = 0;
        tryLoad();
    }

    function tryLoad() {
        const sources = [
            // Sorgente 1: GitHub Raw (Affidabile)
            `https://raw.githubusercontent.com/Anis-Nabil/Mushaf-Al-Tajweed-Warsh/main/pages/${currentPage}.jpg`,
            // Sorgente 2: WordPress Proxy (Ottimizzato)
            `https://i0.wp.com/easyquran.com/quran-jpg-w/${currentPage}.jpg`,
            // Sorgente 3: Weserv Proxy
            `https://wsrv.nl/?url=https://easyquran.com/quran-jpg-w/${currentPage}.jpg&w=1200`
        ];

        imgEl.src = sources[retryCount];

        imgEl.onload = () => {
            loader.style.display = "none";
            imgEl.style.opacity = "1";
            document.getElementById('pageInfo').innerText = currentPage;
            syncSurahWithPage();
        };

        imgEl.onerror = () => {
            retryCount++;
            if (retryCount < sources.length) {
                tryLoad();
            } else {
                loader.innerHTML = "<p style='color:white;font-size:12px'>Errore. Riprova.</p>";
            }
        };
    }

    async function downloadPage() {
        try {
            const response = await fetch(imgEl.src);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Mushaf_Warsh_${currentPage}.jpg`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        } catch (e) {
            window.open(imgEl.src, '_blank');
        }
    }

    async function loadItalianText() {
        itView.innerHTML = "<p style='text-align:center;padding:120px'>Caricamento...</p>";
        try {
            const r = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/it.piccardo`);
            const d = await r.json();
            let h = `<h1 style="text-align:center;color:var(--emerald);margin-top:20px">${d.data.englishName}</h1>`;
            d.data.ayahs.forEach(a => {
                h += `<div class="ayah-it"><b>${a.numberInSurah}.</b> ${a.text}</div>`;
            });
            itView.innerHTML = h;
        } catch(e) { itView.innerHTML = "<p>Errore connessione.</p>"; }
    }

    function navPage(direction) {
        let next = currentPage + direction;
        if(next >= 1 && next <= 604) {
            currentPage = next;
            updatePage();
            if(isItalian) loadItalianText();
        }
    }

    function jumpToSurah(s) {
        currentSurah = parseInt(s);
        currentPage = surahStartPages[currentSurah-1];
        updatePage();
        if(isItalian) loadItalianText();
    }

    function syncSurahWithPage() {
        for (let i = 0; i < surahStartPages.length; i++) {
            if (currentPage >= surahStartPages[i]) currentSurah = i + 1;
            else break;
        }
        document.getElementById('surahSelect').value = currentSurah;
    }

    window.onload = init;
</script>
</body>
</html>
