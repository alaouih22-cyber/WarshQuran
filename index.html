<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Tajweed & Traduzione</title>
    <style>
        body { 
            margin: 0; 
            background-color: #020617; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Area del Corano in Arabo */
        .mushaf-container {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: #0f172a;
        }

        #quran-page {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
            background: #fff;
        }

        /* Box Traduzione Italiana */
        .translation-container {
            flex: 1;
            background-color: #1e293b;
            padding: 20px;
            overflow-y: auto;
            border-top: 3px solid #eab308;
            text-align: center;
        }

        .translation-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #f1f5f9;
        }

        /* Navigazione */
        .bottom-bar {
            background-color: #0f172a;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-btn {
            background: #eab308;
            color: #020617;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        #loading {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #eab308;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            display: none;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading">Caricamento in corso...</div>

    <div class="mushaf-container">
        <img id="quran-page" src="1.png" onerror="this.src='https://www.searchtruth.org/quran/images2/1.png'" alt="Pagina Corano">
    </div>

    <div class="translation-container">
        <div id="translation-box" class="translation-text">
            <b>Sura Al-Fatiha</b><br>
            Nel nome di Allah, il Compassionevole, il Misericordioso. La lode appartiene ad Allah, Signore dei mondi...
        </div>
    </div>

    <div class="bottom-bar">
        <button class="nav-btn" onclick="changePage(-1)">Indietro</button>
        <div style="text-align:center">
            <b>Pagina <span id="page-num">1</span></b>
        </div>
        <button class="nav-btn" onclick="changePage(1)">Avanti</button>
    </div>

    <script>
        let currentPage = 1;
        const img = document.getElementById('quran-page');
        const loader = document.getElementById('loading');
        const transBox = document.getElementById('translation-box');

        const italianData = {
            1: "<b>Al-Fatiha (L'Aprente)</b><br>Nel nome di Allah, il Compassionevole, il Misericordioso. La lode appartiene ad Allah, Signore dei mondi, il Compassionevole, il Misericordioso, Re del Giorno del Giudizio. Te solo adoriamo e a Te solo chiediamo aiuto. Guidaci sulla retta via.",
            2: "<b>Al-Baqara (La Giovenca)</b><br>Alif, Lâm, Mîm. Questo è il Libro su cui non vi è dubbio, una guida per i timorati di Allah, coloro che credono nell'Invisibile..."
        };

        function changePage(delta) {
            let next = currentPage + delta;
            if (next < 1 || next > 604) return;
            
            currentPage = next;
            loader.style.display = "block";
            
            // Usiamo un server molto più veloce e stabile
            const newSrc = (currentPage === 1) ? "1.png" : `https://www.searchtruth.org/quran/images2/${currentPage}.png`;
            
            img.src = newSrc;
            
            img.onload = () => {
                loader.style.display = "none";
                document.getElementById('page-num').innerText = currentPage;
                transBox.innerHTML = italianData[currentPage] || "Traduzione in arrivo per questa pagina...";
            };

            img.onerror = () => {
                // Secondo server di riserva se il primo fallisce
                img.src = `https://pwanew.mohib.me/tajweed_png/${currentPage}.png`;
            };
        }
    </script>
</body>
</html>
