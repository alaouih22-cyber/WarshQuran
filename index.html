<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mushaf Tajweed Warsh Marocchino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Font Amiri con varianti Maghrebi -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --mushaf-bg: #fffcf5; 
            --emerald-dark: #053e30;
            --gold-border: #c5a059;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: #0b2e26; 
            overflow: hidden; 
            font-family: 'Amiri', serif; 
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* Toolbar superiore elegante */
        .header { 
            background: var(--emerald-dark); 
            padding: 8px; 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            border-bottom: 2px solid var(--gold-border);
        }
        
        select, .btn-action { 
            background: #fdf6e3; border: 1px solid var(--gold-border); 
            padding: 6px 12px; border-radius: 5px; font-weight: bold; font-size: 14px;
        }

        /* AREA MUSHAF AUTENTICA */
        .mushaf-container {
            flex: 1;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .mushaf-page {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background-color: var(--mushaf-bg);
            position: relative;
            /* CORNICE FLOREALE MAROCCHINA (Simulata con immagine e bordi) */
            border: 22px solid transparent;
            border-image-source: url('https://i.ibb.co/Y7YpDqf/moroccan-border.png'); /* Cornice stile Zellij */
            border-image-slice: 100;
            border-image-repeat: stretch;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .mushaf-page::-webkit-scrollbar { display: none; }

        /* Intestazione Sura stile Marocco */
        .surah-frame {
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            background-color: #fff;
            border: 2px solid var(--emerald-dark);
            margin: 10px auto;
            width: 85%;
            padding: 8px;
            text-align: center;
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .surah-name { 
            font-size: 1.6rem; 
            color: var(--emerald-dark); 
            font-weight: bold;
        }

        .bismillah { 
            font-size: 1.8rem; 
            margin: 15px 0; 
            text-align: center; 
            color: #000;
        }

        /* Testo Warsh: Dimensioni ridotte e stile denso */
        .quran-text-warsh {
            padding: 0 10px 30px 10px;
            direction: rtl;
            text-align: justify;
            font-size: 1.55rem; /* Ridotto come richiesto */
            line-height: 2.2;
            color: #1a1a1a;
            /* Ottimizzazione per stile Maghrebi */
            font-feature-settings: "cv08" 1, "cv05" 1; 
        }

        /* Segno Ayah Marocchino */
        .ayah-sign {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            margin: 0 5px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 10 L85 35 L85 65 L50 90 L15 65 L15 35 Z" fill="none" stroke="%238d6e35" stroke-width="8"/><circle cx="50" cy="50" r="15" fill="%238d6e35" opacity="0.2"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            font-size: 0.8rem;
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: #8d6e35;
            vertical-align: middle;
        }

        .active-word { background: rgba(197, 160, 89, 0.25); border-radius: 4px; }

        /* Footer Navigazione */
        .footer { 
            background: var(--emerald-dark); 
            padding: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 2px solid var(--gold-border);
        }
        .btn-nav { background: var(--gold-border); color: #fff; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <select id="surahSelect" onchange="loadSurah(this.value)"></select>
        <button onclick="toggleMode()" id="modeBtn" class="btn-action">MUSHAF WARSH</button>
    </div>

    <div class="mushaf-container">
        <div class="mushaf-page" id="mushafPage">
            <!-- Caricamento dinamico -->
        </div>
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="changeSurah(-1)"><i class="fas fa-chevron-right"></i></button>
        <span id="surahLabel" style="color:var(--gold-border); font-weight:bold; font-size:1.1rem;">Al-Fatiha</span>
        <button class="btn-nav" onclick="changeSurah(1)"><i class="fas fa-chevron-left"></i></button>
    </div>
</div>

<audio id="quranPlayer"></audio>

<script>
    let currentSurah = 1;
    let isWarsh = true;
    const page = document.getElementById('mushafPage');
    const player = document.getElementById('quranPlayer');

    async function init() {
        // Popola la lista delle sure
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        const select = document.getElementById('surahSelect');
        data.data.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.number;
            opt.textContent = `${s.number}. ${s.englishName}`;
            select.appendChild(opt);
        });
        loadSurah(1);
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        document.getElementById('surahSelect').value = s;
        page.innerHTML = "<div style='text-align:center; padding:50px;'>جاري التحميل...</div>";
        
        // Edition: ar.warsh (Importante per il vero testo Warsh marocchino)
        const edition = isWarsh ? 'ar.warsh' : 'it.piccardo';
        
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/${edition}`);
            const d = await res.json();
            const surah = d.data;

            document.getElementById('surahLabel').innerText = surah.englishName;
            renderMushaf(surah);
        } catch (e) { page.innerHTML = "Errore di caricamento."; }
    }

    function renderMushaf(surah) {
        let html = `
            <div class="surah-frame">
                <div class="surah-name">${surah.name}</div>
            </div>
        `;

        if (currentSurah !== 1 && currentSurah !== 9) {
            html += `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
        }

        html += `<div class="quran-text-warsh">`;
        surah.ayahs.forEach(v => {
            let text = v.text;
            // Pulisce Bismillah automatica se presente nel primo verso (tranne Fatiha)
            if (v.numberInSurah === 1 && currentSurah !== 1 && currentSurah !== 9) {
                text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");
            }
            html += `<span id="a-${v.numberInSurah}" onclick="playAyah(${currentSurah}, ${v.numberInSurah}, this)">${text} <span class="ayah-sign">${v.numberInSurah}</span></span> `;
        });
        html += `</div>`;
        
        page.innerHTML = html;
        page.scrollTop = 0;
    }

    function playAyah(s, a, el) {
        document.querySelectorAll('.quran-text-warsh span').forEach(s => s.classList.remove('active-word'));
        el.classList.add('active-word');
        
        // Recitatore Al-Hussary (Warsh) per massima fedeltà
        player.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${String(s).padStart(3, '0')}${String(a).padStart(3, '0')}.mp3`;
        player.play();
    }

    function toggleMode() {
        isWarsh = !isWarsh;
        document.getElementById('modeBtn').innerText = isWarsh ? "MUSHAF WARSH" : "TRADUZIONE ITA";
        loadSurah(currentSurah);
    }

    function changeSurah(dir) {
        let n = currentSurah + dir;
        if (n >= 1 && n <= 114) loadSurah(n);
    }

    window.onload = init;
</script>

</body>
</html>
