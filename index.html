<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Tajweed Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <button class="icon-btn" id="main-menu"><i class="fas fa-bars"></i></button>
        <div class="header-center">
            <span id="surah-title">سُورَةُ القَصَصِ</span>
        </div>
        <div class="header-right">
            <button class="icon-btn"><i class="fas fa-search"></i></button>
            <button class="icon-btn"><i class="fas fa-bookmark"></i></button>
            <span class="hd-tag">HD</span>
        </div>
    </header>

    <main class="mushaf-viewer">
        <div id="page-container">
            <img id="quran-img" src="https://www.searchtruth.org/quran/images2/392.png" alt="Caricamento Corano...">
            
            <button class="nav-arrow prev" id="btn-prev"><i class="fas fa-chevron-left"></i></button>
            <button class="nav-arrow next" id="btn-next"><i class="fas fa-chevron-right"></i></button>
        </div>
    </main>

    <footer class="app-footer">
        <div class="footer-content">
            <button class="footer-btn">القائمة الثانوية ≡</button>
            <div class="page-indicator">
                <span id="page-num">صفحة ٣٩٢</span>
            </div>
            <div class="audio-mini-player">
                <button id="play-pause"><i class="fas fa-play"></i></button>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
