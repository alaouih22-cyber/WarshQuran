<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#042f2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="referrer" content="no-referrer">
    <title>Al-Qur'an Premium Pro (Warsh)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-green: #042f2e; --gold: #d97706; --gold-light: #fbbf24; --card: #ffffff; --sidebar-bg: #031d1c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--p-green); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; color: #1e293b; }
        
        /* Layout */
        .app-shell { display: flex; flex-direction: column; height: 100vh; background: linear-gradient(135deg, #042f2e 0%, #022c22 100%); position: relative; }
        
        /* Header Premium */
        .header { padding: 15px 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(217, 119, 6, 0.3); display: flex; align-items: center; justify-content: space-between; }
        .menu-trigger { color: var(--gold-light); font-size: 1.5rem; cursor: pointer; }
        .logo { color: var(--gold-light); font-weight: 800; font-size: 1rem; letter-spacing: 1px; }

        /* Sidebar / Menu Laterale */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--sidebar-bg); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 2px solid var(--gold); padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-header { border-bottom: 1px solid rgba(217, 119, 6, 0.3); padding-bottom: 15px; margin-bottom: 20px; color: var(--gold-light); font-weight: bold; display: flex; justify-content: space-between; }
        .side-item { padding: 12px 15px; color: #fff; display: flex; align-items: center; gap: 15px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .side-item:active { background: rgba(217, 119, 6, 0.2); }
        .side-item i { color: var(--gold-light); width: 20px; text-align: center; }

        /* Tabs & Selectors */
        .top-nav { padding: 10px 15px; }
        .selector-row { display: flex; gap: 8px; margin-bottom: 10px; }
        select { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(217, 119, 6, 0.4); padding: 10px; border-radius: 12px; font-size: 0.8rem; flex: 1; outline: none; }
        option { background: var(--p-green); }

        .tabs { display: flex; background: rgba(0, 0, 0, 0.2); padding: 4px; border-radius: 14px; }
        .tab { flex: 1; padding: 10px; text-align: center; color: rgba(255, 255, 255, 0.5); font-weight: 700; font-size: 0.75rem; cursor: pointer; border-radius: 10px; }
        .tab.active { background: var(--gold); color: white; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; position: relative; }
        .ayah-card { background: var(--card); border-radius: 20px; padding: 22px; margin-bottom: 15px; border-left: 5px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer; }
        .ayah-card.playing { background: #fff9e6; border-left-color: var(--gold-light); transform: scale(1.01); }
        .arabic-text { direction: rtl; font-family: 'Scheherazade New', serif; font-size: 2.1rem; line-height: 2.4; text-align: right; color: #0f172a; }
        .translation-text { font-size: 0.95rem; color: #475569; line-height: 1.5; font-style: italic; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        
        /* Mushaf Fixed */
        #mushafContainer { width: 100%; text-align: center; }
        #mushafImg { width: 100%; border-radius: 12px; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.5); background: white; min-height: 300px; }

        /* Player bar */
        .player-bar { background: white; padding: 15px 20px; border-top: 3px solid var(--gold); display: flex; align-items: center; gap: 15px; }
        .play-btn { width: 54px; height: 54px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; cursor: pointer; box-shadow: 0 4px 10px rgba(217,119,6,0.3); }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; z-index: 100; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--gold-light); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .overlay-bg { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:900; display:none; }
    </style>
</head>
<body>

<div class="overlay-bg" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR MENU -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">MENU PREMIUM <i class="fas fa-times" onclick="toggleSidebar()"></i></div>
    <div class="side-item" onclick="switchTab('tafsir')"><i class="fas fa-book-open"></i> التفسير (Tafsir)</div>
    <div class="side-item" onclick="switchTab('asbab')"><i class="fas fa-history"></i> أسباب النزول (Asbab)</div>
    <div class="side-item"><i class="fas fa-language"></i> معاني الكلمات (Vocabolario)</div>
    <div class="side-item"><i class="fas fa-spell-check"></i> الإعراب (Grammatica)</div>
    <div class="side-item"><i class="fas fa-祈禱"></i> أذكار المسلم (Adhkar)</div>
    <div class="side-item"><i class="fas fa-shield-alt"></i> الرقية الشرعية (Ruqyah)</div>
    <div class="side-item"><i class="fas fa-ellipsis-h"></i> السبحة (Subha Digitale)</div>
</div>

<div class="app-shell">
    <header class="header">
        <i class="fas fa-bars menu-trigger" onclick="toggleSidebar()"></i>
        <div class="logo">QUR'AN PRO WARSH</div>
        <i class="fas fa-search" style="color:var(--gold-light)"></i>
    </header>

    <div class="top-nav">
        <div class="selector-row">
            <select id="surahSelect" onchange="loadSurah(this.value)"></select>
            <select id="reciterSelect">
                <option value="Husary_Warsh_64kbps">Al-Hussary (Warsh)</option>
                <option value="Minshawi_Murattal_128kbps">Al-Minshawi</option>
                <option value="Qazabri_64kbps">Al-Qazabri (Warsh)</option>
                <option value="Alafasy_128kbps">Alafasy</option>
            </select>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('reader')">LETTURA</div>
            <div class="tab" onclick="switchTab('mushaf')">MUSHAF</div>
        </div>
    </div>

    <main class="main-content" id="mainContent">
        <div id="loader"><div class="spinner"></div></div>
        <div id="renderArea"></div>
    </main>

    <footer class="player-bar">
        <div class="play-btn" onclick="togglePlayback()"><i class="fas fa-play" id="playIcon"></i></div>
        <div style="flex:1; overflow: hidden;">
            <div id="currentAyahName" style="font-size:0.85rem; font-weight:800; color:var(--p-green); white-space:nowrap; text-overflow:ellipsis;">Seleziona versetto</div>
            <div style="font-size:0.65rem; color:#64748b;">Recitazione Premium</div>
        </div>
        <i class="fas fa-step-forward" style="color:var(--gold); font-size:1.4rem;" onclick="nextAyah()"></i>
    </footer>
</div>

<audio id="audioEngine"></audio>

<script>
    let currentSurah = 1, currentAyahIdx = 0, ayahsData = [], isPlaying = false, activeTab = 'reader';
    const audio = document.getElementById('audioEngine'), renderArea = document.getElementById('renderArea'), loader = document.getElementById('loader');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
    const pageMapping = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];

    window.onload = () => {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    };

    function toggleSidebar() {
        const side = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        side.classList.toggle('open');
        overlay.style.display = side.classList.contains('open') ? 'block' : 'none';
    }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        if(t === 'reader' || t === 'mushaf') {
            document.querySelectorAll('.tab')[t === 'reader' ? 0 : 1].classList.add('active');
        }
        if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        renderContent();
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        loader.style.display = 'flex';
        try {
            const [resAr, resIt, resTaf] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.jalalayn`)
            ]);
            const dataAr = await resAr.json();
            const dataIt = await resIt.json();
            const dataTaf = await resTaf.json();
            ayahsData = dataAr.data.ayahs.map((a, i) => ({ 
                num: a.numberInSurah, 
                ar: a.text, 
                it: dataIt.data.ayahs[i].text,
                tafsir: dataTaf.data.ayahs[i].text
            }));
            renderContent();
        } catch (e) { renderArea.innerHTML = "Errore connessione."; }
        loader.style.display = 'none';
    }

    function renderContent() {
        renderArea.innerHTML = "";
        if (activeTab === 'mushaf') {
            const p = pageMapping[currentSurah - 1];
            // Fix Mushaf Display: utilizzando jsDelivr CDN per il permalink GitHub fornito
            const imgUrl = `https://cdn.jsdelivr.net/gh/muslimDevCommunity/quran-warsh@485fd1b62b0d6e1814eed7a7747d4a230a543e58/src/res/pages/page${p.toString().padStart(3, '0')}.png`;
            renderArea.innerHTML = `<div id="mushafContainer"><img id="mushafImg" src="${imgUrl}" onload="this.style.display='block'" onerror="this.src='https://wsrv.nl/?url=https://easyquran.com/quran-jpg-w/${p}.jpg'"></div>`;
            return;
        }

        ayahsData.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = `ayah-card ${currentAyahIdx === i && isPlaying ? 'playing' : ''}`;
            let textAr = (currentSurah === 1 && a.num === 4) ? "مَلِكِ يَوْمِ الدِّينِ" : a.ar;
            
            let extraContent = a.it;
            if(activeTab === 'tafsir') extraContent = `<b style="color:var(--gold)">TAFSIR:</b> ${a.tafsir}`;
            if(activeTab === 'asbab') extraContent = `<b style="color:var(--gold)">ASBAB:</b> Dati in caricamento...`;

            card.innerHTML = `<div class="arabic-text">${textAr} (${a.num})</div><div class="translation-text">${extraContent}</div>`;
            card.onclick = () => playAyah(i);
            renderArea.appendChild(card);
        });
    }

    function playAyah(idx) {
        currentAyahIdx = idx;
        const s = String(currentSurah).padStart(3, '0'), v = String(ayahsData[idx].num).padStart(3, '0');
        const reciter = document.getElementById('reciterSelect').value;
        
        // Link audio corretti
        let baseUrl = `https://www.everyayah.com/data/${reciter}/${s}${v}.mp3`;
        
        // Fix specifico per Al-Qazabri se l'ID è diverso
        if(reciter === "Qazabri_64kbps") baseUrl = `https://www.everyayah.com/data/Kushayli_64kbps/${s}${v}.mp3`;

        audio.src = baseUrl;
        audio.play().catch(e => {
            // Fallback se il file mp3 non esiste su EveryAyah
            console.log("Audio non trovato, provo Hussary Warsh");
            audio.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${v}.mp3`;
            audio.play();
        });
        
        isPlaying = true; 
        updateUI();
    }

    function togglePlayback() {
        if (isPlaying) { audio.pause(); isPlaying = false; }
        else { if(!audio.src) playAyah(0); else audio.play(); isPlaying = true; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('currentAyahName').innerText = `${surahNames[currentSurah-1]} - Verso ${ayahsData[currentAyahIdx].num}`;
        document.querySelectorAll('.ayah-card').forEach((c, i) => c.classList.toggle('playing', i === currentAyahIdx && isPlaying));
    }

    audio.onended = () => { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); else { isPlaying = false; updateUI(); } };
    function nextAyah() { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); }
</script>
</body>
</html>
