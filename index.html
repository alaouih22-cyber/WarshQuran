<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Warsh Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Scheherazade+New&display=swap" rel="stylesheet">
    <style>
        .arabic { font-family: 'Scheherazade New', serif; direction: rtl; }
        .mushaf-page { max-width: 100%; height: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .active-ayah { background-color: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981; }
    </style>
</head>
<body class="bg-stone-100 text-slate-900 font-sans">

    <!-- Navbar -->
    <nav class="bg-emerald-800 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Qur'an Warsh IT</h1>
            <div class="flex gap-4">
                <button onclick="toggleView()" id="viewToggle" class="bg-emerald-700 px-3 py-1 rounded">Vista Testo</button>
                <input type="number" id="searchPage" placeholder="Pagina" class="w-16 p-1 text-black rounded text-sm">
            </div>
        </div>
    </nav>

    <div class="container mx-auto flex flex-col md:flex-row gap-6 p-4">
        
        <!-- Sidebar: Lista Sure -->
        <aside class="w-full md:w-1/4 h-[80vh] overflow-y-auto bg-white rounded-lg shadow p-4 order-2 md:order-1">
            <h2 class="font-bold border-b pb-2 mb-4 italic">Indice delle Sure</h2>
            <div id="surahList" class="space-y-1"></div>
        </aside>

        <!-- Main Content -->
        <main class="w-full md:w-2/4 order-1 md:order-2">
            <!-- Modalità Mushaf (Pagina) -->
            <div id="mushafView" class="flex justify-center bg-white p-4 rounded-lg shadow">
                <img id="mushafImg" src="https://mushaf.me/warsh/pages/1.png" alt="Mushaf Warsh" class="mushaf-page">
            </div>

            <!-- Modalità Testo (Versetti) -->
            <div id="textView" class="hidden space-y-4">
                <!-- I versetti verranno caricati qui -->
            </div>

            <!-- Navigazione Pagine -->
            <div class="flex justify-between mt-6 items-center">
                <button onclick="changePage(-1)" class="bg-emerald-800 text-white px-6 py-2 rounded-full">← Succ</button>
                <span id="pageIndicator" class="font-bold">Pagina 1</span>
                <button onclick="changePage(1)" class="bg-emerald-800 text-white px-6 py-2 rounded-full">Prec →</button>
            </div>
        </main>

        <!-- Right Panel: Traduzione e Tafsir -->
        <aside class="w-full md:w-1/4 bg-white rounded-lg shadow p-4 order-3">
            <div id="detailPanel">
                <h2 class="font-bold text-emerald-800 border-b pb-2">Dettagli Versetto</h2>
                <div id="ayahContent" class="mt-4">
                    <p class="text-gray-500 italic">Clicca su un versetto per vedere la traduzione e il tafsir.</p>
                </div>
                <div id="audioPlayer" class="mt-4 hidden border-t pt-4">
                    <audio id="player" controls class="w-full"></audio>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let currentPage = 1;
        let isMushafView = true;
        let currentSurah = 1;

        async function init() {
            loadSurahList();
            loadPage(currentPage);
        }

        async function loadSurahList() {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            const list = document.getElementById('surahList');
            data.data.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-2 hover:bg-emerald-50 rounded flex justify-between";
                btn.innerHTML = `<span>${s.number}. ${s.englishName}</span> <span class="arabic">${s.name}</span>`;
                btn.onclick = () => loadSurah(s.number);
                list.appendChild(btn);
            });
        }

        async function loadPage(page) {
            currentPage = page;
            document.getElementById('mushafImg').src = `https://mushaf.me/warsh/pages/${page}.png`;
            document.getElementById('pageIndicator').innerText = `Pagina ${page}`;
            // Carica anche i dati testuali in background
            loadTextDataForPage(page);
        }

        async function loadSurah(id) {
            currentSurah = id;
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            loadPage(data.data.ayahs[0].page);
            if(!isMushafView) renderTextView(id);
        }

        async function loadTextDataForPage(page) {
            // Nota: L'API restituisce il testo Hafs, per Warsh puro nel testo servono font specifici o API dedicate
            const res = await fetch(`https://api.alquran.cloud/v1/page/${page}/it.piccardo`);
            const data = await res.json();
            renderTextView(data.data.ayahs);
        }

        function renderTextView(ayahs) {
            const container = document.getElementById('textView');
            container.innerHTML = '';
            ayahs.forEach(a => {
                const div = document.createElement('div');
                div.className = "p-4 border-b cursor-pointer hover:bg-gray-50 transition";
                div.innerHTML = `
                    <div class="arabic text-2xl text-right mb-2 leading-loose">${a.text}</div>
                    <div class="text-sm text-gray-600">${a.surah.englishName} : ${a.numberInSurah}</div>
                `;
                div.onclick = () => showDetails(a);
                container.appendChild(div);
            });
        }

        function showDetails(ayah) {
            const detail = document.getElementById('ayahContent');
            detail.innerHTML = `
                <div class="mb-4">
                    <span class="text-xs bg-emerald-100 text-emerald-800 px-2 py-1 rounded">TRADUZIONE ITALIANA</span>
                    <p class="mt-2 text-lg">${ayah.text}</p>
                </div>
                <div class="mt-4">
                    <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">TAFSIR (Jalalayn)</span>
                    <p class="mt-2 text-sm text-gray-700" id="tafsirBox">Caricamento...</p>
                </div>
            `;
            
            // Audio
            const audio = document.getElementById('audioPlayer');
            audio.classList.remove('hidden');
            // Al-Hussary è il riferimento per Warsh
            document.getElementById('player').src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${ayah.surah.number.toString().padStart(3,'0')}${ayah.numberInSurah.toString().padStart(3,'0')}.mp3`;
            
            // Carica Tafsir (API aggiuntiva)
            fetch(`https://api.alquran.cloud/v1/ayah/${ayah.number}/ar.jalalayn`)
                .then(r => r.json())
                .then(d => document.getElementById('tafsirBox').innerText = d.data.text);
        }

        function toggleView() {
            isMushafView = !isMushafView;
            document.getElementById('mushafView').classList.toggle('hidden');
            document.getElementById('textView').classList.toggle('hidden');
            document.getElementById('viewToggle').innerText = isMushafView ? 'Vista Testo' : 'Vista Mushaf';
        }

        function changePage(delta) {
            let newPage = currentPage + delta;
            if(newPage > 0 && newPage <= 604) loadPage(newPage);
        }

        window.onload = init;
    </script>
</body>
</html>
