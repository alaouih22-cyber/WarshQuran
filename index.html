<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warsh Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #064e3b; --gold: #c5a059; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* Toolbar superiore minimale */
        .header { 
            background: var(--emerald); 
            padding: 5px 10px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
            border-bottom: 1px solid var(--gold);
        }
        
        #surahSelect { 
            flex: 1; 
            padding: 8px; 
            border-radius: 4px; 
            border: none; 
            font-size: 14px; 
            font-weight: bold;
        }

        .btn-mode {
            background: var(--gold);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        }

        /* Area Mushaf: Solo l'immagine, niente fronzoli */
        .mushaf-container {
            flex: 1;
            position: relative;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mushafImg {
            max-width: 100%;
            max-height: 100%;
            display: block;
            background-color: #fff;
        }

        /* Navigazione rapida (Zone di tocco invisibili) */
        .nav-zone {
            position: absolute; top: 0; height: 100%; width: 40%; z-index: 10;
        }
        .nav-next { left: 0; }
        .nav-prev { right: 0; }

        /* Vista Italiano */
        #itView {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fdf6e3; overflow-y: auto; padding: 20px;
            display: none; z-index: 20;
        }
        .ayah-it { padding: 15px; border-bottom: 1px solid #ddd; font-size: 1.1rem; line-height: 1.5; color: #333; }

        /* Footer */
        .footer { 
            background: var(--emerald); 
            padding: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 1px solid var(--gold);
        }
        .btn-nav { background: var(--gold); color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; }
        #pageIndicator { color: var(--gold); font-weight: bold; }

        /* Caricamento */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--gold); font-size: 12px; z-index: 5;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <select id="surahSelect" onchange="jumpTo(this.value)"></select>
        <button class="btn-mode" onclick="toggleMode()" id="modeBtn">ITALIANO</button>
    </div>

    <div class="mushaf-container">
        <div id="loader">Caricamento...</div>
        <div id="itView"></div>
        
        <div class="nav-zone nav-next" onclick="nav(-1)"></div>
        <div class="nav-zone nav-prev" onclick="nav(1)"></div>
        
        <img id="mushafImg" src="" alt="Mushaf">
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="nav(1)"><i class="fas fa-arrow-right"></i></button>
        <div id="pageIndicator">P. 1</div>
        <button class="btn-nav" onclick="nav(-1)"><i class="fas fa-arrow-left"></i></button>
    </div>
</div>

<script>
    let page = 1;
    let surah = 1;
    let isIt = false;

    const surahStartPages = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];
    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];

    function init() {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadPage();
    }

    function toggleMode() {
        isIt = !isIt;
        document.getElementById('modeBtn').innerText = isIt ? "MUSHAF" : "ITALIANO";
        document.getElementById('itView').style.display = isIt ? "block" : "none";
        if(isIt) loadIt(); else loadPage();
    }

    function loadPage() {
        if(isIt) return;
        const img = document.getElementById('mushafImg');
        const loader = document.getElementById('loader');
        loader.style.display = "block";
        
        // --- TRIPLA SPINTA CARICAMENTO ---
        // Proviamo il proxy più veloce con parametri di ottimizzazione
        const proxy1 = `https://images.weserv.nl/?url=easyquran.com/quran-jpg-w/${page}.jpg&w=1000&q=70&il`;
        const proxy2 = `https://wsrv.nl/?url=www.easyquran.com/quran-jpg-w/${page}.jpg&output=jpg`;
        
        img.src = proxy1;

        img.onload = () => { loader.style.display = "none"; };
        img.onerror = () => { img.src = proxy2; }; // Se il primo fallisce, usa il secondo

        document.getElementById('pageIndicator').innerText = `P. ${page}`;
        syncSurah();
        preload();
    }

    async function loadIt() {
        const view = document.getElementById('itView');
        view.innerHTML = "Caricamento...";
        try {
            const r = await fetch(`https://api.alquran.cloud/v1/surah/${surah}/it.piccardo`);
            const d = await r.json();
            let h = `<h2>${d.data.englishName}</h2>`;
            d.data.ayahs.forEach(a => { h += `<div class="ayah-it"><b>${a.numberInSurah}.</b> ${a.text}</div>`; });
            view.innerHTML = h;
            document.getElementById('pageIndicator').innerText = `Sura ${surah}`;
        } catch(e) { view.innerHTML = "Errore."; }
    }

    function preload() {
        if(page < 604) new Image().src = `https://images.weserv.nl/?url=easyquran.com/quran-jpg-w/${page+1}.jpg&w=1000&q=70&il`;
    }

    function nav(d) {
        if(isIt) {
            surah = Math.max(1, Math.min(114, surah + d));
            page = surahStartPages[surah-1];
            loadIt();
        } else {
            // Per l'arabo d è invertito
            page = Math.max(1, Math.min(604, page + d));
            loadPage();
        }
    }

    function jump(s) {
        surah = parseInt(s);
        page = surahStartPages[surah-1];
        if(isIt) loadIt(); else loadPage();
    }

    function syncSurah() {
        for (let i = 0; i < surahStartPages.length; i++) {
            if (page >= surahStartPages[i]) surah = i + 1; else break;
        }
        document.getElementById('surahSelect').value = surah;
    }

    window.onload = init;
</script>
</body>
</html>
