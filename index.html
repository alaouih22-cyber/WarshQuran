<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Mushaf Tajweed Warsh Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #c5a059; --paper: #fdf6e3; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: var(--paper); 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* Menu UI */
        .ui-panel {
            position: fixed; left: 0; width: 100%;
            background: rgba(6, 78, 59, 0.95); backdrop-filter: blur(10px);
            z-index: 100; transition: all 0.3s ease; opacity: 0; pointer-events: none;
            border-bottom: 2px solid var(--gold); padding: 12px;
            display: flex; gap: 8px; align-items: center;
        }
        .footer { top: auto; bottom: 0; border-bottom: none; border-top: 2px solid var(--gold); transform: translateY(100%); justify-content: space-between; }
        .header { top: 0; transform: translateY(-100%); }

        body.show-ui .ui-panel { opacity: 1; transform: translateY(0); pointer-events: auto; }

        #surahSelect { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; background: #fff; }
        .btn-mode { background: var(--gold); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }

        /* AREA TESTO */
        .content-container {
            width: 100vw; height: 100vh;
            overflow-y: auto; padding: 20px;
            padding-top: 40px; padding-bottom: 40px;
            display: flex; flex-direction: column; align-items: center;
            background: var(--paper);
        }

        /* STILE TAJWEED COLORATO */
        .quran-content {
            width: 100%; max-width: 800px;
            direction: rtl; text-align: right;
            font-family: 'Scheherazade New', serif;
            font-size: 2.4rem; line-height: 2.2;
            color: #111;
        }

        /* Classi Tajweed (Colori Mushaf) */
        .taj-madd { color: #eb0000; font-weight: bold; } /* Madd - Rosso */
        .taj-ghun { color: #00a651; font-weight: bold; } /* Ghunnah - Verde */
        .taj-qal  { color: #0072bc; font-weight: bold; } /* Qalqalah - Blu */
        .taj-mute { color: #999999; }                   /* Lettere mute - Grigio */

        .ayah-block { cursor: pointer; padding: 10px; border-radius: 10px; transition: background 0.3s; display: inline; }
        .ayah-block.active { background: #f0e6cc; border-bottom: 2px solid var(--gold); }
        .ayah-num { 
            font-family: sans-serif; font-size: 1.1rem; color: var(--gold); 
            border: 1px solid var(--gold); border-radius: 50%; padding: 2px 8px; margin: 0 5px;
            display: inline-block; direction: ltr;
        }

        /* VISTA ITALIANO */
        .text-it { font-family: sans-serif; font-size: 1.2rem; direction: ltr; text-align: left; margin-bottom: 20px; display: none; }

        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; border: 5px solid #ccc; border-top: 5px solid var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite; z-index: 200; display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="show-ui">

<div class="header ui-panel">
    <select id="surahSelect" onchange="loadSurah(this.value)"></select>
    <button class="btn-mode" onclick="toggleMode()" id="modeBtn">ITALIANO</button>
</div>

<div id="loader"></div>

<div class="content-container" id="mainScroll" onclick="toggleUI()">
    <div id="quranText" class="quran-content"></div>
</div>

<div class="footer ui-panel">
    <button class="btn-mode" style="padding: 15px 30px;" onclick="nav(-1)"><i class="fas fa-chevron-right"></i></button>
    <div id="surahLabel" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;">Sura 1</div>
    <button class="btn-mode" style="padding: 15px 30px;" onclick="nav(1)"><i class="fas fa-chevron-left"></i></button>
</div>

<audio id="audioPlayer"></audio>

<script>
    let currentSurah = 1;
    let mode = 'ar'; // ar o it
    const quranText = document.getElementById('quranText');
    const loader = document.getElementById('loader');
    const player = document.getElementById('audioPlayer');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];

    function init() {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    }

    function toggleUI() { document.body.classList.toggle('show-ui'); }

    function toggleMode() {
        mode = (mode === 'ar') ? 'it' : 'ar';
        document.getElementById('modeBtn').innerText = (mode === 'ar') ? 'ITALIANO' : 'ARABO';
        loadSurah(currentSurah);
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        document.getElementById('surahSelect').value = s;
        document.getElementById('surahLabel').innerText = surahNames[s-1];
        loader.style.display = "block";
        quranText.innerHTML = "";

        const edition = (mode === 'ar') ? 'ar.tajweed' : 'it.piccardo';
        
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/${edition}`);
            const data = await res.json();
            
            data.data.ayahs.forEach(v => {
                const span = document.createElement('span');
                span.className = 'ayah-block';
                let text = v.text;

                if (mode === 'ar') {
                    // PARSER TAJWEED: Converte i tag API in HTML colorato
                    text = text
                        .replace(/\[m/g, '<span class="taj-madd">').replace(/\[g/g, '<span class="taj-ghun">')
                        .replace(/\[q/g, '<span class="taj-qal">').replace(/\[i/g, '<span class="taj-mute">')
                        .replace(/\]/g, '</span>');
                    
                    span.innerHTML = `${text} <span class="ayah-num">${v.numberInSurah}</span> `;
                    quranText.style.direction = "rtl";
                    quranText.style.textAlign = "right";
                } else {
                    span.innerHTML = `<p style="direction:ltr; text-align:left; margin-bottom:15px;"><b>${v.numberInSurah}.</b> ${text}</p>`;
                    quranText.style.direction = "ltr";
                    quranText.style.textAlign = "left";
                }

                span.onclick = (e) => {
                    e.stopPropagation();
                    playAyah(v.numberInSurah, span);
                };
                quranText.appendChild(span);
            });
        } catch (e) { quranText.innerHTML = "Errore di caricamento."; }
        loader.style.display = "none";
    }

    function playAyah(num, el) {
        document.querySelectorAll('.ayah-block').forEach(b => b.classList.remove('active'));
        el.classList.add('active');

        const s = currentSurah.toString().padStart(3, '0');
        const a = num.toString().padStart(3, '0');
        
        // AUDIO AL-HUSSARY WARSH (Link Corretto)
        player.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${a}.mp3`;
        player.play().catch(err => console.log("Audio non disponibile o bloccato dal browser"));
    }

    function nav(d) {
        let n = currentSurah + d;
        if(n >= 1 && n <= 114) loadSurah(n);
    }

    window.onload = init;
</script>
</body>
</html>
