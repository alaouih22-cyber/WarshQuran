<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Warsh Professional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Visualizzazione Mushaf (Pagine) -->
    <div id="mushafContainer" onclick="ui.toggleMenu()">
        <img id="pageImg" src="https://easyquran.com" alt="Pagina Corano">
        <div id="loadingOverlay" class="hidden">جاري التحميل...</div>
    </div>

    <!-- Pannello Controllo (Slide-up) -->
    <div id="mainMenu" class="hidden">
        <div class="header-menu">
            <h2>إعدادات المصحف</h2>
            <button onclick="ui.toggleMenu()">✕</button>
        </div>
        
        <div class="control-grid">
            <section>
                <label>السورة</label>
                <select id="surahSelect"></select>
            </section>
            
            <section>
                <label>القارئ (ورش)</label>
                <select id="reciterSelect"></select>
            </section>
            
            <section>
                <label>التفسير</label>
                <select id="tafsirSelect"></select>
            </section>
        </div>

        <div id="tafsirContent">
            <h3>التفسير الكامل للمختارة</h3>
            <div id="tafsirList">اختر سورة لتحميل التفسير...</div>
        </div>
    </div>

    <!-- Player Audio Fisso -->
    <footer id="playerBar">
        <audio id="mainAudio" controls></audio>
    </footer>

    <script src="app.js"></script>
</body>
</html>
