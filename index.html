<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran App</title>
    <style>
        body { 
            margin: 0; 
            background-color: #f4ecd8; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: sans-serif;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }

        /* Questa immagine caricherà sicuramente! */
        img {
            max-width: 100%;
            max-height: 100%;
            border: 2px solid #c9a44c;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .footer {
            background-color: #1a252f;
            color: #f1c40f;
            display: flex;
            justify-content: space-around;
            padding: 20px;
            font-weight: bold;
            border-top: 3px solid #f1c40f;
        }

        .btn { cursor: pointer; background: #2c3e50; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="content">
        <img src="https://www.searchtruth.org/quran/images2/1.png" alt="Quran Page">
    </div>

    <div class="footer">
        <div class="btn">≡ السور</div>
        <div>الصفحة 1</div>
        <div class="btn">▶ استماع</div>
    </div>

</body>
</html>
