<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Qur'an Warsh Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #c5a059; --dark: #1a1a1a; }
        body { background-color: var(--dark); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .arabic-warsh { 
            font-family: 'Noto Naskh Arabic', serif; 
            direction: rtl; 
            line-height: 2.8;
            font-size: 2.2rem;
        }

        /* Tajweed Colors */
        .tajweed-madd { color: #ff0000; }
        .tajweed-ghunnah { color: #1b8e2d; }
        .tajweed-qalqalah { color: #0070bb; }

        /* Smooth Drawer */
        #drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .drawer-closed { transform: translateX(-100%); }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .ayah-card {
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }
        .ayah-card:active { background: rgba(197, 160, 89, 0.05); }
        .active-playing { background: rgba(197, 160, 89, 0.15); border-right: 4px solid var(--gold); }
    </style>
</head>
<body class="text-stone-200">

    <!-- Overlay per chiudere il menu -->
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 hidden z-[900] backdrop-blur-sm"></div>

    <!-- Sidebar (Drawer) -->
    <div id="drawer" class="fixed top-0 left-0 h-full w-80 bg-[#0c2a22] shadow-2xl drawer-closed p-6 z-[1000] border-r border-gold/30">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-gold font-bold text-xl italic uppercase tracking-widest">Seleziona Sura</h2>
            <button onclick="toggleMenu()" class="text-gold text-2xl">&times;</button>
        </div>
        <div class="mb-4">
            <input type="text" id="surahSearch" placeholder="Cerca Sura..." onkeyup="filterSurahs()" class="w-full bg-emerald-900/50 border border-gold/30 rounded-lg p-3 text-sm outline-none focus:border-gold">
        </div>
        <div id="surahList" class="space-y-2 h-[calc(100%-120px)] overflow-y-auto custom-scroll pr-2">
            <!-- Popolato via JS -->
        </div>
    </div>

    <!-- Main Wrapper -->
    <div class="h-screen flex flex-col relative">
        
        <!-- Header Immersivo -->
        <header class="p-4 flex justify-between items-center bg-transparent absolute top-0 left-0 w-full z-50">
            <button onclick="toggleMenu()" class="w-12 h-12 flex items-center justify-center bg-emerald-900/40 rounded-full border border-gold/20 text-gold shadow-lg backdrop-blur-md">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="text-center">
                <h1 id="currentSurahName" class="text-gold font-bold text-lg leading-tight">Al-Fatihah</h1>
                <p id="surahMeaning" class="text-stone-400 text-[10px] uppercase tracking-tighter">L'aprente</p>
            </div>
            <button onclick="window.location.reload()" class="w-12 h-12 flex items-center justify-center bg-emerald-900/40 rounded-full border border-gold/20 text-gold shadow-lg backdrop-blur-md">
                <i class="fas fa-redo-alt"></i>
            </button>
        </header>

        <!-- Reader Area -->
        <main id="reader" class="flex-1 overflow-y-auto pt-24 pb-32 px-6 custom-scroll bg-[#0a0a0a]">
            <!-- I versetti appariranno qui -->
            <div id="ayahContainer" class="max-w-3xl mx-auto space-y-10">
                <div class="text-center animate-pulse text-gold mt-20">Caricamento Mushaf Warsh...</div>
            </div>
        </main>

        <!-- Audio Control Floating Bar -->
        <footer id="audioBar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-lg bg-emerald-900/80 backdrop-blur-xl border border-gold/30 rounded-3xl p-4 shadow-2xl z-50 hidden">
            <div class="flex items-center gap-4">
                <div id="ayahIndicator" class="bg-gold text-emerald-900 font-bold w-10 h-10 rounded-full flex items-center justify-center text-sm shadow-inner">1</div>
                <div class="flex-1">
                    <p class="text-[10px] text-gold uppercase font-bold tracking-widest">Recitazione</p>
                    <p class="text-xs truncate italic">Al-Hussary (Riwayat Warsh)</p>
                </div>
                <audio id="mainPlayer" onended="onAudioEnded()"></audio>
                <button onclick="togglePlay()" id="playBtn" class="bg-gold text-emerald-900 w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-transform active:scale-90">
                    <i class="fas fa-play text-xl ml-1"></i>
                </button>
            </div>
        </footer>
    </div>

    <script>
        let currentSurah = 1;
        let allSurahs = [];
        let ayahsData = [];
        let isPlaying = false;
        let currentAyahIndex = 0;

        async function init() {
            await loadSurahList();
            await loadSurah(1);
        }

        async function loadSurahList() {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            allSurahs = data.data;
            const list = document.getElementById('surahList');
            list.innerHTML = '';
            allSurahs.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "w-full flex items-center p-4 rounded-xl border border-white/5 hover:bg-gold/10 hover:border-gold/30 transition group";
                btn.onclick = () => { loadSurah(s.number); toggleMenu(); };
                btn.innerHTML = `
                    <span class="text-gold/50 font-mono text-xs mr-4">${s.number.toString().padStart(3,'0')}</span>
                    <div class="flex-1 text-left">
                        <div class="text-white font-bold text-sm group-hover:text-gold transition">${s.englishName}</div>
                        <div class="text-stone-500 text-[10px] uppercase">${s.englishNameTranslation}</div>
                    </div>
                    <div class="arabic text-gold text-lg">${s.name}</div>
                `;
                list.appendChild(btn);
            });
        }

        async function loadSurah(id) {
            currentSurah = id;
            const container = document.getElementById('ayahContainer');
            container.innerHTML = '<div class="text-center text-gold py-20"><i class="fas fa-circle-notch animate-spin text-3xl"></i></div>';
            
            try {
                // Carichiamo testo Warsh e traduzione Piccardo
                const [arRes, itRes] = await Promise.all([
                    fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.warsh`),
                    fetch(`https://api.alquran.cloud/v1/surah/${id}/it.piccardo`)
                ]);
                
                const arData = await arRes.json();
                const itData = await itRes.json();
                
                ayahsData = arData.data.ayahs.map((ayah, i) => ({
                    ...ayah,
                    translation: itData.data.ayahs[i].text
                }));

                document.getElementById('currentSurahName').innerText = arData.data.englishName;
                document.getElementById('surahMeaning').innerText = arData.data.englishNameTranslation;

                renderAyahs();
            } catch (e) {
                container.innerHTML = '<div class="text-red-500">Errore nel caricamento. Riprova.</div>';
            }
        }

        function renderAyahs() {
            const container = document.getElementById('ayahContainer');
            container.innerHTML = '';
            
            // Bismillah (se non è Fatiha o Tawba)
            if(currentSurah != 1 && currentSurah != 9) {
                const bism = document.createElement('div');
                bism.className = "arabic-warsh text-center text-gold mb-12 text-4xl";
                bism.innerText = "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ";
                container.appendChild(bism);
            }

            ayahsData.forEach((a, index) => {
                const div = document.createElement('div');
                div.className = "ayah-card p-6 rounded-2xl cursor-pointer";
                div.id = `ayah-${index}`;
                div.onclick = () => playAyah(index);
                
                div.innerHTML = `
                    <div class="arabic-warsh text-right mb-6 select-none" style="word-spacing: 4px;">
                        ${a.text} <span class="inline-flex items-center justify-center w-10 h-10 border border-gold text-gold rounded-full text-sm font-sans mr-2"> ${a.numberInSurah} </span>
                    </div>
                    <div class="text-stone-400 text-sm leading-relaxed font-light italic">
                        ${a.translation}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function playAyah(index) {
            currentAyahIndex = index;
            const ayah = ayahsData[index];
            const player = document.getElementById('mainPlayer');
            const audioBar = document.getElementById('audioBar');
            
            // Highlight
            document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('active-playing'));
            document.getElementById(`ayah-${index}`).classList.add('active-playing');

            // Set Audio (Hussary Warsh)
            const surahKey = currentSurah.toString().padStart(3, '0');
            const ayahKey = ayah.numberInSurah.toString().padStart(3, '0');
            player.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${surahKey}${ayahKey}.mp3`;
            
            document.getElementById('ayahIndicator').innerText = ayah.numberInSurah;
            audioBar.classList.remove('hidden');
            
            player.play();
            isPlaying = true;
            updatePlayBtn();
        }

        function togglePlay() {
            const player = document.getElementById('mainPlayer');
            if(isPlaying) player.pause(); else player.play();
            isPlaying = !isPlaying;
            updatePlayBtn();
        }

        function updatePlayBtn() {
            const btn = document.getElementById('playBtn');
            btn.innerHTML = isPlaying ? '<i class="fas fa-pause text-xl"></i>' : '<i class="fas fa-play text-xl ml-1"></i>';
        }

        function onAudioEnded() {
            if(currentAyahIndex < ayahsData.length - 1) {
                playAyah(currentAyahIndex + 1);
                // Scroll automatico
                document.getElementById(`ayah-${currentAyahIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                isPlaying = false;
                updatePlayBtn();
            }
        }

        function toggleMenu() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('overlay');
            drawer.classList.toggle('drawer-closed');
            overlay.classList.toggle('hidden');
        }

        function filterSurahs() {
            const q = document.getElementById('surahSearch').value.toLowerCase();
            const btns = document.getElementById('surahList').getElementsByTagName('button');
            for (let btn of btns) {
                const text = btn.innerText.toLowerCase();
                btn.style.display = text.includes(q) ? 'flex' : 'none';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
