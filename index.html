<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warsh Quran</title>

<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#031d1c;
color:#fff;
font-family:'Scheherazade New';
}

header{
padding:15px;
background:#000;
color:#d4af37;
text-align:center;
font-weight:bold;
}

select{
width:100%;
padding:10px;
background:#111;
color:#fff;
border:1px solid #d4af37;
}

#content{
height:80vh;
overflow:hidden;
}

.page{
min-width:100%;
overflow-y:auto;
padding:10px;
}

.ayah{
margin-bottom:15px;
padding:10px;
border-radius:10px;
}

.ar{
font-size:2rem;
line-height:2;
}

.it{
font-size:.9rem;
opacity:.8;
}

</style>
</head>

<body>

<header>مصحف ورش</header>

<select id="surahSelect"></select>

<div id="content"></div>

<audio id="audio"></audio>

<script>

let surah=1;
let ayahs=[];
let page=0;

const content=document.getElementById("content");
const audio=document.getElementById("audio");

// init
window.onload=()=>{
for(let i=1;i<=114;i++){
let o=document.createElement("option");
o.value=i;
o.textContent="سورة "+i;
surahSelect.appendChild(o);
}
load(1);
};

surahSelect.onchange=e=>{
load(e.target.value);
};

// load data
async function load(s){

surah=s;

content.innerHTML="تحميل...";

try{
const res=await fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`);
const data=await res.json();

ayahs=data.data.ayahs;

render();

}catch(e){
content.innerHTML="خطأ في الاتصال";
}

}

// render mushaf
function render(){

content.innerHTML=`<div id="slider" style="display:flex;height:100%"></div>`;

const slider=document.getElementById("slider");

let block="",count=0;

ayahs.forEach((a,i)=>{

block+=`
<div class="ayah" onclick="play(${i})">
<div class="ar">${a.text} ﴿${a.numberInSurah}﴾</div>
</div>
`;

count++;

if(count===8 || i===ayahs.length-1){

let p=document.createElement("div");
p.className="page";
p.innerHTML=block;

slider.appendChild(p);

block="";
count=0;
}

});

initSwipe();

}

// play audio
function play(i){

let s=String(surah).padStart(3,"0");
let a=String(ayahs[i].numberInSurah).padStart(3,"0");

audio.src=`https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${a}.mp3`;
audio.play();

}

// swipe
let startX=0;

function initSwipe(){

const slider=document.getElementById("slider");

slider.ontouchstart=e=>{
startX=e.touches[0].clientX;
};

slider.ontouchend=e=>{
let diff=startX-e.changedTouches[0].clientX;

if(diff>50) page++;
if(diff<-50 && page>0) page--;

slider.style.transform=`translateX(-${page*100}%)`;
};

}

</script>

</body>
</html>
