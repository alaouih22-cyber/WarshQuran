<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Pro Italiano</title>
    <style>
        :root { --gold: #eab308; --dark: #0f172a; --bg: #020617; }
        body { margin: 0; background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Area Mushaf */
        .mushaf-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; cursor: pointer; background: radial-gradient(circle, #1e293b 0%, #020617 100%); }
        #quran-img { max-width: 100%; max-height: 85vh; border-radius: 5px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); background: white; }

        /* Menu Centrale (L'Anima) */
        .overlay-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); border: 2px solid var(--gold); border-radius: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; z-index: 100; transition: 0.3s; opacity: 0; pointer-events: none; }
        .overlay-menu.show { opacity: 1; pointer-events: auto; }
        .menu-item { text-align: center; color: var(--gold); cursor: pointer; font-size: 14px; text-decoration: none; }
        .menu-item i { display: block; font-size: 28px; margin-bottom: 8px; }

        /* Pannello Scorrevole Traduzione/Tafsir */
        .info-panel { height: 35vh; background: var(--dark); border-top: 3px solid var(--gold); padding: 20px; overflow-y: auto; display: none; }
        .info-panel.active { display: block; }
        .text-content { font-size: 1.1rem; line-height: 1.7; color: #f1f5f9; text-align: right; dir: rtl; }
        .text-it { text-align: left; dir: ltr; color: #fbbf24; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        /* Footer */
        .footer { background: var(--dark); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .btn-nav { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #loading { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 5px 15px; border-radius: 20px; display: none; z-index: 1000; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loading">Caricamento...</div>

    <div class="mushaf-container" onclick="toggleMenu()">
        <img id="quran-img" src="1.png" onerror="this.src='https://pwanew.mohib.me/tajweed_png/1.png'">
        
        <div id="main-menu" class="overlay-menu">
            <div class="menu-item" onclick="showContent('audio')"><i class="fas fa-play"></i>Ascolta</div>
            <div class="menu-item" onclick="showContent('trans')"><i class="fas fa-language"></i>Traduzione</div>
            <div class="menu-item" onclick="showContent('tafsir')"><i class="fas fa-book-open"></i>Tafsir</div>
            <div class="menu-item" onclick="window.open('https://sufi.it/wp-content/uploads/il-corano-in-italiano.pdf')"><i class="fas fa-file-pdf"></i>PDF Originale</div>
        </div>
    </div>

    <div id="info-panel" class="info-panel">
        <div id="panel-content" class="text-content"></div>
    </div>

    <div class="footer">
        <button class="btn-nav" onclick="changePage(-1)">← Prec</button>
        <div style="text-align:center">
            <b id="surah-label">Caricamento...</b><br>
            <small>Pagina <span id="page-num">1</span></small>
        </div>
        <button class="btn-nav" onclick="changePage(1)">Succ →</button>
    </div>

    <script>
        let currentPage = 1;
        const img = document.getElementById('quran-img');
        const loader = document.getElementById('loading');
        const panel = document.getElementById('info-panel');
        const content = document.getElementById('panel-content');

        async function fetchTranslation(page) {
            content.innerHTML = "Recupero traduzione italiana...";
            try {
                // Chiamata all'API per ottenere la traduzione italiana di quella pagina
                const res = await fetch(`https://api.alquran.cloud/v1/page/${page}/it.piccardo`);
                const data = await res.json();
                let html = "";
                data.data.ayahs.forEach(ayah => {
                    html += `<div class="text-it"><b>(${ayah.numberInSurah})</b> ${ayah.text}</div>`;
                });
                content.innerHTML = html;
                document.getElementById('surah-label').innerText = data.data.ayahs[0].surah.englishName;
            } catch (e) {
                content.innerHTML = "Errore nel caricamento della traduzione.";
            }
        }

        function toggleMenu() { document.getElementById('main-menu').classList.toggle('show'); }

        function showContent(type) {
            panel.classList.add('active');
            if(type === 'trans') fetchTranslation(currentPage);
            if(type === 'audio') {
                content.innerHTML = `<h3>Ascolta Recitazione</h3><audio controls autoplay style="width:100%"><source src="https://www.searchtruth.org/quran/audio/page/${currentPage}.mp3"></audio>`;
            }
            if(type === 'tafsir') content.innerHTML = `<h3>Tafsir</h3><p>Il Tafsir dettagliato per la pagina ${currentPage} è in fase di aggiornamento.</p>`;
            document.getElementById('main-menu').classList.remove('show');
        }

        function changePage(delta) {
            currentPage += delta;
            if(currentPage < 1) currentPage = 1;
            if(currentPage > 604) currentPage = 604;
            
            loader.style.display = 'block';
            img.src = (currentPage === 1) ? "1.png" : `https://pwanew.mohib.me/tajweed_png/${currentPage}.png`;
            
            img.onload = () => {
                loader.style.display = 'none';
                document.getElementById('page-num').innerText = currentPage;
                if(panel.classList.contains('active')) fetchTranslation(currentPage);
            };
        }

        window.onload = () => changePage(0);
    </script>
</body>
</html>
