<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>مصحف ورش الملون</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f2f2f2;
text-align:center;
}

header{
background:#0b6b50;
color:white;
padding:15px;
font-size:22px;
}

.controls{
background:white;
padding:10px;
}

select,input{
padding:8px;
margin:5px;
font-size:16px;
}

button{
padding:8px 15px;
background:#0b6b50;
color:white;
border:none;
margin:5px;
}

#pageContainer{
padding:10px;
}

#pageImg{
width:100%;
max-width:800px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

audio{
width:100%;
margin-top:10px;
}

.dark{
background:#111;
color:white;
}

</style>

</head>

<body>

<header>
📖 مصحف ورش الملون
</header>

<div class="controls">

Pagina

<input type="number" id="pageInput" value="1" min="1" max="604">

<button onclick="loadPage()">Apri</button>

<button onclick="prevPage()">◀</button>
<button onclick="nextPage()">▶</button>

<br>

<select id="reciter">

<option value="omar-al-qazabri">القزابري (ورش)</option>
<option value="abdellah-kamel">عبد الله كامل</option>
<option value="yassin-jazaery">ياسين الجزائري</option>

</select>

<button onclick="toggleDark()">🌙</button>

</div>

<div id="pageContainer">

<img id="pageImg">

<audio id="audio" controls></audio>

</div>

<script>

let page=1

function loadPage(){

page=document.getElementById("pageInput").value

document.getElementById("pageImg").src=
"https://raw.githubusercontent.com/quran-data/warsh-mushaf/main/pages/"+page+".jpg"

loadAudio()

}

function prevPage(){

if(page>1){

page--

document.getElementById("pageInput").value=page

loadPage()

}

}

function nextPage(){

if(page<604){

page++

document.getElementById("pageInput").value=page

loadPage()

}

}

function loadAudio(){

let reciter=document.getElementById("reciter").value

document.getElementById("audio").src=
"https://server8.mp3quran.net/"+reciter+"/001.mp3"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

loadPage()

</script>

</body>

</html>
