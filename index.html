<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <link rel="manifest" href="manifest.json">
    <title>Al-Qur'an Premium Pro Warsh</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --p-green: #042f2e;
            --emerald-light: #064e3b;
            --gold: #d4af37;
            --gold-bright: #f1c40f;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --bg-dark: #050505;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--bg-dark); font-family: 'Segoe UI', sans-serif; }

        /* HEADER PREMIUM */
        .header {
            padding: 15px 20px;
            background: var(--p-green);
            border-bottom: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--gold-bright); font-weight: 800; font-size: 1rem; letter-spacing: 1px; }

        .controls-row { display: flex; gap: 8px; }
        select {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1.5px solid var(--gold);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            flex: 1;
            outline: none;
        }
        option { background: var(--p-green); }

        /* TABS */
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 14px; }
        .tab {
            flex: 1; padding: 12px; text-align: center;
            color: rgba(255,255,255,0.5); font-weight: 700; font-size: 0.75rem;
            cursor: pointer; border-radius: 10px; transition: 0.3s;
        }
        .tab.active { background: var(--gold); color: white; }

        /* CONTENT AREA */
        .main-content {
            height: calc(100vh - 230px);
            overflow-y: auto;
            padding: 15px;
            scroll-behavior: smooth;
            background: var(--bg-dark);
        }

        /* AYAH CARDS */
        .ayah-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            border-left: 6px solid var(--gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .ayah-card.playing { background: #fff9e6; border-left-color: var(--gold-bright); transform: scale(1.01); }

        .arabic-text {
            direction: rtl; text-align: right;
            font-family: 'Scheherazade New', serif;
            font-size: 2.2rem; line-height: 2.5; color: #000;
        }
        .translation-text {
            font-size: 1rem; color: #475569; line-height: 1.6;
            margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee;
            font-style: italic;
        }

        /* MUSHAF IMAGE */
        .mushaf-container { width: 100%; text-align: center; display: none; }
        .mushaf-img { width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); background: white; }

        /* PLAYER BAR */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #111; border-top: 2px solid var(--gold);
            padding: 15px 25px; display: flex; align-items: center; gap: 20px;
        }
        .play-btn {
            width: 55px; height: 55px; background: var(--gold);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: black; font-size: 1.4rem; cursor: pointer;
        }

        /* LOADER */
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 100; text-align: center; }
        .spinner { width: 45px; height: 45px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div class="top-row">
            <div class="logo"><i class="fas fa-crown"></i> QUR'AN PREMIUM PRO</div>
            <i class="fas fa-sync" style="color:var(--gold)" onclick="window.location.reload()"></i>
        </div>
        <div class="controls-row">
            <select id="surahSelect" onchange="loadSurah(this.value)"></select>
            <select id="reciterSelect">
                <option value="Husary_Warsh_64kbps">Al-Hussary (Warsh)</option>
                <option value="Kushayli_64kbps">Al-Qazabri (Warsh)</option>
                <option value="Minshawi_Murattal_128kbps">Al-Minshawi</option>
                <option value="Alafasy_128kbps">Mishary Alafasy</option>
            </select>
        </div>
        <div class="tabs">
            <div class="tab active" id="tab-reader" onclick="switchTab('reader')">LETTURA</div>
            <div class="tab" id="tab-tafsir" onclick="switchTab('tafsir')">TAFSIR</div>
            <div class="tab" id="tab-mushaf" onclick="switchTab('mushaf')">MUSHAF</div>
        </div>
    </header>

    <main class="main-content" id="mainScroll">
        <div id="loader"><div class="spinner"></div></div>
        
        <div id="renderArea">
            <!-- Qui vengono caricati i versetti -->
        </div>

        <div id="mushafContainer" class="mushaf-container">
            <img id="mushafImg" class="mushaf-img" src="">
            <p id="pageInfo" style="color:var(--gold); margin-top:10px; font-weight:bold;"></p>
        </div>
    </main>

    <footer class="player-bar">
        <div class="play-btn" onclick="togglePlayback()"><i class="fas fa-play" id="playIcon"></i></div>
        <div style="flex: 1; overflow: hidden;">
            <div id="curAyahName" style="font-size: 0.8rem; font-weight: 800; color: var(--gold-bright); white-space: nowrap;">Seleziona un versetto</div>
            <div id="curStatus" style="font-size: 0.65rem; color: #a0aec0;">Pronto</div>
        </div>
        <i class="fas fa-step-forward" style="color: var(--gold); font-size: 1.3rem;" onclick="nextAyah()"></i>
    </footer>
</div>

<audio id="audioEngine"></audio>

<script>
    let currentSurah = 1, currentAyahIdx = 0, ayahsData = [], isPlaying = false, activeTab = 'reader';
    const audio = document.getElementById('audioEngine'), renderArea = document.getElementById('renderArea'), loader = document.getElementById('loader');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
    const pageMapping = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];

    window.onload = () => {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    };

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${t}`).classList.add('active');
        renderContent();
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        loader.style.display = 'block';
        try {
            const [resAr, resIt, resTaf] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.jalalayn`)
            ]);
            const dAr = await resAr.json(), dIt = await resIt.json(), dTaf = await resTaf.json();
            ayahsData = dAr.data.ayahs.map((a, i) => ({
                num: a.numberInSurah, ar: a.text, it: dIt.data.ayahs[i].text, taf: dTaf.data.ayahs[i].text
            }));
            renderContent();
        } catch (e) { renderArea.innerHTML = "<p style='color:white;text-align:center;'>Errore di connessione.</p>"; }
        loader.style.display = 'none';
    }

    function renderContent() {
        renderArea.innerHTML = "";
        const mushafCont = document.getElementById('mushafContainer');
        
        if (activeTab === 'mushaf') {
            renderArea.style.display = 'none';
            mushafCont.style.display = 'block';
            const p = pageMapping[currentSurah - 1];
            const p3 = String(p).padStart(3, '0');
            // NUOVO LINK MUSHAF SICURO
            const imgUrl = `https://raw.githubusercontent.com/muslimDevCommunity/quran-warsh/485fd1b62b0d6e1814eed7a7747d4a230a543e58/src/res/pages/page${p3}.png`;
            document.getElementById('mushafImg').src = imgUrl;
            document.getElementById('pageInfo').innerText = `Pagina ${p} - Mushaf Tajweed Warsh`;
            return;
        }

        renderArea.style.display = 'block';
        mushafCont.style.display = 'none';

        ayahsData.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = `ayah-card ${currentAyahIdx === i && isPlaying ? 'playing' : ''}`;
            card.id = `ayah-${i}`;
            
            let arText = (currentSurah === 1 && a.num === 4) ? "مَلِكِ يَوْمِ الدِّينِ" : a.ar;
            let subText = activeTab === 'tafsir' ? `<b style="color:var(--gold)">TAFSIR:</b> ${a.taf}` : a.it;

            card.innerHTML = `<div class="arabic-text">${arText} (${a.num})</div><div class="translation-text">${subText}</div>`;
            card.onclick = () => playAyah(i);
            renderArea.appendChild(card);
        });
    }

    function playAyah(idx) {
        currentAyahIdx = idx;
        const s = String(currentSurah).padStart(3, '0'), v = String(ayahsData[idx].num).padStart(3, '0');
        const rec = document.getElementById('reciterSelect').value;
        
        // Link audio EveryAyah (Il più stabile)
        audio.src = `https://www.everyayah.com/data/${rec}/${s}${v}.mp3`;
        audio.play().then(() => {
            isPlaying = true;
            updateUI();
        }).catch(e => {
            // Se fallisce, prova il recitatore di emergenza (Hussary Warsh)
            audio.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${v}.mp3`;
            audio.play();
        });
    }

    function togglePlayback() {
        if (isPlaying) { audio.pause(); isPlaying = false; }
        else { if(!audio.src) playAyah(0); else audio.play(); isPlaying = true; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('curAyahName').innerText = `${surahNames[currentSurah-1]} - Versetto ${ayahsData[currentAyahIdx]?.num || 1}`;
        document.querySelectorAll('.ayah-card').forEach((c, i) => c.classList.toggle('playing', i === currentAyahIdx && isPlaying));
    }

    audio.onended = () => { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); else { isPlaying = false; updateUI(); } };
    function nextAyah() { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); }
</script>
</body>
</html>
