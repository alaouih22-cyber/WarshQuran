<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <link rel="manifest" href="manifest.json">
    <title>Qur'an Premium Pro Warsh+</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* VARIABILI TEMA (DEFAULT NOTTE) */
        :root {
            --p-green: #042f2e;
            --header-bg: rgba(4, 47, 46, 0.95);
            --gold: #d4af37;
            --gold-light: #fbbf24;
            --bg-gradient: linear-gradient(135deg, #042f2e 0%, #011412 100%);
            --card: #ffffff;
            --ayah-text: #0f172a;
            --it-text: #475569;
            --sidebar: #021a19;
            --tab-bg: rgba(0, 0, 0, 0.2);
        }

        /* TEMA GIORNO */
        body.light-mode {
            --p-green: #f4ece1;
            --header-bg: rgba(244, 236, 225, 0.98);
            --gold: #b45309;
            --gold-light: #d97706;
            --bg-gradient: linear-gradient(135deg, #f4ece1 0%, #e5d5c0 100%);
            --card: #ffffff;
            --ayah-text: #1a202c;
            --it-text: #4a5568;
            --sidebar: #fcfaf7;
            --tab-bg: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg-gradient); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        .app-shell { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* Header */
        .header { padding: 15px 20px; background: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.3); display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .logo { color: var(--gold); font-weight: 800; font-size: 1rem; letter-spacing: 1px; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -100%; width: 80%; max-width: 300px; height: 100%; background: var(--sidebar); z-index: 2000; transition: 0.4s; border-right: 2px solid var(--gold); padding: 25px 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .side-item { padding: 14px 15px; color: var(--ayah-text); display: flex; align-items: center; gap: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        body:not(.light-mode) .side-item { color: white; }
        .side-item i { color: var(--gold); font-size: 1.1rem; }

        /* Controls */
        .top-nav { padding: 10px 15px; }
        select { background: rgba(128, 128, 128, 0.1); color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 10px; font-size: 0.8rem; flex: 1; outline: none; font-weight: bold; }
        body.light-mode select { background: white; color: #000; }

        .tabs { display: flex; background: var(--tab-bg); padding: 4px; border-radius: 14px; margin-top: 10px; }
        .tab { flex: 1; padding: 10px; text-align: center; color: var(--gold); font-weight: 700; font-size: 0.75rem; cursor: pointer; border-radius: 10px; }
        .tab.active { background: var(--gold); color: white; }

        /* Content */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; position: relative; }
        .ayah-card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 6px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; }
        .ayah-card.playing { background: #fffbeb; border-left-color: var(--gold-light); transform: scale(1.01); }
        .arabic-text { direction: rtl; font-family: 'Scheherazade New', serif; font-size: 2.2rem; line-height: 2.5; text-align: right; color: var(--ayah-text); }
        .extra-text { font-size: 0.95rem; color: var(--it-text); line-height: 1.6; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }

        /* Mushaf */
        #mushafContainer { width: 100%; text-align: center; }
        #mushafImg { width: 100%; border-radius: 12px; display: none; box-shadow: 0 15px 40px rgba(0,0,0,0.3); background: white; }

        /* Player Bar */
        .player-bar { background: var(--card); padding: 15px 20px; border-top: 3px solid var(--gold); display: flex; align-items: center; gap: 15px; }
        .play-btn { width: 55px; height: 55px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; cursor: pointer; }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 100; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1900; display: none; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div class="overlay-bg" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div style="color:var(--gold); font-weight:900; font-size:1.1rem; margin-bottom:25px; display:flex; justify-content:space-between;">
        OPZIONI PRO <i class="fas fa-times" onclick="toggleSidebar()"></i>
    </div>
    <div class="side-item" onclick="setTheme('light')"><i class="fas fa-sun"></i> <span class="side-label">Tema Giorno</span></div>
    <div class="side-item" onclick="setTheme('dark')"><i class="fas fa-moon"></i> <span class="side-label">Tema Notte</span></div>
    <div class="side-item" onclick="changeContent('tafsir')"><i class="fas fa-book-open"></i> <span class="side-label">التفسير (Tafsir Jalalayn)</span></div>
    <div class="side-item" onclick="changeContent('asbab')"><i class="fas fa-history"></i> <span class="side-label">أسباب النزول (Asbab al-Nuzul)</span></div>
    <div class="side-item" onclick="changeContent('it')"><i class="fas fa-language"></i> <span class="side-label">Traduzione Italiana</span></div>
</div>

<div class="app-shell">
    <header class="header">
        <i class="fas fa-bars-staggered" style="color:var(--gold); font-size:1.4rem;" onclick="toggleSidebar()"></i>
        <div class="logo">QUR'AN PRO WARSH</div>
        <i class="fas fa-circle-info" style="color:var(--gold); font-size:1.2rem;"></i>
    </header>

    <div class="top-nav">
        <div style="display:flex; gap:8px;">
            <select id="surahSelect" onchange="loadSurah(this.value)"></select>
            <select id="reciterSelect">
                <option value="Husary_Warsh_64kbps">Hussary (Warsh)</option>
                <option value="Kushayli_64kbps">Al-Qazabri (Warsh)</option>
                <option value="Minshawi_Murattal_128kbps">Al-Minshawi</option>
                <option value="Alafasy_128kbps">Mishary Alafasy</option>
                <option value="Abdul_Basit_Murattal_64kbps">Abdul Basit</option>
                <option value="Husary_64kbps">Hussary (Hafs)</option>
            </select>
        </div>
        <div class="tabs">
            <div class="tab active" id="tab-reader" onclick="switchTab('reader')">LETTURA</div>
            <div class="tab" id="tab-mushaf" onclick="switchTab('mushaf')">MUSHAF</div>
        </div>
    </div>

    <main class="main-content" id="mainContent">
        <div id="loader"><div class="spinner"></div></div>
        <div id="renderArea"></div>
    </main>

    <footer class="player-bar">
        <div class="play-btn" onclick="togglePlayback()"><i class="fas fa-play" id="playIcon"></i></div>
        <div style="flex:1; overflow: hidden;">
            <div id="currentAyahName" style="font-size:0.85rem; font-weight:800; color:var(--gold);">Seleziona versetto</div>
            <div style="font-size:0.65rem; color:var(--it-text);">Recitazione in corso...</div>
        </div>
        <i class="fas fa-step-forward" style="color:var(--gold); font-size:1.4rem;" onclick="nextAyah()"></i>
    </footer>
</div>

<audio id="audioEngine"></audio>

<script>
    let currentSurah = 1, currentAyahIdx = 0, ayahsData = [], isPlaying = false, activeTab = 'reader', contentType = 'it';
    const audio = document.getElementById('audioEngine'), renderArea = document.getElementById('renderArea'), loader = document.getElementById('loader');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
    const pageMapping = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];

    window.onload = () => {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
    }

    function setTheme(mode) {
        if(mode === 'light') document.body.classList.add('light-mode');
        else document.body.classList.remove('light-mode');
        toggleSidebar();
    }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${t}`).classList.add('active');
        renderContent();
    }

    async function changeContent(type) {
        contentType = type;
        toggleSidebar();
        await loadSurah(currentSurah);
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        loader.style.display = 'flex';
        try {
            let edition = contentType === 'tafsir' ? 'ar.jalalayn' : (contentType === 'asbab' ? 'ar.asbab' : 'it.piccardo');
            const [resAr, resEx] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/${edition}`)
            ]);
            const dAr = await resAr.json(), dEx = await resEx.json();
            ayahsData = dAr.data.ayahs.map((a, i) => ({
                num: a.numberInSurah, ar: a.text, extra: dEx.data.ayahs[i].text
            }));
            renderContent();
        } catch (e) { renderArea.innerHTML = "Errore connessione."; }
        loader.style.display = 'none';
    }

    function renderContent() {
        renderArea.innerHTML = "";
        if (activeTab === 'mushaf') {
            const p = pageMapping[currentSurah - 1];
            // Fix Mushaf: Permalink GitHub + Proxy bypass per caricamento sicuro
            const imgUrl = `https://wsrv.nl/?url=https://raw.githubusercontent.com/muslimDevCommunity/quran-warsh/485fd1b62b0d6e1814eed7a7747d4a230a543e58/src/res/pages/page${p.toString().padStart(3, '0')}.png`;
            renderArea.innerHTML = `<div id="mushafContainer"><img id="mushafImg" src="${imgUrl}" onload="this.style.display='block'"></div>`;
            return;
        }
        ayahsData.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = `ayah-card ${currentAyahIdx === i && isPlaying ? 'playing' : ''}`;
            let text = (currentSurah === 1 && a.num === 4) ? "مَلِكِ يَوْمِ الدِّينِ" : a.ar;
            card.innerHTML = `<div class="arabic-text">${text} (${a.num})</div><div class="extra-text">${a.extra}</div>`;
            card.onclick = () => playAyah(i);
            renderArea.appendChild(card);
        });
    }

    function playAyah(idx) {
        currentAyahIdx = idx;
        const s = String(currentSurah).padStart(3, '0'), v = String(ayahsData[idx].num).padStart(3, '0');
        const rec = document.getElementById('reciterSelect').value;
        audio.src = `https://www.everyayah.com/data/${rec}/${s}${v}.mp3`;
        audio.play(); isPlaying = true; updateUI();
    }

    function togglePlayback() {
        if (isPlaying) { audio.pause(); isPlaying = false; }
        else { if(!audio.src) playAyah(0); else audio.play(); isPlaying = true; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('currentAyahName').innerText = `${surahNames[currentSurah-1]} - Verso ${ayahsData[currentAyahIdx].num}`;
        document.querySelectorAll('.ayah-card').forEach((c, i) => c.classList.toggle('playing', i === currentAyahIdx && isPlaying));
    }

    audio.onended = () => { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); else isPlaying = false; updateUI(); };
    function nextAyah() { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); }
</script>
</body>
</html>
