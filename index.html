<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Qur'an Warsh Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon-512.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --emerald: #064e3b; --gold: #fbbf24; --paper: #fdf6e3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: var(--emerald); overflow: hidden; font-family: sans-serif; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--emerald); color: var(--gold); padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); }
        .nav { display: flex; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2); }
        select { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: var(--paper); font-weight: bold; }
        .btn-t { padding: 10px; border-radius: 8px; border: none; background: var(--gold); color: var(--emerald); font-weight: bold; min-width: 100px; }
        .view { flex: 1; overflow-y: auto; background: var(--paper); margin: 8px; border-radius: 12px; border: 4px double var(--gold); }
        #txt { padding: 15px; }
        .card { margin-bottom: 12px; padding: 15px; background: #fff; border-left: 5px solid var(--emerald); border-radius: 8px; cursor: pointer; }
        .card.active { background: #fef3c7; border-left-color: var(--gold); }
        #real { display: none; width: 100%; }
        #qimg { width: 100%; height: auto; display: block; }
        .foot { background: var(--emerald); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--gold); }
        .btn-n { background: var(--gold); color: var(--emerald); border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <b>AL-QUR'AN WARSH PRO</b>
        <div class="nav">
            <select id="sSel" onchange="loadS(this.value)"></select>
            <button class="btn-t" onclick="tog()">Reality</button>
        </div>
    </div>
    <div class="view" id="vBox">
        <div id="txt"></div>
        <div id="real"><img id="qimg" src=""></div>
    </div>
    <audio id="aud"></audio>
    <div class="foot">
        <button class="btn-nav btn-n" onclick="nav(-1)"><i class="fas fa-chevron-left"></i></button>
        <div style="color:var(--gold);text-align:center;"><b id="sL">Sura 1</b><br><small id="pL">Pagina 1</small></div>
        <button class="btn-nav btn-n" onclick="nav(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<script>
    let curS = 1, curP = 1, isR = false;
    const aud = document.getElementById('aud');

    async function start() {
        try {
            const r = await fetch('https://api.alquran.cloud/v1/surah');
            const d = await r.json();
            const sel = document.getElementById('sSel');
            d.data.forEach(s => {
                let o = document.createElement('option'); o.value = s.number; o.textContent = s.number + '. ' + s.englishName;
                sel.appendChild(o);
            });
            loadS(1);
        } catch(e) {}
    }

    async function loadS(n) {
        curS = parseInt(n);
        document.getElementById('sSel').value = n;
        document.getElementById('sL').innerText = 'Sura ' + n;
        const r = await fetch(`https://api.alquran.cloud/v1/surah/${n}/it.piccardo`);
        const d = await r.json();
        let h = "";
        d.data.ayahs.forEach(v => {
            h += `<div class="card" onclick="pAud(${n},${v.numberInSurah},this)"><b>${v.numberInSurah}.</b> ${v.text}</div>`;
        });
        document.getElementById('txt').innerHTML = h;
        curP = d.data.ayahs[0].page;
        uImg();
    }

    function pAud(s, a, el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        aud.src = `https://everyayah.com/data/Husary_Warsh_64kbps/${String(s).padStart(3,'0')}${String(a).padStart(3,'0')}.mp3`;
        aud.play();
    }

    function uImg() {
        document.getElementById('qimg').src = `https://www.searchtruth.org/quran/images2/warsh/page${String(curP).padStart(3,'0')}.png`;
        document.getElementById('pL').innerText = 'Pagina ' + curP;
    }

    function tog() {
        isR = !isR;
        document.getElementById('txt').style.display = isR ? 'none' : 'block';
        document.getElementById('real').style.display = isR ? 'block' : 'none';
        document.querySelector('.btn-t').innerText = isR ? 'Testo' : 'Reality';
    }

    function nav(x) {
        if(isR) { curP += x; if(curP<1)curP=1; uImg(); }
        else { let n = curS + x; if(n>0 && n<115) loadS(n); }
    }

    // Registrazione Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log("OK"));
    }
    window.onload = start;
</script>
</body>
</html>
