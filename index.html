<!DOCTYPE html>

<div id="quran"></div>

<div id="tafsirBox">
  <button onclick="closeTafsir()">Chiudi Tafsir</button>
  <div id="tafsirText"></div>
</div>

<script src="js/app.js"></script>

</html>
