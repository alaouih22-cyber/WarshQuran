<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Qur'an Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emerald: #064e3b; --gold: #fbbf24; --paper: #fdf6e3; --text: #1a202c; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: var(--emerald); overflow: hidden; 
            font-family: 'Georgia', serif; 
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }

        .header { background: var(--emerald); color: var(--gold); padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); }
        
        /* Controlli di Ricerca */
        .controls-row { display: flex; flex-direction: column; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2); }
        .select-wrapper { display: flex; gap: 5px; }
        
        select, input { 
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); 
            background: var(--paper); font-size: 15px; outline: none; color: var(--emerald); font-weight: bold;
        }

        .reader-container {
            flex: 1; overflow-y: auto; background-color: var(--paper);
            margin: 10px; border-radius: 15px; border: 4px double var(--gold);
            padding: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .surah-title-box { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 25px; padding-bottom: 15px; }
        .surah-name-ar { font-size: 2.2rem; color: var(--emerald); margin: 0; }
        
        .ayah-card {
            margin-bottom: 15px; padding: 15px; border-radius: 12px;
            background: rgba(255,255,255,0.7); border-left: 5px solid var(--emerald);
            line-height: 1.8; font-size: 1.2rem; color: var(--text); transition: 0.2s;
        }
        .ayah-card.active { background: #fef3c7; border-left-color: var(--gold); transform: scale(1.01); }
        .ayah-num { color: var(--emerald); font-weight: bold; margin-right: 10px; font-size: 0.9rem; }

        .footer { background: var(--emerald); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gold); }
        .btn-nav { background: var(--gold); color: var(--emerald); border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <b style="letter-spacing: 2px;"><i class="fas fa-moon"></i> AL-QUR'AN PRO</b>
        <div class="controls-row">
            <div class="select-wrapper">
                <select id="surahSelect" onchange="load(this.value)">
                    <option value="">Scegli Sura...</option>
                </select>
                <input type="number" id="ayahIn" placeholder="Vers." style="flex: 0 0 80px;">
                <button onclick="goToAyah()" class="btn-nav" style="padding: 10px;"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </div>

    <div class="reader-container" id="reader"></div>
    <audio id="player"></audio>

    <div class="footer">
        <button class="btn-nav" onclick="nav(-1)"><i class="fas fa-arrow-left"></i></button>
        <span id="label" style="color:var(--gold); font-weight:bold;">Sura 1</span>
        <button class="btn-nav" onclick="nav(1)"><i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    let curS = 1;
    const reader = document.getElementById('reader');
    const player = document.getElementById('player');
    const surahSelect = document.getElementById('surahSelect');

    // Popola il selettore delle 114 Sure
    async function populateSurahs() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const d = await res.json();
            d.data.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.number;
                opt.textContent = `${s.number}. ${s.englishName} (${s.name})`;
                surahSelect.appendChild(opt);
            });
        } catch(e) { console.error("Errore caricamento lista."); }
    }

    async function load(s, a = null) {
        if(!s) return;
        reader.innerHTML = "<p style='text-align:center'>Caricamento...</p>";
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`);
            const d = await res.json();
            const surah = d.data;
            curS = parseInt(s);
            surahSelect.value = curS;
            document.getElementById('label').innerText = `Sura ${s}`;

            let html = `<div class="surah-title-box"><h1 class="surah-name-ar">${surah.name}</h1><p>${surah.englishNameTranslation}</p></div>`;
            surah.ayahs.forEach(v => {
                html += `<div class="ayah-card" id="v-${v.numberInSurah}" onclick="play(${s}, ${v.numberInSurah}, this)">
                    <span class="ayah-num">${v.numberInSurah}</span> ${v.text}</div>`;
            });
            reader.innerHTML = html;
            if(a) { 
                setTimeout(() => { 
                    const el = document.getElementById(`v-${a}`);
                    if(el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.classList.add('active'); }
                }, 500);
            }
        } catch(e) { reader.innerHTML = "Errore connessione."; }
    }

    function play(s, a, el) {
        document.querySelectorAll('.ayah-card').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        player.src = `https://www.everyayah.com/data/Alafasy_128kbps/${String(s).padStart(3, '0')}${String(a).padStart(3, '0')}.mp3`;
        player.play();
    }

    function nav(d) { let n = curS + d; if(n >= 1 && n <= 114) load(n); }
    function goToAyah() { const a = document.getElementById('ayahIn').value; if(a) load(curS, a); }

    window.onload = () => { populateSurahs(); load(1); };
</script>
</body>
</html>
