<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <link rel="manifest" href="manifest.json">
    <title>Qur'an Premium Pro Warsh</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --dark-bg: #050505; --emerald-ui: #042f2e; --gold-ui: #d4af37; --gold-bright: #f1c40f; --text-dim: #a0aec0; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR REALE (COME VIDEO) --- */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%;
            background: #0f0f0f; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1.5px solid var(--gold-ui); overflow-y: auto; box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        .sidebar.open { left: 0; }
        .side-header { padding: 40px 20px; background: linear-gradient(to bottom, #042f2e, #0a0a0a); border-bottom: 2px solid var(--gold-ui); text-align: center; }
        .side-group { padding: 10px 0; border-bottom: 1px solid #222; }
        .side-item { padding: 16px 25px; display: flex; align-items: center; gap: 20px; cursor: pointer; transition: 0.2s; }
        .side-item:active { background: #1a1a1a; }
        .side-item i { color: var(--gold-ui); font-size: 1.2rem; width: 25px; text-align: center; }
        .side-label { font-size: 0.95rem; font-weight: 500; color: #eee; }

        /* --- APP STRUCTURE --- */
        .app-shell { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* Header Premium */
        .navbar {
            padding: 15px 20px; background: var(--emerald-ui); 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1.5px solid var(--gold-ui); z-index: 500;
        }
        .nav-icon { font-size: 1.4rem; color: var(--gold-bright); cursor: pointer; }
        .nav-title { font-weight: 800; color: var(--gold-bright); font-size: 0.9rem; letter-spacing: 1px; }

        /* Selectors Bar */
        .top-selectors { display: flex; background: #111; padding: 10px; gap: 8px; border-bottom: 1px solid #222; }
        select { background: #1a1a1a; color: white; border: 1px solid var(--gold-ui); padding: 10px; border-radius: 10px; flex: 1; font-weight: bold; font-size: 0.8rem; outline: none; }

        /* Tabs (Lettura, Tafsir, Mushaf) */
        .tabs { display: flex; background: #000; padding: 5px; gap: 5px; border-bottom: 1px solid #111; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 0.75rem; font-weight: 800; color: var(--text-dim); cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab.active { background: var(--gold-ui); color: black; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }

        /* Main Content */
        .content-area { flex: 1; overflow-y: auto; background: #080808; position: relative; scroll-behavior: smooth; }
        
        /* Card Versetto Premium */
        .ayah-card { padding: 25px; border-bottom: 1px solid #151515; cursor: pointer; transition: 0.3s; }
        .ayah-card.playing { background: rgba(212, 175, 55, 0.08); border-right: 4px solid var(--gold-ui); }
        .arabic-text { direction: rtl; font-family: 'Scheherazade New', serif; font-size: 2.3rem; line-height: 2.5; text-align: right; color: #fff; margin-bottom: 15px; }
        .it-text { font-size: 0.95rem; color: var(--text-dim); line-height: 1.6; font-style: italic; display: block; margin-bottom: 10px; }
        
        /* Extra Info (Tafsir/Asbab) */
        .extra-box { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px dashed var(--gold-ui); }
        .extra-label { font-size: 0.7rem; color: var(--gold-bright); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .extra-content { font-size: 0.9rem; color: #ccc; line-height: 1.5; }

        /* Mushaf View */
        #mushafImg { width: 100%; display: block; transition: 0.3s; box-shadow: 0 0 50px rgba(0,0,0,1); }

        /* Player Bar */
        .player-bar { background: #0f0f0f; padding: 15px 25px; border-top: 2px solid var(--gold-ui); display: flex; align-items: center; gap: 20px; }
        .play-main { width: 55px; height: 55px; background: var(--gold-ui); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: black; box-shadow: 0 4px 15px rgba(212,175,55,0.4); cursor: pointer; }

        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: none; backdrop-filter: blur(5px); }

        /* Loader */
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2100; display: none; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #111; border-top: 5px solid var(--gold-bright); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="show-ui">

<div class="overlay-bg" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR REALE (IDENTICA AL VIDEO) -->
<div class="sidebar" id="sidebar">
    <div class="side-header">القائمة الرئيسية (Menu)</div>
    <div class="side-group">
        <div class="side-item" onclick="setExtra('tafsir')"><i class="fas fa-book"></i> <span class="side-label">التفسير (Tafsir Jalalayn)</span></div>
        <div class="side-item" onclick="setExtra('asbab')"><i class="fas fa-history"></i> <span class="side-label">أسباب النزول (Asbab al-Nuzul)</span></div>
        <div class="side-item" onclick="setExtra('maani')"><i class="fas fa-language"></i> <span class="side-label">معاني الكلمات (Ma'ani)</span></div>
        <div class="side-item" onclick="setExtra('irab')"><i class="fas fa-spell-check"></i> <span class="side-label">الإعراب (Analisi I'rab)</span></div>
    </div>
    <div class="side-group">
        <div class="side-item" onclick="switchTab('mushaf')"><i class="fas fa-file-alt"></i> <span class="side-label">الصفحات (Mushaf 604)</span></div>
        <div class="side-item" onclick="window.location.reload()"><i class="fas fa-sync"></i> <span class="side-label">Ricarica App</span></div>
    </div>
</div>

<div class="app-shell" id="appShell">
    <!-- Navbar -->
    <header class="navbar">
        <i class="fas fa-bars-staggered nav-icon" onclick="toggleSidebar()"></i>
        <div class="nav-title">AL-QUR'AN PREMIUM PRO</div>
        <i class="fas fa-search nav-icon"></i>
    </header>

    <!-- Selettori -->
    <div class="top-selectors">
        <select id="surahSelect" onchange="jumpToSurah(this.value)"></select>
        <select id="reciterSelect">
            <option value="Husary_Warsh_64kbps">Al-Hussary (Warsh)</option>
            <option value="Kushayli_64kbps">Al-Qazabri (Warsh)</option>
            <option value="Minshawi_Murattal_128kbps">Al-Minshawi</option>
            <option value="Alafasy_128kbps">Mishary Al-Afasy</option>
        </select>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" id="tab-reader" onclick="switchTab('reader')">LETTURA</div>
        <div class="tab" id="tab-tafsir" onclick="switchTab('tafsir')">INFO EXTRA</div>
        <div class="tab" id="tab-mushaf" onclick="switchTab('mushaf')">MUSHAF</div>
    </div>

    <!-- Area Contenuto -->
    <main class="content-area" id="mainContent">
        <div id="loader"><div class="spinner"></div></div>
        <div id="renderArea"></div>
    </main>

    <!-- Player Bar -->
    <footer class="player-bar">
        <div class="play-main" onclick="togglePlayback()"><i class="fas fa-play" id="playIcon"></i></div>
        <div style="flex:1; overflow: hidden;">
            <div id="curAyahName" style="font-size:0.85rem; font-weight:800; color:var(--gold-bright); white-space:nowrap; text-overflow:ellipsis;">Seleziona versetto</div>
            <div id="curStatus" style="font-size:0.65rem; color:var(--text-dim);">Pronto alla recitazione</div>
        </div>
        <i class="fas fa-step-forward" style="color:var(--gold-ui); font-size:1.4rem; cursor:pointer;" onclick="nextAyah()"></i>
    </footer>
</div>

<audio id="audioEngine"></audio>

<script>
    let currentSurah = 1, currentAyahIdx = 0, ayahsData = [], isPlaying = false, activeTab = 'reader', extraMode = 'tafsir';
    const audio = document.getElementById('audioEngine'), renderArea = document.getElementById('renderArea'), loader = document.getElementById('loader');

    const surahNames = ["Al-Fatihah","Al-Baqarah","Al-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];
    const pageMapping = [1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,477,483,489,496,499,502,507,511,515,518,520,523,526,528,531,534,537,542,545,549,551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,585,586,587,587,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,599,600,600,601,601,601,602,602,602,603,603,603,604,604,604];

    window.onload = () => {
        const sel = document.getElementById('surahSelect');
        surahNames.forEach((n, i) => {
            let o = document.createElement('option'); o.value = i + 1; o.textContent = `${i+1}. ${n}`;
            sel.appendChild(o);
        });
        loadSurah(1);
    };

    function toggleSidebar() {
        const side = document.getElementById('sidebar');
        const over = document.getElementById('overlay');
        side.classList.toggle('open');
        over.style.display = side.classList.contains('open') ? 'block' : 'none';
    }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${t}`).classList.add('active');
        if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        renderContent();
    }

    function setExtra(mode) {
        extraMode = mode;
        switchTab('tafsir');
    }

    async function loadSurah(s) {
        currentSurah = parseInt(s);
        loader.style.display = 'block';
        try {
            // Edizione dinamica basata sul menu laterale
            let edExtra = 'ar.jalalayn';
            if(extraMode === 'asbab') edExtra = 'ar.asbab';
            if(extraMode === 'maani') edExtra = 'ar.muyassar';
            
            const [resAr, resIt, resExtra] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${s}/ar.warsh`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/it.piccardo`),
                fetch(`https://api.alquran.cloud/v1/surah/${s}/${edExtra}`)
            ]);
            const dAr = await resAr.json(), dIt = await resIt.json(), dEx = await resExtra.json();
            
            ayahsData = dAr.data.ayahs.map((a, i) => ({
                num: a.numberInSurah,
                ar: a.text,
                it: dIt.data.ayahs[i].text,
                extra: dEx.data.ayahs[i].text
            }));
            renderContent();
        } catch (e) { renderArea.innerHTML = "Errore connessione."; }
        loader.style.display = 'none';
    }

    function renderContent() {
        renderArea.innerHTML = "";
        if (activeTab === 'mushaf') {
            const p = pageMapping[currentSurah - 1];
            // Fix Permalink GitHub Immagini
            const githubUrl = `https://raw.githubusercontent.com/muslimDevCommunity/quran-warsh/485fd1b62b0d6e1814eed7a7747d4a230a543e58/src/res/pages/page${p.toString().padStart(3, '0')}.png`;
            renderArea.innerHTML = `<div style="padding-bottom:100px;"><img id="mushafImg" src="${githubUrl}" onload="this.style.opacity=1" onerror="this.src='https://wsrv.nl/?url=https://easyquran.com/quran-jpg-w/${p}.jpg'"></div>`;
            return;
        }

        ayahsData.forEach((a, i) => {
            const card = document.createElement('div');
            card.className = `ayah-card ${currentAyahIdx === i && isPlaying ? 'active' : ''}`;
            card.id = `ayah-${i}`;
            
            // Vero Warsh Fatiha Patch
            let text = a.ar;
            if(currentSurah === 1 && a.num === 4) text = "مَلِكِ يَوْمِ الدِّينِ";

            let subContent = (activeTab === 'tafsir') ? `<div class="extra-box"><span class="extra-label">${extraMode.toUpperCase()}</span><p class="extra-content">${a.extra}</p></div>` : `<span class="it-text">${a.it}</span>`;

            card.innerHTML = `<div class="arabic-text">${text} (${a.num})</div>${subContent}`;
            card.onclick = () => playAyah(i);
            renderArea.appendChild(card);
        });
    }

    function playAyah(idx) {
        currentAyahIdx = idx;
        const s = String(currentSurah).padStart(3, '0'), v = String(ayahsData[idx].num).padStart(3, '0');
        const rec = document.getElementById('reciterSelect').value;
        
        // Audio Fix: Kushayli ID per Al-Qazabri
        let url = (rec === "Kushayli_64kbps") ? `https://www.everyayah.com/data/Kushayli_64kbps/${s}${v}.mp3` : `https://www.everyayah.com/data/${rec}/${s}${v}.mp3`;

        audio.src = url;
        audio.play().catch(e => {
            audio.src = `https://www.everyayah.com/data/Husary_Warsh_64kbps/${s}${v}.mp3`;
            audio.play();
        });
        isPlaying = true; updateUI();
    }

    function togglePlayback() {
        if (isPlaying) { audio.pause(); isPlaying = false; }
        else { if(!audio.src) playAyah(0); else audio.play(); isPlaying = true; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        document.getElementById('curAyahName').innerText = `${surahNames[currentSurah-1]} - Versetto ${ayahsData[currentAyahIdx].num}`;
        document.querySelectorAll('.ayah-card').forEach((c, i) => c.classList.toggle('active', i === currentAyahIdx && isPlaying));
    }

    audio.onended = () => { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); else { isPlaying = false; updateUI(); } };
    function nextAyah() { if (currentAyahIdx < ayahsData.length - 1) playAyah(currentAyahIdx + 1); }
</script>
</body>
</html>
