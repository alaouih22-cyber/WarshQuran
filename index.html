<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easy Quran Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div id="mushaf-container">
        <div id="loading-overlay">جاري التحميل...</div>
        <img id="quran-page" src="" alt="Quran Page">
    </div>

    <div id="ui-layer" class="hidden">
        <header class="top-bar">
            <button id="main-menu-btn"><i class="fas fa-bars"></i> الرئيسية</button>
            <div class="top-left">
                <i class="fas fa-search"></i>
                <i class="fas fa-bookmark" onclick="toggleBookmark()"></i>
                <span class="hd-badge">HD</span>
            </div>
        </header>

        <footer class="bottom-bar">
            <div onclick="openModal('surah-list')">≡ السور</div>
            <div>صفحة <span id="page-num">1</span></div>
            <div id="surah-title">الفاتحة</div>
            <button id="play-audio-btn"><i class="fas fa-play"></i></button>
        </footer>
    </div>

    <div id="surah-list" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                فهرس السور
                <button class="close-modal" onclick="closeAll()">&times;</button>
            </div>
            <div class="scroll-area" id="surah-index-container">
                </div>
        </div>
    </div>

    <audio id="quran-audio"></audio>

    <script src="app.js"></script>
</body>
</html>
