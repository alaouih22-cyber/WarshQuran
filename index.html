<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran App</title>
    <style>
        /* Sfondo e stile generale */
        body { 
            margin: 0; 
            background-color: #f4ecd8; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: sans-serif;
        }

        /* Area dell'immagine */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }

        /* La tua immagine del Corano */
        img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Barra dei comandi sotto */
        .footer {
            background-color: #2c3e50;
            color: #f1c40f;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            font-weight: bold;
            border-top: 3px solid #f1c40f;
        }

        .btn { cursor: pointer; }
    </style>
</head>
<body>

    <div class="content">
        <img src="https://easyquran.com/tajweed-warsh/warsh-001.png" alt="Quran Page">
    </div>

    <div class="footer">
        <div class="btn">≡ السور (Sura)</div>
        <div>صفحة 1</div>
        <div class="btn">▶ استماع (Audio)</div>
    </div>

</body>
</html>
